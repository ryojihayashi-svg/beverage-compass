function getItems(store){
  const raw=STORES_RAW[store]||[];
  const ov=loadOverlay();
  const sOv=(ov.stores&&ov.stores[store])||{edits:{},adds:[],deletes:[]};
  const dels=new Set(sOv.deletes||[]);
  const edits=sOv.edits||{};
  let items=raw.map((r,i)=>{
    const id="orig_"+store+"_"+i;
    if(dels.has(id))return null;
    const base={id,name:r[0],producer:r[1],vintage:r[2],qty:r[3]||0,price:r[4]||0,mainCat:r[5]||"\u305D\u306E\u4ED6",sub:r[6]||"",type:r[7]||"",cat:r[8]||"",importer:r[9]||"",store};
    return edits[id]?{...base,...edits[id],id,store}:base;
  }).filter(Boolean);
  (sOv.adds||[]).forEach(add=>{if(!dels.has(add.id))items.push({...add,store})});
  return items;
}
function getWL(store){
  const raw=WL_RAW[store]||[];
  const ov=loadOverlay();
  const sOv=(ov.stores&&ov.stores[store])||{edits:{},adds:[],deletes:[]};
  const dels=new Set(sOv.deletes||[]);

    return edits[id]?{...base,...edits[id],id,store}:base;
  }).filter(Boolean);
  (sOv.adds||[]).forEach(add=>{if(!dels.has(add.id))items.push({...add,store})});
  return items;
}
function wineDisplayName(item,isWL){
  if(!isWL){
    const enName=EN_MAP[item.name]||null;
    return{name:enName||item.name,vintage:item.vintage,producer:item.producer,ja:enName?item.name:null,region:item.sub||item.sec||""};
  }
  return{name:item.en||item.ja,vintage:item.vintage,producer:item.producerEN||item.producer,ja:item.en?item.ja:null,region:item.sec||item.sub||""};
}
function summarize(items){
  const cats={};let tI=0,tQ=0,tV=0;
  items.forEach(it=>{if(!cats[it.mainCat])cats[it.mainCat]={c:0,q:0,v:0};cats[it.mainCat].c++;cats[it.mainCat].q+=it.qty;if(it.price)cats[it.mainCat].v+=it.qty*it.price;tI++;tQ+=it.qty;if(it.price)tV+=it.qty*it.price});
  return{items:tI,qty:tQ,value:tV,cats};
}
function summarizeWL(items){
  const cats={};let tI=0,tSell=0,tStock=0,hasStock=false;
  items.forEach(it=>{if(!cats[it.mainCat])cats[it.mainCat]={c:0};cats[it.mainCat].c++;tI++;if(it.sell)tSell+=it.sell;if(it.stock!=null){tStock+=it.stock;hasStock=true}});
  return{items:tI,sell:tSell,stock:hasStock?tStock:null,cats};
}

function DetailModal({item,onClose,mode,refresh}){
  if(!item)return null;
  const isWL=mode==="wl";
  const wd=wineDisplayName(item,isWL);
  const wk=cacheKey(item);
  const[closing,setClosing]=useState(false);
  const startClose=()=>{setClosing(true);setTimeout(onClose,250)};

  const [editing,setEditing]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);

  const handleEditSave=(itemId,changes,origItem)=>{
    const{ov,s}=getStoreOverlay(origItem.store);
    if(itemId.startsWith("add_")){
      const idx=s.adds.findIndex(a=>a.id===itemId);
      if(idx>=0)Object.assign(s.adds[idx],changes);
    }else{
      s.edits[itemId]={...(s.edits[itemId]||{}),...changes};
    }
    saveOverlay(ov);
    addHistory({type:"edit",store:origItem.store,itemId,itemName:origItem.name||origItem.en||origItem.ja,before:Object.fromEntries(Object.keys(changes).map(k=>[k,origItem[k]])),after:changes});
    showToast(T("保存しました","Saved"),"success");
    if(refresh)refresh();
    onClose();
  };

  const handleDelete=()=>{
    const{ov,s}=getStoreOverlay(item.store);
    s.deletes.push(item.id);
    saveOverlay(ov);
    addHistory({type:"delete",store:item.store,itemId:item.id,itemName:item.name||item.en||item.ja,snapshot:{...item}});
    const undoDelete=()=>{const{ov:o2,s:s2}=getStoreOverlay(item.store);const idx=s2.deletes.indexOf(item.id);if(idx>=0)s2.deletes.splice(idx,1);saveOverlay(o2);addHistory({type:"restore",store:item.store,itemId:item.id,itemName:item.name||item.en||item.ja});if(refresh)refresh();showToast(T("復元しました","Restored"),"success")};
    showToast(T("削除しました","Deleted"),"info",undoDelete);
    if(refresh)refresh();
    onClose();
  };

  const handleQtyChange=(delta)=>{

function SwipeableRow({children,onSwipeLeft,onSwipeRight,isWL}){

  const[offset,setOffset]=useState(0);
  const[showLeft,setShowLeft]=useState(false);
  const[showRight,setShowRight]=useState(false);

  const onTS=ev=>{const t=ev.touches[0];state.current={sx:t.clientX,sy:t.clientY,dx:0,swiping:false,locked:false}};
  const onTM=ev=>{
    const s=state.current;const t=ev.touches[0];
    const dx=t.clientX-s.sx;const dy=t.clientY-s.sy;
    if(!s.locked){if(Math.abs(dy)>Math.abs(dx)){s.locked=true;return}if(Math.abs(dx)>8)s.swiping=true}
    if(s.locked||!s.swiping)return;
    ev.preventDefault();
    s.dx=dx;
    const clamped=Math.max(-100,Math.min(100,dx));
    setOffset(clamped);
    setShowLeft(dx<-30);
    setShowRight(dx>30);
  };
  const onTE=()=>{
    const s=state.current;
    if(s.dx<-60&&onSwipeLeft){setOffset(0);setShowLeft(false);setShowRight(false);onSwipeLeft()}
    else if(s.dx>60&&onSwipeRight){setOffset(0);setShowLeft(false);setShowRight(false);onSwipeRight()}

    s.swiping=false;
  };

    e("div",{style:{position:"absolute",left:0,top:0,bottom:0,right:0,display:"flex"}},
      e("div",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"flex-start",paddingLeft:14,background:showRight?"rgba(42,94,63,0.12)":"transparent",transition:"background 0.15s"}},

function prettySec(s){
  if(!s)return"";
  const roman={"1":"I","2":"II","3":"III","4":"IV"};
  const abbr={"CH":"Champagne","BB":"Bourgogne Blanc","BR":"Bourgogne Rouge","C BdB":"Blanc de Blancs","C BdN":"Blanc de Noirs","C Rose":"Ros\u00E9","MSD":"Morey-Saint-Denis","CM":"Chambolle-Musigny","NSG":"Nuits-Saint-Georges","VR":"Vosne-Roman\u00E9e","GC":"Gevrey-Chambertin","DRC":"Domaine de la Roman\u00E9e-Conti"};
  let r=s.trim();
  if(abbr[r])return abbr[r];
  // Match abbreviation + optional space/fullwidth-space + number, e.g. "BB2", "CH 1", "BR3"
  for(const[k,v]of Object.entries(abbr)){
    const pat=new RegExp("^"+k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"[\\s\u3000]*([\\d\uFF10-\uFF19]+|\\([\\d]+\\))$");
    const m=r.match(pat);
    if(m){
      const num=roman[m[1]]||roman[m[1].replace(/[()（）]/g,"")]||m[1];
      return v+" "+num;
    }
    if(r.startsWith(k+" ")||r.startsWith(k+"\u3000")){
      const rest=r.slice(k.length).trim();
      return v+" "+(roman[rest]||rest);
    }
  }
  // Clean up numbered suffixes like "Bourgogne Blanc(1)" or "Champagne (2)"
  const numSuffix=r.match(/[\s(（]*(\d+)[)）]?\s*$/);
  if(numSuffix){
    const base=r.replace(/[\s(（]*\d+[)）]?\s*$/,"").trim();
    const num=roman[numSuffix[1]]||numSuffix[1];
    return base+" "+num;
  }
  return r.replace(/\u30FB/g," \u00B7 ").trim();
}

// === IMPORT FLOW ===
function ImportFlow({store,onClose,onComplete}){
  const [step,setStep]=useState(1);
  const [rawData,setRawData]=useState(null);
  const [headers,setHeaders]=useState([]);
  const [mapping,setMapping]=useState({});
  const [parsed,setParsed]=useState([]);
  const [target,setTarget]=useState(store||SM[0].k);
  const fileRef=useRef(null);
  const targetFields=["name","producer","vintage","qty","price","importer","mainCat","sub","type"];
  const targetLabels={name:T("\u540D\u524D","Name"),producer:T("\u751F\u7523\u8005","Producer"),vintage:"VT",qty:T("\u6570\u91CF","Qty"),price:T("\u4FA1\u683C","Price"),importer:T("\u8CFC\u5165\u5143","Importer"),mainCat:T("\u30AB\u30C6\u30B4\u30EA","Category"),sub:T("\u7523\u5730","Region"),type:T("\u30BF\u30A4\u30D7","Type")};

  const autoMap=(cols)=>{
    const m={};
    const pats={name:/名前|ワイン名|name|品名|商品名|銘柄|ワイン|wine/i,producer:/生産者|producer|メーカー|造り手|ドメーヌ|蔵元|シャトー|maison|domaine/i,vintage:/ヴィンテージ|vintage|年|VT|年号|収穫年/i,qty:/数量|qty|quantity|本数|在庫|数|stock/i,price:/価格|price|仕入|cost|単価|原価|売価|定価/i,importer:/購入元|importer|インポーター|輸入元|仕入先|輸入業者|supplier/i,mainCat:/カテゴリ|category|分類|大分類|種別/i,sub:/サブ|sub|小分類|産地|region|地域|アペラシオン|appellation/i,type:/タイプ|type|色|種類/i};
    for(const[f,pat]of Object.entries(pats)){const match=cols.find(c=>pat.test(c));if(match)m[f]=match}
    setMapping(m);
  };

  const handleFile=(ev)=>{
    const file=ev.target.files[0];if(!file)return;
    const ext=file.name.split(".").pop().toLowerCase();
    if(ext==="csv"||ext==="tsv"){
      Papa.parse(file,{header:true,encoding:"UTF-8",skipEmptyLines:true,complete:(r)=>{setHeaders(r.meta.fields);setRawData(r.data);autoMap(r.meta.fields);setStep(2)}});
    }else if(["xlsx","xls"].includes(ext)){
      const reader=new FileReader();
      reader.onload=(ev)=>{const wb=XLSX.read(ev.target.result,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws,{defval:""});if(data.length>0){setHeaders(Object.keys(data[0]));setRawData(data);autoMap(Object.keys(data[0]));setStep(2)}};
      reader.readAsArrayBuffer(file);
    }
  };

  const doParse=()=>{
    const items=rawData.map(row=>{
      const it={};
      targetFields.forEach(f=>{if(mapping[f])it[f]=row[mapping[f]]||""});
      it.qty=parseFloat(it.qty)||0;
      it.price=parseFloat(it.price)||0;
      if(!it.name)it.name=it.producer||"不明";
      if(it.name&&it.producer&&it.name.startsWith(it.producer)){const rest=it.name.slice(it.producer.length).trim();if(rest)it.name=rest}
      if(!it.producer&&it.name){const seps=[" / ","／",", ","　"];for(const sep of seps){const idx=it.name.indexOf(sep);if(idx>0&&idx<it.name.length-sep.length){it.producer=it.name.slice(0,idx).trim();it.name=it.name.slice(idx+sep.length).trim();break}}}
      if(!it.sub&&it.name){const rm=it.name.match(/(?:Bourgogne|Bordeaux|Champagne|Loire|Alsace|Rh[oô]ne|Languedoc|Provence|Chablis|Meursault|Beaune|Pommard|Volnay|Margaux|Pauillac|Saint-[EÉ]milion|Barolo|Barbaresco|Chianti|Toscana|Napa|Sonoma|Marlborough)/i);if(rm)it.sub=rm[0]}
      return it;
    }).filter(it=>it.name&&it.name!=="不明");
    setParsed(items);
    setStep(3);
  };

  const doImport=()=>{
    const{ov,s}=getStoreOverlay(target);
    const ts=Date.now();const newItems=parsed.map((p,i)=>({id:"add_"+ts+"_"+i+"_"+Math.random().toString(36).slice(2,6),name:p.name,producer:p.producer||"",vintage:p.vintage||"",qty:p.qty||0,price:p.price||0,importer:p.importer||"",mainCat:p.mainCat||"\u305D\u306E\u4ED6",sub:p.sub||"",type:p.type||"wine",cat:"wine"}));
    s.adds.push(...newItems);
    saveOverlay(ov);
    addHistory({type:"import",store:target,count:newItems.length,ids:newItems.map(i=>i.id)});
    showToast(newItems.length+T("件インポートしました"," items imported"),"success");
    setStep(4);
    setTimeout(onComplete,1500);
  };

  const selectSt={width:"100%",padding:"10px 12px",border:"1px solid "+C.border,borderRadius:2,fontSize:13,fontFamily:"inherit",background:C.card};

  // Step 1: Upload
  if(step===1)return e("div",{style:{padding:"20px 16px 80px"}},
    e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
      e("button",{onClick:onClose,style:{background:"none",border:"none",cursor:"pointer",padding:4}},e(BackIco)),
      e("div",{style:{fontSize:16,fontWeight:400,fontFamily:"'Shippori Mincho',serif",letterSpacing:2}},T("Excel/CSVインポート","Excel/CSV Import")),
    ),
    e("div",{style:{fontSize:10,color:C.sub,letterSpacing:1,textTransform:"uppercase",marginBottom:6,fontFamily:"'DM Sans',sans-serif"}},T("STEP 1 / 3 \u2014 ファイル選択","STEP 1 / 3 \u2014 Select File")),
    e("div",{style:{marginBottom:16}},
      e("label",{style:{display:"block",fontSize:10,color:C.sub,marginBottom:4,fontFamily:"'DM Sans',sans-serif"}},T("店舗","Store")),
      e("select",{value:target,onChange:ev=>setTarget(ev.target.value),style:selectSt},...SM.map(m=>e("option",{key:m.k,value:m.k},m.k)))
    ),
    e("div",{onClick:()=>fileRef.current&&fileRef.current.click(),style:{border:"2px dashed "+C.border,borderRadius:2,padding:"40px 20px",textAlign:"center",cursor:"pointer",background:C.card}},
      e("div",{style:{fontSize:28,marginBottom:8}},"📄"),
      e("div",{style:{fontSize:13,color:C.sub}},T("Excel (.xlsx) または CSV ファイルを選択","Select Excel (.xlsx) or CSV file")),
      e("div",{style:{fontSize:11,color:C.accent,marginTop:8}},T("タップしてファイルを選ぶ","Tap to select file")),
      e("input",{ref:fileRef,type:"file",accept:".csv,.tsv,.xlsx,.xls",onChange:handleFile,style:{display:"none"}})
    )
  );

  // Step 2: Column mapping
  if(step===2)return e("div",{style:{padding:"20px 16px 80px"}},
    e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
      e("button",{onClick:()=>setStep(1),style:{background:"none",border:"none",cursor:"pointer",padding:4}},e(BackIco)),
      e("div",{style:{fontSize:16,fontWeight:400,fontFamily:"'Shippori Mincho',serif",letterSpacing:2}},T("カラムマッピング","Column Mapping")),
    ),
    e("div",{style:{fontSize:10,color:C.sub,letterSpacing:1,textTransform:"uppercase",marginBottom:12,fontFamily:"'DM Sans',sans-serif"}},T("STEP 2 / 3 \u2014 "+rawData.length+"行 検出","STEP 2 / 3 \u2014 "+rawData.length+" rows detected")),
    ...targetFields.map(f=>e("div",{key:f,style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
      e("div",{style:{width:70,fontSize:11,color:C.sub,fontFamily:"'DM Sans',sans-serif",textAlign:"right"}},targetLabels[f]),
      e("div",{style:{fontSize:12,color:C.sub}},"\u2190"),
      e("select",{value:mapping[f]||"",onChange:ev=>{const m={...mapping};if(ev.target.value)m[f]=ev.target.value;else delete m[f];setMapping(m)},style:{...selectSt,flex:1}},
        e("option",{value:""},T("(スキップ)","(Skip)")),
        ...headers.map(h=>e("option",{key:h,value:h},h))
      )
    )),
    e("button",{onClick:doParse,style:{width:"100%",padding:"14px",background:mapping.name?"#3A3630":"#D0CBC0",color:"#FDFCFA",border:"none",borderRadius:2,fontSize:14,fontWeight:500,cursor:mapping.name?"pointer":"not-allowed",fontFamily:"inherit",marginTop:12,letterSpacing:1}},T("\u30D7\u30EC\u30D3\u30E5\u30FC","Preview"))
  );

  // Step 3: Preview
  if(step===3)return e("div",{style:{padding:"20px 16px 80px"}},
    e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
      e("button",{onClick:()=>setStep(2),style:{background:"none",border:"none",cursor:"pointer",padding:4}},e(BackIco)),
      e("div",{style:{fontSize:16,fontWeight:400,fontFamily:"'Shippori Mincho',serif",letterSpacing:2}},T("プレビュー","Preview")),
    ),
    e("div",{style:{fontSize:10,color:C.sub,letterSpacing:1,textTransform:"uppercase",marginBottom:12,fontFamily:"'DM Sans',sans-serif"}},T("STEP 3 / 3 \u2014 "+parsed.length+"件を "+target+" に追加","STEP 3 / 3 \u2014 Add "+parsed.length+" items to "+target)),
    e("div",{style:{maxHeight:400,overflowY:"auto",border:"1px solid "+C.border,borderRadius:2}},
      ...parsed.slice(0,30).map((it,i)=>e("div",{key:i,style:{padding:"8px 12px",borderBottom:"1px solid "+C.border,fontSize:12}},
        e("div",{style:{fontWeight:500}},it.name+(it.vintage?" "+it.vintage:"")),
        e("div",{style:{color:C.sub,fontSize:11}},(it.producer||"")+(" ")+fmtP(it.price)+(it.qty?" × "+it.qty+"本":""))
      )),
      parsed.length>30&&e("div",{style:{padding:"8px 12px",fontSize:11,color:C.sub,textAlign:"center"}},"... 他 "+(parsed.length-30)+"件")
    ),
    e("div",{style:{display:"flex",gap:8,marginTop:16}},
      e("button",{onClick:()=>setStep(2),style:{flex:1,padding:"14px",background:C.card,color:C.sub,border:"1px solid "+C.border,borderRadius:2,fontSize:14,cursor:"pointer",fontFamily:"inherit"}},T("戻る","Back")),

    )

  );
}

// === TRASH PAGE (削除リスト) ===
function TrashPage({onClose,refresh}){
  const ov=loadOverlay();
  const hist=loadHistory();
  const [ver,setVer]=useState(0);
  // Collect all deleted items with their snapshots from history
  const deleted=[];
  const stores=ov.stores||{};
  Object.entries(stores).forEach(([store,sOv])=>{
    (sOv.deletes||[]).forEach(id=>{
      const snap=hist.slice().reverse().find(h=>h.type==="delete"&&h.itemId===id&&h.snapshot);
      deleted.push({id,store,name:snap?snap.itemName:id,snapshot:snap?snap.snapshot:null,ts:snap?snap.ts:0});
    });
  });
  deleted.sort((a,b)=>b.ts-a.ts);

  const handleRestore=(item)=>{
    const{ov:ov2,s}=getStoreOverlay(item.store);
    const idx=s.deletes.indexOf(item.id);
    if(idx>=0)s.deletes.splice(idx,1);
    saveOverlay(ov2);
    addHistory({type:"restore",store:item.store,itemId:item.id,itemName:item.name});
    showToast(item.name+T(" を復元しました"," restored"),"success");
    if(refresh)refresh();
    setVer(v=>v+1);
  };

  const fmtTime=ts=>{if(!ts)return"";const d=new Date(ts);return d.toLocaleDateString("ja-JP")};

  return e("div",{style:{padding:"20px 16px 80px"}},
    e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
      e("button",{onClick:onClose,style:{background:"none",border:"none",cursor:"pointer",padding:4}},e(BackIco)),
      e("div",{style:{fontSize:16,fontWeight:400,fontFamily:"'Shippori Mincho',serif",letterSpacing:2}},T("削除リスト","Trash")),
    ),
    e("div",{style:{fontSize:11,color:C.sub,marginBottom:16}},T(deleted.length+"件の削除済みアイテム",deleted.length+" deleted items")),
    deleted.length===0?e("div",{style:{textAlign:"center",padding:"60px 20px"}},
      e("div",{style:{fontSize:32,marginBottom:8}},"✓"),
      e("div",{style:{fontSize:13,color:C.sub}},T("削除済みアイテムはありません","No deleted items"))
    ):
    deleted.map((item,i)=>e("div",{key:item.id+"-"+i,style:{padding:"12px 14px",marginBottom:6,background:C.card,border:"1px solid "+C.border,borderRadius:2}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        e("div",{style:{flex:1}},
          e("div",{style:{fontSize:13,fontWeight:500}},item.name),
          e("div",{style:{fontSize:10,color:C.sub,marginTop:2}},item.store+(item.snapshot?" · "+(item.snapshot.mainCat||""):"")+(item.ts?" · "+fmtTime(item.ts):"")),
          item.snapshot&&e("div",{style:{fontSize:10,color:C.sub,marginTop:1}},
            (item.snapshot.qty!=null?T("数量","Qty")+": "+item.snapshot.qty+T("本",""):"")+(item.snapshot.price?" · "+fmtP(item.snapshot.price):"")+(item.snapshot.vintage?" · "+item.snapshot.vintage:"")
          )
        ),
        e("button",{onClick:()=>handleRestore(item),style:{padding:"8px 14px",fontSize:11,border:"1px solid "+C.accent,borderRadius:2,background:"rgba(139,105,20,0.06)",color:C.accent,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:500,whiteSpace:"nowrap"}},T("復元","Restore"))
      )
    ))
  );
}

// === STOCKTAKING MODE (棚卸し) ===
function StocktakingMode({store,onClose,refresh}){
  const[selCat,setSelCat]=useState(null);
  const[changes,setChanges]=useState({});
  const[saved,setSaved]=useState(false);
  const items=useMemo(()=>getItems(store),[store]);
  const cats=useMemo(()=>{const m={};items.forEach(it=>{const c=it.mainCat||"その他";if(!m[c])m[c]=[];m[c].push(it)});return Object.entries(m).sort((a,b)=>b[1].length-a[1].length)},[items]);
  const currentItems=selCat?items.filter(it=>(it.mainCat||"その他")===selCat):[];
  const changeCount=Object.keys(changes).length;

  const adj=(id,delta)=>{
    const it=items.find(x=>x.id===id);if(!it)return;
    const cur=changes[id]!=null?changes[id]:(it.qty||0);
    const nv=Math.max(0,cur+delta);
    setChanges(c=>({...c,[id]:nv}));
  };
  const setVal=(id,v)=>{setChanges(c=>({...c,[id]:v}))};

  const doSave=()=>{
    const ov=loadOverlay();if(!ov.stores)ov.stores={};if(!ov.stores[store])ov.stores[store]={edits:{},adds:[],deletes:[]};
    const s=ov.stores[store];
    const snapBefore={};
    Object.entries(changes).forEach(([id,newVal])=>{
      const it=items.find(x=>x.id===id);if(!it)return;
      const oldVal=it.qty||0;if(newVal===oldVal){return}
      snapBefore[id]=oldVal;
      if(id.startsWith("add_")){const idx=(s.adds||[]).findIndex(a=>a.id===id);if(idx>=0)s.adds[idx].qty=newVal}
      else{s.edits[id]={...(s.edits[id]||{}),qty:newVal}}
      addHistory({type:"edit",store,itemId:id,itemName:it.name||it.en||it.ja,before:{qty:oldVal},after:{qty:newVal}});
    });
    saveOverlay(ov);
    const realChanges=Object.entries(changes).filter(([id,nv])=>{const it=items.find(x=>x.id===id);return it&&nv!==(it.qty||0)});
    const undoAll=()=>{
      const ov2=loadOverlay();if(!ov2.stores||!ov2.stores[store])return;const s2=ov2.stores[store];
      Object.entries(snapBefore).forEach(([id,oldVal])=>{
        if(id.startsWith("add_")){const idx=(s2.adds||[]).findIndex(a=>a.id===id);if(idx>=0)s2.adds[idx].qty=oldVal}
        else{s2.edits[id]={...(s2.edits[id]||{}),qty:oldVal}}
        const it=items.find(x=>x.id===id);addHistory({type:"edit",store,itemId:id,itemName:it?it.name||it.en||it.ja:"",before:{qty:changes[id]},after:{qty:oldVal}});
      });
      saveOverlay(ov2);refresh();showToast(T("棚卸しを元に戻しました","Stocktaking undone"),"success");
    };
    refresh();
    showToast(realChanges.length+T("件を更新しました"," items updated"),"success",realChanges.length>0?undoAll:null);
    setSaved(true);
    setTimeout(onClose,600);
  };

  const catBtnSt=(active)=>({padding:"6px 14px",borderRadius:20,border:"1px solid "+(active?C.accent:C.border),background:active?"rgba(139,105,20,0.1)":C.card,color:active?C.accent:C.text,fontSize:12,cursor:"pointer",fontFamily:"'Noto Sans JP','DM Sans',sans-serif",whiteSpace:"nowrap",fontWeight:active?600:400});

  return e("div",{style:{padding:"20px 16px 100px",minHeight:"100vh",background:C.bg}},
    e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
      e("button",{onClick:onClose,style:{background:"none",border:"none",cursor:"pointer",padding:4}},e(BackIco)),
      e("div",null,
        e("div",{style:{fontSize:16,fontWeight:400,fontFamily:"'Shippori Mincho',serif",letterSpacing:2}},T("棚卸しモード","Stocktaking")),
        e("div",{style:{fontSize:11,color:C.sub}},store)
      )
    ),
    e("div",{style:{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12}},
      ...cats.map(([cat,arr])=>{
        const [fg]=MCC[cat]||["#888"];
        const changed=arr.filter(it=>changes[it.id]!=null&&changes[it.id]!==(it.qty||0)).length;
        return e("button",{key:cat,onClick:()=>setSelCat(selCat===cat?null:cat),style:{...catBtnSt(selCat===cat),borderColor:selCat===cat?fg:C.border,color:selCat===cat?fg:C.sub}},
          cat+" ("+arr.length+")",changed>0?e("span",{style:{marginLeft:4,fontSize:9,color:C.green,fontWeight:700}},changed+"✓"):null
        )
      })
    ),
    !selCat&&e("div",{style:{textAlign:"center",padding:"40px 20px",color:C.sub,fontSize:13}},T("カテゴリを選択して棚卸しを開始","Select a category to start")),
    selCat&&currentItems.map(it=>{
      const cur=changes[it.id]!=null?changes[it.id]:(it.qty||0);
      const orig=it.qty||0;
      const diff=cur-orig;
      const wd=wineDisplayName(it,false);
      return e("div",{key:it.id,style:{padding:"10px 14px",marginBottom:4,background:C.card,border:"1px solid "+(diff!==0?"rgba(139,105,20,0.3)":C.border),borderRadius:2,display:"flex",alignItems:"center",justifyContent:"space-between"}},
        e("div",{style:{flex:1,minWidth:0,marginRight:10}},
          e("div",{style:{fontSize:13,fontWeight:500,fontFamily:"'Cormorant Garamond','Noto Sans JP',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},wd.name),
          wd.vintage&&wd.vintage!=="NV"&&e("span",{style:{fontSize:10,color:C.sub,fontFamily:"'DM Sans',sans-serif"}},wd.vintage),
          diff!==0&&e("span",{style:{marginLeft:6,fontSize:9,color:diff>0?C.green:C.danger,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}},(diff>0?"+":"")+diff)
        ),
        e("div",{style:{display:"flex",alignItems:"center",gap:0}},
          e("button",{onClick:()=>adj(it.id,-1),style:{width:32,height:32,border:"1px solid "+C.border,borderRadius:"6px 0 0 6px",background:C.card,cursor:"pointer",fontSize:16,color:C.text,fontFamily:"'DM Sans',sans-serif"}},"-"),
          e("input",{type:"number",value:cur,onChange:ev=>{const v=parseInt(ev.target.value);if(!isNaN(v)&&v>=0)setVal(it.id,v)},style:{width:40,height:32,border:"1px solid "+C.border,borderLeft:"none",borderRight:"none",textAlign:"center",fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",outline:"none",MozAppearance:"textfield",WebkitAppearance:"none"}}),
          e("button",{onClick:()=>adj(it.id,1),style:{width:32,height:32,border:"1px solid "+C.border,borderRadius:"0 6px 6px 0",background:C.card,cursor:"pointer",fontSize:16,color:C.text,fontFamily:"'DM Sans',sans-serif"}},"+")
        )
      )
    }),
    changeCount>0&&e("div",{style:{position:"fixed",bottom:70,left:16,right:16,zIndex:100}},
      e("button",{onClick:doSave,style:{width:"100%",padding:"14px",background:"#1A1714",color:"#FDFCFA",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans JP','DM Sans',sans-serif",boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}},T("一括保存 ("+changeCount+"件の変更)","Save All ("+changeCount+" changes)"))
    )
  );
}

    const bandCounts=priceBands.map(()=>0);
    const catMap={};

    SM.forEach(m=>{
      const inv=getItems(m.k);

        totalItems++;totalQty+=it.qty||0;const val=(it.qty||0)*(it.price||0);totalValue+=val;

          ),
          e("div",{style:{width:24,fontSize:10,color:C.text,fontWeight:600,fontFamily:"'DM Sans',sans-serif",textAlign:"right"}},data.bandCounts[i])
        )
      )
    ),

    // Category ratio
    e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:2,padding:"14px",marginBottom:12}},
      e("div",{style:{fontSize:11,fontWeight:600,marginBottom:10,fontFamily:"'DM Sans',sans-serif",letterSpacing:0.5}},"CATEGORY"),
      e("div",{style:{display:"flex",height:20,borderRadius:4,overflow:"hidden",marginBottom:8}},
        ...catEntries.map(([cat,cnt])=>{const [fg]=MCC[cat]||["#888"];return e("div",{key:cat,style:{width:(cnt/totalCat*100)+"%",background:fg,minWidth:cnt>0?2:0,transition:"width 0.3s"}})})
      ),
      e("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px 12px"}},
        ...catEntries.map(([cat,cnt])=>{const [fg]=MCC[cat]||["#888"];return e("div",{key:cat,style:{display:"flex",alignItems:"center",gap:4}},
          e("div",{style:{width:8,height:8,borderRadius:2,background:fg}}),
          e("span",{style:{fontSize:10,color:C.sub,fontFamily:"'DM Sans',sans-serif"}},cat+" "+cnt)
        )})
      )
    ),

    // Store summary
    e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:2,padding:"14px"}},
      e("div",{style:{fontSize:11,fontWeight:600,marginBottom:10,fontFamily:"'DM Sans',sans-serif",letterSpacing:0.5}},"STORES"),
      ...data.storeStats.map(s=>
        e("div",{key:s.name,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.border}},
          e("div",null,
            e("div",{style:{fontSize:13,fontWeight:500,fontFamily:"'Shippori Mincho',serif"}},s.name),
            e("div",{style:{fontSize:10,color:C.sub}},s.items+T("種","")+" \u00B7 "+Math.round(s.qty)+T("本","")+" \u00B7 "+s.topCat)
          ),
          e("div",{style:{fontSize:12,fontWeight:600,color:C.accent,fontFamily:"'DM Sans',sans-serif"}},fmtY(Math.round(s.value)))
        )
      )
    )
  );
}

// === SETTINGS PAGE ===
function SettingsPage({refresh}){
  const ov=loadOverlay();
  const hist=loadHistory();
  const ovSize=(JSON.stringify(ov).length/1024).toFixed(1);
  const histSize=(JSON.stringify(hist).length/1024).toFixed(1);
  const totalEdits=Object.values(ov.stores||{}).reduce((s,st)=>s+Object.keys(st.edits||{}).length+(st.adds||[]).length+(st.deletes||[]).length,0);
  const clearEdits=()=>{if(confirm(T("すべての変更をリセットしますか？元のデータに戻ります。","Reset all changes? This will restore original data."))){_overlay={};if(_idbAvailable)IDB.remove(LS_OVERLAY);else localStorage.removeItem(LS_OVERLAY);refresh()}};
  const clearHist=()=>{if(confirm(T("すべての履歴を削除しますか？","Clear all history?"))){_history=[];if(_idbAvailable)IDB.remove(LS_HISTORY);else localStorage.removeItem(LS_HISTORY);refresh()}};
  const exportData=async()=>{
    const pa=await loadPairingsAsync();const co=await loadCommentsAsync();
    const data={overlay:ov,history:hist,pairings:pa,comments:co,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="beverage_compass_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();
  };
  const btnSt={width:"100%",padding:"14px",border:"1px solid "+C.border,borderRadius:2,fontSize:13,cursor:"pointer",fontFamily:"inherit",marginBottom:8,background:C.card};
  return e("div",{style:{padding:"20px 16px 80px"}},
    e("div",{style:{fontSize:18,fontWeight:400,fontFamily:"'Shippori Mincho',serif",letterSpacing:2,marginBottom:20}},T("\u8A2D\u5B9A","Settings")),
    e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:2,padding:"16px",marginBottom:16}},
      e("div",{style:{fontSize:12,fontWeight:600,marginBottom:10,fontFamily:"'DM Sans',sans-serif"}},"LANGUAGE"),
      e("div",{style:{display:"flex",gap:8}},
        e("button",{onClick:()=>setLang("ja"),style:{flex:1,padding:"8px",border:"1px solid "+(_lang==="ja"?C.accent:C.border),borderRadius:4,background:_lang==="ja"?"rgba(139,105,20,0.08)":C.card,fontSize:12,cursor:"pointer",fontWeight:_lang==="ja"?600:400,color:_lang==="ja"?C.accent:C.sub,fontFamily:"'Noto Sans JP',sans-serif"}},"\u65E5\u672C\u8A9E"),
        e("button",{onClick:()=>setLang("en"),style:{flex:1,padding:"8px",border:"1px solid "+(_lang==="en"?C.accent:C.border),borderRadius:4,background:_lang==="en"?"rgba(139,105,20,0.08)":C.card,fontSize:12,cursor:"pointer",fontWeight:_lang==="en"?600:400,color:_lang==="en"?C.accent:C.sub,fontFamily:"'DM Sans',sans-serif"}},"English"))
    ),
    e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:2,padding:"16px",marginBottom:16}},
      e("div",{style:{fontSize:12,fontWeight:600,marginBottom:10,fontFamily:"'DM Sans',sans-serif"}},"DATA"),
      e("div",{style:{fontSize:11,color:C.sub,marginBottom:3}},T("\u5909\u66F4\u6570","Changes")+": "+totalEdits+T("\u4EF6","")),
      e("div",{style:{fontSize:11,color:C.sub,marginBottom:3}},T("\u5909\u66F4\u30C7\u30FC\u30BF","Data")+": "+ovSize+"KB"),
      e("div",{style:{fontSize:11,color:C.sub,marginBottom:3}},T("\u5C65\u6B74","History")+": "+hist.length+T("\u4EF6","")+" ("+histSize+"KB)"),
      e("div",{style:{height:4,background:C.border,borderRadius:2,marginTop:8}},
        e("div",{style:{height:4,background:C.accent,borderRadius:2,width:Math.min(100,(parseFloat(ovSize)+parseFloat(histSize))/50*100)+"%",transition:"width 0.3s"}}))
    ),
    e("button",{onClick:exportData,style:{...btnSt,color:C.accent}},T("\uD83D\uDCE6 \u30C7\u30FC\u30BF\u30A8\u30AF\u30B9\u30DD\u30FC\u30C8 (JSON)","\uD83D\uDCE6 Export Data (JSON)")),
    e("button",{onClick:()=>{
      const BOM="\uFEFF";const hdr=["店舗","カテゴリ","名前","生産者","ヴィンテージ","数量","仕入価格","在庫金額"];
      const rows=[hdr.join(",")];
      SM.forEach(m=>{getItems(m.k).forEach(it=>{rows.push([m.k,it.mainCat||"",'"'+(it.name||"").replace(/"/g,'""')+'"','"'+(it.producer||"").replace(/"/g,'""')+'"',it.vintage||"",it.qty||0,it.price||0,Math.round((it.qty||0)*(it.price||0))].join(","))})});
      const blob=new Blob([BOM+rows.join("\n")],{type:"text/csv;charset=utf-8"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="beverage_inventory_"+new Date().toISOString().slice(0,10)+".csv";a.click();
      showToast(T("CSVをダウンロードしました","CSV downloaded"),"success");
    },style:{...btnSt,color:C.green}},T("\uD83D\uDCCA \u5728\u5EAB\u30EC\u30DD\u30FC\u30C8 (CSV)","\uD83D\uDCCA Inventory Report (CSV)")),
    e("button",{onClick:clearEdits,style:{...btnSt,color:C.danger}},T("\u5909\u66F4\u3092\u30EA\u30BB\u30C3\u30C8","Reset Changes")),
    e("button",{onClick:clearHist,style:{...btnSt,color:C.sub}},T("\u5C65\u6B74\u3092\u30AF\u30EA\u30A2","Clear History"))
  );
}

// === MAIN APP ===
function App(){
  const [tab,setTab]=useState("home");
  const [openSection,setOpenSection]=useState(null);
  const [openCatInfo,setOpenCatInfo]=useState(null);
  const [showAI,setShowAI]=useState(false);
  const [showDash,setShowDash]=useState(false);
  const [overlayVer,setOverlayVer]=useState(0);
  const refresh=()=>setOverlayVer(v=>v+1);

  const toggleSection=(ev,s)=>{ev.stopPropagation();setOpenSection(openSection===s?null:s)};

  if(tab==="search") return e("div",null,e(GlobalSearch,{onClose:()=>setTab("home"),refresh}),e(BottomNav,{tab,setTab}));
  if(showAI) return e(AIChat,{onClose:()=>setShowAI(false)});
  if(showDash) return e("div",null,e(Dashboard,{onClose:()=>setShowDash(false),overlayVer}),e(BottomNav,{tab,setTab}));
  if(tab==="camera") return e("div",null,e(StockManager,{refresh}),e(BottomNav,{tab,setTab}));
  if(tab==="list") return e("div",null,e(WineListTab),e(BottomNav,{tab,setTab}));
  if(tab==="settings") return e("div",null,e(SettingsPage,{refresh}),e(BottomNav,{tab,setTab}));

  if(openCatInfo){
    const {store,cat,mode}=openCatInfo;
    const items=mode==="inv"?getItems(store).filter(i=>i.mainCat===cat):getWL(store).filter(i=>i.mainCat===cat);
    return e(ItemListPage,{items,mode,storeName:store,catName:cat,onBack:()=>setOpenCatInfo(null),refresh});
  }

  return e("div",null,e("div",{style:{padding:"0 16px 80px"}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 14px"}},
      e("div",{style:{fontSize:18,fontWeight:600,fontFamily:"'Cormorant Garamond','DM Sans',serif",letterSpacing:"0.5px",color:C.sub}},"Beverage Compass"),
      e("div",{style:{display:"flex",gap:6}},
        e("button",{onClick:()=>setShowDash(true),style:{height:32,width:32,borderRadius:2,border:"1px solid "+C.border,background:C.card,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},"\uD83D\uDCCA"),
        e("button",{onClick:()=>setShowAI(true),style:{height:32,padding:"0 12px",borderRadius:2,border:"1px solid "+C.border,background:C.card,cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:10,fontWeight:600,color:"#8B6914",fontFamily:"'DM Sans',sans-serif"}},"AI Sommelier")
      )
    ),

    (()=>{
      let totalTypes=0,totalQty=0,totalValue=0;
      SM.forEach(m=>{
        const inv=getItems(m.k);
        inv.forEach(it=>{totalTypes++;totalQty+=it.qty;if(it.price)totalValue+=it.qty*it.price});
      });
      return e("div",{style:{marginBottom:12,borderRadius:2,overflow:"hidden",background:"linear-gradient(135deg,#E0DBCF 0%,#D5D0C6 100%)",padding:"16px 20px",color:"#3A3630",border:"1px solid "+C.border}},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
          e("div",{style:{fontSize:16,fontWeight:600,letterSpacing:1,fontFamily:"'Cormorant Garamond','DM Sans',serif"}},"All Inventory"),
          e("div",{style:{fontSize:10,color:"rgba(74,68,64,0.45)",fontFamily:"'DM Sans',sans-serif"}},SM.filter(m=>getItems(m.k).length>0).length+" stores")
        ),
        e("div",{style:{display:"flex",gap:0}},
          e("div",{style:{flex:1}},e("div",{style:{fontSize:9,color:"rgba(74,68,64,0.45)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'DM Sans',sans-serif"}},T("\u5728\u5EAB","Types")),e("div",{style:{fontSize:18,fontWeight:700,fontFamily:"'DM Sans',sans-serif",marginTop:2}},totalTypes.toLocaleString()+T("\u7A2E",""))),
          e("div",{style:{flex:1}},e("div",{style:{fontSize:9,color:"rgba(74,68,64,0.45)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'DM Sans',sans-serif"}},T("\u672C\u6570","Bottles")),e("div",{style:{fontSize:18,fontWeight:700,fontFamily:"'DM Sans',sans-serif",marginTop:2}},Math.round(totalQty).toLocaleString()+T("\u672C",""))),
          e("div",{style:{flex:1}},e("div",{style:{fontSize:9,color:"rgba(74,68,64,0.45)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'DM Sans',sans-serif"}},T("\u5728\u5EAB\u7DCF\u984D","Total Value")),e("div",{style:{fontSize:18,fontWeight:700,color:"#8B6914",fontFamily:"'DM Sans',sans-serif",marginTop:2}},fmtY(Math.round(totalValue))))
        )
      );
    })(),

    ...SM.map(m=>{
      const invItems=getItems(m.k);const wlItems=getWL(m.k);
      const invSum=invItems.length>0?summarize(invItems):null;
      const wlSum=wlItems.length>0?summarizeWL(wlItems):null;
      const invSec="inv-"+m.k,wlSec="wl-"+m.k;
      const invOpen=openSection===invSec,wlOpen=openSection===wlSec;

      const hasData=invSum||wlSum;
      return e("div",{key:m.k,style:{marginBottom:8,borderRadius:2,overflow:"hidden",border:"1px solid "+C.border}},
        e("div",{style:{background:"linear-gradient(135deg,"+m.c+" 0%,"+m.c2+" 100%)",padding:"14px 16px",color:m.t||"#4A4440",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
          e("div",null,
            e("div",{style:{fontSize:20,fontWeight:400,fontFamily:m.k==="\u30D0\u30FC\u30AC\u30F3\u30C7\u30A3\u5009\u5EAB"?"'Cormorant Garamond','DM Sans',serif":"'Shippori Mincho','Noto Sans JP',serif",letterSpacing:"3px"}},m.k==="\u30D0\u30FC\u30AC\u30F3\u30C7\u30A3\u5009\u5EAB"?m.en:m.k),
            e("div",{style:{fontSize:10,fontWeight:400,color:"rgba(74,68,64,0.5)",fontFamily:"'Cormorant Garamond','DM Sans',serif",letterSpacing:"1.5px",marginTop:3}},m.k==="\u30D0\u30FC\u30AC\u30F3\u30C7\u30A3\u5009\u5EAB"?"Warehouse":(m.ja?m.ja+" / "+m.en:m.en))
          ),
          hasData&&e("div",{style:{textAlign:"right",flexShrink:0,marginLeft:12}},
            invSum&&e("div",{style:{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}},
              e("span",{style:{fontSize:11,color:"rgba(74,68,64,0.55)",fontFamily:"'DM Sans',sans-serif"}},invSum.items+T("\u7A2E","")),
              e("span",{style:{fontSize:11,color:"rgba(74,68,64,0.55)",fontFamily:"'DM Sans',sans-serif"}},Math.round(invSum.qty).toLocaleString()+T("\u672C","")),
              e("span",{style:{fontSize:11,color:C.accent,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}},fmtY(Math.round(invSum.value)))
            ),
            wlSum&&e("div",{style:{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",marginTop:2}},
              e("span",{style:{fontSize:10,color:"rgba(74,68,64,0.4)",fontFamily:"'DM Sans',sans-serif"}},T("\u30EA\u30B9\u30C8","List")+" "+wlSum.items+T("\u7A2E","")),
              e("span",{style:{fontSize:10,color:"rgba(139,105,20,0.6)",fontWeight:600,fontFamily:"'DM Sans',sans-serif"}},wlSum.sell>0?fmtY(Math.round(wlSum.sell)):"\u2014")
            )
          )
        ),
        (invSum||wlSum)&&e("div",{style:{background:C.card}},
          invSum&&e("div",null,
            e("div",{onClick:ev=>toggleSection(ev,invSec),style:{padding:"9px 16px",cursor:"pointer",display:"flex",alignItems:"center",borderBottom:"1px solid "+C.border}},
              e("div",{style:{fontSize:12,fontWeight:500,color:C.sub,flex:1}},T("\u5728\u5EAB","Inventory")),
              e(Chev,{open:invOpen})
            ),
            invOpen&&e("div",{style:{padding:"8px 12px 10px"}},
              e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
                ...MC.filter(mc=>invSum&&invSum.cats[mc]).map(mc=>{const ct=invSum.cats[mc];return e(CatCard,{key:mc,label:mc,count:ct.c,qty:ct.q,value:ct.v,onClick:()=>setOpenCatInfo({store:m.k,cat:mc,mode:"inv"})})})))
          ),
          wlSum&&e("div",null,
            e("div",{onClick:ev=>toggleSection(ev,wlSec),style:{padding:"9px 16px",cursor:"pointer",display:"flex",alignItems:"center",borderBottom:wlOpen?"1px solid "+C.border:"none"}},
              e("div",{style:{fontSize:12,fontWeight:500,color:C.sub,flex:1}},T("\u30EA\u30B9\u30C8","List")),
              e(Chev,{open:wlOpen})
            ),
            wlOpen&&e("div",{style:{padding:"8px 12px 10px"}},
              e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
                ...MC.filter(mc=>wlSum&&wlSum.cats[mc]).map(mc=>{const ct=wlSum.cats[mc];return e(CatCard,{key:mc,label:mc,count:ct.c,onClick:()=>setOpenCatInfo({store:m.k,cat:mc,mode:"wl"})})})),
              e("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:6}},
                e("button",{onClick:ev=>{ev.stopPropagation();showToast(T("AI Check 機能は開発中です","AI Check is in development"),"info")},style:{padding:"5px 12px",borderRadius:6,border:"1px solid rgba(139,105,20,0.3)",background:"rgba(139,105,20,0.04)",color:C.accent,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:4}},"\u2728 AI Check"))
            )
          )
        )
      );
    })
  ),e(BottomNav,{tab,setTab}));
}

(async()=>{document.getElementById("root").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:DM Sans,sans-serif;color:#6B6456">Loading...</div>';await initStorage();ReactDOM.render(e(React.Fragment,null,e(App),e(Toast)),document.getElementById("root"))})();
</script>
