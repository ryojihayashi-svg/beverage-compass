              borderRadius: 14, overflow: 'hidden',
            }
          },
            items.map((s, i) => e('div', {
              key: s.id,
              style: {
                display: 'flex', alignItems: 'flex-start', gap: 12,
                padding: '14px 16px',
                borderBottom: i < items.length - 1 ? '1px solid ' + C.line : 'none',
              }
            },
              e('div', { style: { flex: 1, minWidth: 0 } },
                e('div', { style: { fontSize: 12, color: C.sub, marginBottom: 4 } }, s.ja),
                e('div', {
                  style: { fontFamily: SERIF, fontSize: 16, fontWeight: 500, color: C.text, lineHeight: 1.4 }
                }, s.en),
              ),
              e('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6, flexShrink: 0 } },
                e('span', {
                  style: {
                    fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 999,
                    background: C.softer, color: C.gold, fontFamily: SANS_UI, letterSpacing: '0.06em',
                  }
                }, 'レベル ' + s.level),
                e(SpeakerBtn, { onClick: () => speak(s.en), color: profile.color, size: 30 }),
              ),
            )),
          ),
    );
  }

  // ---------- Family Feed Screen ----------
  // Renders activity entries posted across the family (session done, badges
  // earned). Each entry can receive emoji reactions from any member on this
  // device (per-feed-id, per-member-id; toggle on second tap).

  // ---------- Achievements Screen (full grid of all 23 badges) ----------

  // ---------- Daily Phrases (簡単英語) ----------
  // Scene-tagged phrasebook with a Daily20-style practice flow.
  function DailyPhrases({ profile, onBack }) {
    const [filter, setFilter] = useState('all');  // 'all' | 'school' | 'cafeteria' | 'friends'
    const filtered = useMemo(() => {
      if (filter === 'all') return DAILY_PHRASES;
      return DAILY_PHRASES.filter(p => p.scene === filter);
    }, [filter]);

    const [phase, setPhase]   = useState(filtered.length > 0 ? 'intro' : 'empty');
    const [queue, setQueue]   = useState([]);
    const [index, setIndex]   = useState(0);
    const [revealed, setRevealed] = useState(false);
    const [results, setResults]   = useState([]);
    // Per-row flipped state for the phrasebook list. Tap a JA row to flip
    // it and reveal the EN answer; tap again to flip back. Stored as a
    // Set of phrase ids so we can keep many rows independently flipped.
    const [flippedIds, setFlippedIds] = useState(() => new Set());
    function toggleFlip(id) {
      setFlippedIds(prev => {
        const next = new Set(prev);
        const willOpen = !next.has(id);
        if (next.has(id)) next.delete(id); else next.add(id);
        // Count only the moment the card is OPENED so quick close-and-
        // reopen still increments, but a single tap-and-tap-back doesn't
        // double-count.
        if (willOpen) db.recordTurn(profile.id, 'flip');
        return next;
      });
    }

    // When filter changes from idle, jump back to intro
    useEffect(() => {
      if (phase !== 'study' && phase !== 'done' && phase !== 'mctest') {
        setPhase(filtered.length > 0 ? 'intro' : 'empty');
      }
    }, [filter]);

    function startSession() {
      // Pick up to 10 phrases from the filtered set (shuffled)
      const arr = filtered.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      setQueue(arr.slice(0, 10));
      setResults([]); setIndex(0); setRevealed(false);
      setPhase('study');
    }

    // Mixed-direction 10-question MCQ test, scoped to the current filter.
    // Each question is a phrase + a random direction ('en2ja' | 'ja2en') +
    // 4 options drawn from the same pool. Mirrors RandomTest's mechanic
    // but stays inside Daily English so the kid doesn't have to navigate
    // out and back.
    const [mcChosen, setMcChosen] = useState(null);   // current option string
    // Memoize the options for the current MCQ question so they don't get
    // re-shuffled on every render. Without this, tapping an option causes
    // a re-render which used to call buildPhraseTestOptions() again, and
    // the picked answer (now flashing green) could appear in a different
    // slot than where the user actually tapped — that was the 'option
    // jumped to position 2' bug.
    const mcOpts = useMemo(
      () => (phase === 'mctest' && queue[index] ? buildPhraseTestOptions(queue[index]) : null),
      // eslint-disable-next-line react-hooks/exhaustive-deps
      [phase, index, queue]
    );
    function startMcTest() {
      const arr = filtered.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      const queueArr = arr.slice(0, 10).map(p => Object.assign({}, p, {
        direction: Math.random() < 0.5 ? 'en2ja' : 'ja2en',
      }));
      setQueue(queueArr);
      setResults([]); setIndex(0); setMcChosen(null);
      setPhase('mctest');
    }
    function buildPhraseTestOptions(item) {
      const isEn2Ja = item.direction === 'en2ja';
      const correct = isEn2Ja ? item.ja : item.en;
      // Distractors come from the same scene if possible (more plausible);
      // otherwise from the whole phrase pool.
      const sameScene = DAILY_PHRASES.filter(o => o.scene === item.scene && o.id !== item.id);
      const others = (sameScene.length >= 3 ? sameScene : DAILY_PHRASES.filter(o => o.id !== item.id)).slice();
      const distractors = [];
      const seen = new Set([correct]);
      for (let tries = 0; tries < 30 && distractors.length < 3 && others.length > 0; tries++) {
        const idx = Math.floor(Math.random() * others.length);
        const o = others.splice(idx, 1)[0];
        const text = isEn2Ja ? o.ja : o.en;
        if (!seen.has(text)) { distractors.push(text); seen.add(text); }
      }
      const options = [correct].concat(distractors);
      while (options.length < 4) options.push('—');
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = options[i]; options[i] = options[j]; options[j] = t;
      }
      return { prompt: isEn2Ja ? item.en : item.ja, correct, options, isEn2Ja };
    }
    function pickMcChoice(option, opts) {
      if (mcChosen !== null) return;
      const cur = queue[index];
      const isCorrect = option === opts.correct;
      setMcChosen(option);
      db.recordPhrase(profile.id, cur.id, isCorrect);
      if (isCorrect) { soundCorrect(); hapticTap(); }
      else           { soundWrong();   hapticBuzz(); }
      const newResults = results.concat([{
        phraseId: cur.id, direction: cur.direction,
        en: cur.en, ja: cur.ja,
        chosen: option, correct: opts.correct, isCorrect,
      }]);
      setResults(newResults);
      setTimeout(() => {
        if (index + 1 >= queue.length) {
          soundComplete();
          db.recordTurn(profile.id, 'mctest');
          const correctCount = newResults.filter(r => r.isCorrect).length;
          db.pushEvent(profile.id, {
            kind: 'mctest', total: queue.length, correct: correctCount,
          });
          markPathStepDone(profile, 'phrases');
          setPhase('done');
        } else {
          setIndex(index + 1);
          setMcChosen(null);
        }
      }, 700);
    }

    function record(isCorrect) {
      const cur = queue[index];
      db.recordPhrase(profile.id, cur.id, isCorrect);
      if (isCorrect) { soundCorrect(); hapticTap(); }
      else           { soundWrong();   hapticBuzz(); }
      const newResults = results.concat([{ phraseId: cur.id, isCorrect }]);
      setResults(newResults);
      if (index + 1 >= queue.length) {
        const correctCount = newResults.filter(r=>r.isCorrect).length;
        const acc = Math.round(correctCount * 100 / queue.length);
        setTimeout(() => { soundComplete(); if (acc >= 70) hapticWin(); }, 250);
        setPhase('done');
        return;
      }
      setIndex(index + 1); setRevealed(false);
    }

    const topBar = e('div', {
      style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 }
    },
      e('button', { onClick: onBack,
        style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
      }, '‹'),
      e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, 'Daily English'),
      (phase === 'study' || phase === 'mctest') && e('div', {
        style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
      }, (index + 1) + ' / ' + queue.length),
    );

    // ============ INTRO / LIST ============
    if (phase === 'intro' || phase === 'empty') {
      const sceneCounts = {};
      DAILY_PHRASES.forEach(p => { sceneCounts[p.scene] = (sceneCounts[p.scene] || 0) + 1; });
      return e('div', { style: pageStyle },
        topBar,
        e('div', { style: { padding: '20px 4px 18px' } },
          e('div', {
            style: { fontFamily: SERIF, fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1.2 }
          }, 'Daily English'),
          e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6, lineHeight: 1.6 } },
            '学校・食事・友達・買い物の場面ですぐ使える表現。'),
        ),
        // Top: 10-question mixed-direction MCQ test on the current filter
        e('button', {
          onClick: startMcTest,
          disabled: filtered.length === 0,
          style: {
            width: '100%', padding: '16px 0', borderRadius: 14,
            background: profile.color, color: '#fff',
            fontSize: 15, fontWeight: 700, letterSpacing: '0.04em',
            marginBottom: 16,
            opacity: filtered.length === 0 ? 0.4 : 1,
            cursor: filtered.length === 0 ? 'default' : 'pointer',
          }
        }, '10問テスト (英語 ⇄ 日本語ミックス)'),
        // Filter chips (English labels, no icons)
        e('div', {
          style: {
            display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap',
          }
        },
          ['all'].concat(SCENE_ORDER).map(s => {
            const isActive = s === filter;
            const label = s === 'all' ? 'All' : SCENE_LABELS[s];
            const count = s === 'all' ? DAILY_PHRASES.length : (sceneCounts[s] || 0);
            return e('button', {
              key: s, onClick: () => setFilter(s),
              style: {
                padding: '8px 14px', borderRadius: 999, fontSize: 13, fontWeight: 600,
                border: '1px solid ' + (isActive ? profile.color : C.line),
                background: isActive ? profile.color : C.card,
                color: isActive ? '#fff' : C.sub,
                fontFamily: SANS_UI,
              }
            }, label + ' (' + count + ')');
          })
        ),
        // Browse list — show ALL phrases for this filter, top to bottom
        filtered.length === 0
          ? e('div', {
              style: {
                background: C.softer, border: '1px dashed ' + C.line,
                borderRadius: 18, padding: '40px 22px', textAlign: 'center', color: C.sub,
              }
            }, 'このシーンのフレーズはありません')
          : e('div', {
              style: { display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }
            },
              // Each row is a 3D flip card:
              //   front = Japanese (the prompt the learner sees first)
              //   back  = English answer + speaker
              //   tap anywhere on the card to flip; speaker tap doesn't flip
              filtered.map(p => {
                const flipped = flippedIds.has(p.id);
                const cardStyle = {
                  background: C.card, border: '1px solid ' + C.line,
                  borderRadius: 14, padding: '14px 14px',
                  display: 'flex', flexDirection: 'column', justifyContent: 'center',
                  cursor: 'pointer', minHeight: 96,
                  width: '100%', height: '100%',
                };
                return e('div', { key: p.id, className: 'flip-wrap' },
                  e('div', {
                    className: 'flip-inner' + (flipped ? ' is-flipped' : ''),
                    style: { minHeight: 96 },
                    onClick: () => toggleFlip(p.id),
                  },
                    // FRONT — Japanese
                    e('div', { className: 'flip-face front', style: cardStyle },
                      e('div', {
                        style: { fontSize: 10, color: C.sub, fontWeight: 600, marginBottom: 6,
                                 letterSpacing: '0.08em', fontFamily: SANS_UI }
                      }, SCENE_LABELS[p.scene]),
                      e('div', {
                        style: { fontSize: 18, color: C.text, fontWeight: 700, lineHeight: 1.4 }
                      }, p.ja),
                      e('div', {
                        style: { fontSize: 11, color: C.sub, marginTop: 8, fontFamily: SANS_UI }
                      }, 'タップで英語'),
                    ),
                    // BACK — English + speaker
                    e('div', { className: 'flip-face back', style: cardStyle },
                      e('div', {
                        style: { fontSize: 10, color: C.sub, fontWeight: 600, marginBottom: 6,
                                 letterSpacing: '0.08em', fontFamily: SANS_UI }
                      }, SCENE_LABELS[p.scene]),
                      e('div', {
                        style: { fontSize: 19, color: C.text, fontFamily: SERIF, fontWeight: 700,
                                 lineHeight: 1.35, display: 'flex', alignItems: 'center', gap: 10 }
                      },
                        e('span', { style: { flex: 1 } }, p.en),
                        e(SpeakerBtn, { onClick: () => speak(p.en), color: profile.color, size: 32 }),
                      ),
                    ),
                  ),
                );
              }),
            ),
        // Start practice
        e('button', {
          onClick: startSession,
          disabled: filtered.length === 0,
          style: {
            width: '100%', padding: '16px 0', borderRadius: 16,
            background: profile.color, color: '#fff',
            fontSize: 16, fontWeight: 700, letterSpacing: '0.04em',
            opacity: filtered.length === 0 ? 0.4 : 1,
            cursor: filtered.length === 0 ? 'default' : 'pointer',
          }
        }, '練習する (最大10問)'),
      );
    }

    // ============ DONE ============
    if (phase === 'done') {
      const correct = results.filter(r => r.isCorrect).length;
      const total = results.length;
      return e(SessionDoneCard, { profile, correct, total, onBack });
    }

    // ============ MCQ TEST ============
    // 10 phrases, each with a random direction. The learner picks the
    // matching translation from 4 choices (correct + 3 distractors from
    // the same scene where possible). Auto-advances after 700ms.
    if (phase === 'mctest' && queue.length > 0 && mcOpts) {
      const cur = queue[index];
      const opts = mcOpts;
      const dirLabel = cur.direction === 'en2ja' ? '英語 → 日本語' : '日本語 → 英語';
      return e('div', { style: pageStyle },
        topBar,
        // Progress bar
        e('div', {
          style: { height: 4, background: C.line, borderRadius: 999, marginBottom: 18, overflow: 'hidden' }
        },
          e('div', {
            style: { width: ((index) / queue.length * 100) + '%', height: '100%', background: profile.color }
          }),
        ),
        // Card
        e('div', {
          style: {
            background: C.card, border: '1px solid ' + C.line,
            borderRadius: 18, padding: '20px 18px', marginBottom: 16,
            display: 'flex', flexDirection: 'column', gap: 14,
          }
        },
          // Chips
          e('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap' } },
            e('span', {
              style: {
                fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
                background: profile.color + '1A', color: profile.color, fontFamily: SANS_UI,
              }
            }, SCENE_LABELS[cur.scene]),
            e('span', {
              style: {
                fontSize: 11, fontWeight: 600, padding: '3px 10px', borderRadius: 999,
                background: C.softer, color: C.sub, fontFamily: SANS_UI,
              }
            }, dirLabel),
          ),
          // Prompt — speaker shown only when prompt is English
          e('div', { style: { padding: '8px 0', display: 'flex', alignItems: 'center', gap: 12 } },
            e('div', {
              style: {
                flex: 1,
                fontSize: opts.isEn2Ja ? 24 : 22,
                fontWeight: 800, color: C.text, lineHeight: 1.4,
                fontFamily: opts.isEn2Ja ? SERIF : 'inherit',
              }
            }, opts.prompt),
            opts.isEn2Ja && e(SpeakerBtn, {
              onClick: () => speak(opts.prompt), color: profile.color, size: 40,
            }),
          ),
        ),
        // 4 options. When the answer is English, attach a speaker on the right.
        e('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
          opts.options.map((opt, i) => {
            const isPicked   = mcChosen === opt;
            const isCorrect  = opt === opts.correct;
            const showResult = mcChosen !== null;
            const optionsAreEn = !opts.isEn2Ja;
            let bg = C.card, border = C.line, color = C.text;
            if (showResult && isCorrect) {
              bg = C.success + '22'; border = C.success; color = C.success;
            } else if (showResult && isPicked && !isCorrect) {
              bg = C.danger + '22'; border = C.danger; color = C.danger;
            }
            return e('div', { key: i, style: { display: 'flex', alignItems: 'stretch', gap: 8 } },
              e('button', {
                onClick: () => pickMcChoice(opt, opts),
                disabled: mcChosen !== null,
                style: {
                  flex: 1,
                  padding: '14px 16px', borderRadius: 12, textAlign: 'left',
                  background: bg, border: '1px solid ' + border, color,
                  fontSize: opts.isEn2Ja ? 14 : 16,
                  fontWeight: 600, lineHeight: 1.4,
                  fontFamily: opts.isEn2Ja ? 'inherit' : SERIF,
                  cursor: mcChosen !== null ? 'default' : 'pointer',
                }
              }, opt),
              optionsAreEn && e(SpeakerBtn, {
                onClick: () => speak(opt), color: profile.color, size: 44,
              }),
            );
          }),
        ),
      );
    }

    // ============ STUDY ============
    if (phase !== 'study' || queue.length === 0) return null;
    const current = queue[index];
    return e('div', { style: pageStyle },
      topBar,
      // Progress bar
      e('div', {
        style: {
          height: 4, background: C.line, borderRadius: 999, marginBottom: 18, overflow: 'hidden',
        }
      },
        e('div', {
          style: {
            width: ((index) / queue.length * 100) + '%',
            height: '100%', background: profile.color,
            transition: 'width .35s ease',
          }
        }),
      ),
      // Card
      e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 24, padding: '24px 22px', marginBottom: 18,
          boxShadow: '0 10px 26px rgba(42,37,32,0.06)',
          minHeight: 320, display: 'flex', flexDirection: 'column', gap: 18,
        }
      },
        // Scene chip
        e('div', { style: { display: 'flex' } },
          e('span', {
            style: {
              fontSize: 12, fontWeight: 700, padding: '4px 12px', borderRadius: 999,
              background: profile.color + '1A', color: profile.color,
            }
          }, SCENE_LABELS[current.scene]),
        ),
        // Japanese prompt
        e('div', { style: { padding: '4px 0 8px' } },
          e('div', { style: { fontSize: 12, color: C.sub, fontWeight: 600, letterSpacing: '0.08em', marginBottom: 8 } },
            '日本語'),
          e('div', { style: { fontSize: 32, fontWeight: 800, color: C.text, lineHeight: 1.5 } },
            current.ja),
        ),
        !revealed
          ? e('div', { style: { marginTop: 'auto', textAlign: 'center', padding: '14px 0' } },
              e('div', { style: { fontSize: 13, color: C.sub, marginBottom: 12, lineHeight: 1.6 } },
                '頭の中で英語に直してから\n👇 を押してね'),
              e('button', {
                onClick: () => setRevealed(true),
                style: {
                  width: '100%', padding: '16px 0', borderRadius: 14,
                  background: C.softer, color: profile.color,
                  fontSize: 16, fontWeight: 700, border: '1px solid ' + profile.color + '33',
                }
              }, '答えを見る'),
            )
          : e('div', { style: { marginTop: 'auto' } },
              e('div', {
                style: {
                  borderTop: '1px dashed ' + C.line, paddingTop: 14,
                  display: 'flex', alignItems: 'center', gap: 12,
                }
              },
                e('div', {
                  style: { fontFamily: SERIF, fontSize: 28, fontWeight: 800, color: C.text, flex: 1, lineHeight: 1.4 }
                }, current.en),
                e(SpeakerBtn, { onClick: () => speak(current.en), color: profile.color, size: 60 }),
              ),
            ),
      ),
      revealed && e('div', { style: { display: 'flex', gap: 10 } },
        e('button', {
          onClick: () => record(false),
          style: {
            flex: 1, padding: '15px 0', borderRadius: 14,
            background: C.danger + '14', color: C.danger,
            fontWeight: 700, fontSize: 15, border: '1px solid ' + C.danger + '33',
          }
        }, 'できなかった'),
        e('button', {
          onClick: () => record(true),
          style: {
            flex: 1, padding: '15px 0', borderRadius: 14,
            background: C.success, color: '#fff',
            fontWeight: 700, fontSize: 15, border: '1px solid ' + C.success,
            boxShadow: '0 6px 14px ' + C.success + '40',
          }
        }, 'できた'),
      ),
    );
  }

  // ---------- Random Test (混合10問・4択 MCQ) ----------
  // Pool draws from VOCAB + SENTENCES + DAILY_PHRASES. Each question picks a
  // random direction (EN→JA or JA→EN) and three plausible distractors from the
  // same kind. Wrong answers feed the per-kind progress + mistakes log so they
  // surface in 間違い復習 next time.
  function buildTestPool() {
    const arr = [];
    VOCAB.forEach(v => arr.push({ kind: 'vocab', id: v.id, en: v.en, ja: v.ja, level: v.level }));
    SENTENCES.forEach(s => arr.push({ kind: 'sentence', id: s.id, en: s.en, ja: s.ja, level: s.level }));
    DAILY_PHRASES.forEach(p => arr.push({ kind: 'phrase', id: p.id, en: p.en, ja: p.ja, level: 2 }));
    return arr;
  }
  // Build a 10-question test queue weighted to the family member's
  // own level distribution (Ryoji L2-3, Narumichi L3-4, others L1-2,
  // etc.). Each picked item gets a random direction so EN→JA and
  // JA→EN questions alternate.
  function buildTestQueue(profile, count) {
    const pool = buildTestPool();
    const picked = pickWeightedQueue(pool, profile, count);
    return picked.map(it => Object.assign({}, it, {
      direction: Math.random() < 0.5 ? 'en2ja' : 'ja2en',
    }));
  }
  function buildOptions(item, pool) {
    const isEn2Ja = item.direction === 'en2ja';
    const correct = isEn2Ja ? item.ja : item.en;
    const others = pool.filter(o => o.kind === item.kind && o.id !== item.id);
    const distractors = [];
    const seen = new Set([correct]);
    for (let tries = 0; tries < 30 && distractors.length < 3 && others.length > 0; tries++) {
      const idx = Math.floor(Math.random() * others.length);
      const o = others.splice(idx, 1)[0];
      const text = isEn2Ja ? o.ja : o.en;
      if (!seen.has(text)) { distractors.push(text); seen.add(text); }
    }
    const options = [correct].concat(distractors);
    while (options.length < 4) options.push('—'); // fallback if pool tiny
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = options[i]; options[i] = options[j]; options[j] = t;
    }
    return { prompt: isEn2Ja ? item.en : item.ja, correct, options, isEn2Ja };
  }

  const TEST_COUNT = 10;

  function RandomTest({ profile, onBack }) {
    const [pool] = useState(buildTestPool);
    const [queue] = useState(() => buildTestQueue(profile, TEST_COUNT));
    const [phase, setPhase]   = useState(queue.length > 0 ? 'study' : 'empty');
    const [index, setIndex]   = useState(0);
    const [chosen, setChosen] = useState(null);
    const [results, setResults] = useState([]);

    const current = queue[index] || null;
    const optsObj = useMemo(() => current ? buildOptions(current, pool) : null, [current, pool]);

    function pick(option) {
      if (chosen !== null || !optsObj) return;
      setChosen(option);
      const isCorrect = option === optsObj.correct;
      if (isCorrect) { soundCorrect(); hapticTap(); }
      else           { soundWrong();   hapticBuzz(); }
      // Record per-kind (auto-pushes to mistakes if wrong)
      if (current.kind === 'vocab')        db.recordAnswer(profile.id, current.id, isCorrect);
      else if (current.kind === 'sentence') db.recordSentence(profile.id, current.id, isCorrect);
      else if (current.kind === 'phrase')   db.recordPhrase(profile.id, current.id, isCorrect);
      const newResults = results.concat([Object.assign({}, current, {
        isCorrect, chosen: option, correct: optsObj.correct,
      })]);
      setResults(newResults);
      setTimeout(() => {
        if (index + 1 >= queue.length) {
          const correctCount = newResults.filter(r => r.isCorrect).length;
          const acc = Math.round(correctCount * 100 / queue.length);
          setTimeout(() => { soundComplete(); if (acc >= 70) hapticWin(); }, 100);
          db.recordTurn(profile.id, 'random_test');
          db.pushEvent(profile.id, {
            kind: 'random_test', total: queue.length, correct: correctCount,
          });
          markPathStepDone(profile, 'random_test');
          setPhase('done');
        } else {
          setIndex(index + 1);
          setChosen(null);
        }
      }, 1100);
    }

    const topBar = e('div', {
      style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 }
    },
      e('button', { onClick: onBack,
        style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
      }, '‹'),
      e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, 'ランダムテスト'),
      phase === 'study' && e('div', {
        style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
      }, (index + 1) + ' / ' + queue.length),
    );

    if (phase === 'empty') {
      return e('div', { style: pageStyle }, topBar,
        e('div', { style: { textAlign: 'center', padding: '40px 20px', color: C.sub } }, '出題できる問題がありません。'),
      );
    }

    if (phase === 'done') {
      const correct = results.filter(r => r.isCorrect).length;
      const list = e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 18, padding: 8, marginBottom: 18,
        }
      },
        results.map((r, i) => e('div', {
          key: i,
          style: {
            display: 'flex', alignItems: 'flex-start', gap: 12,
            padding: '12px',
            borderBottom: i < results.length - 1 ? '1px solid ' + C.line : 'none',
          }
        },
          e('div', {
            style: {
              width: 26, height: 26, borderRadius: 999, fontSize: 14,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: r.isCorrect ? C.success + '22' : C.danger + '22',
              color:      r.isCorrect ? C.success         : C.danger,
              fontWeight: 700, flexShrink: 0, marginTop: 2,
            }
          }, r.isCorrect ? '✓' : '✗'),
          (function () {
            const promptIsEn = r.direction === 'en2ja';
            const correctIsEn = !promptIsEn;
            const promptText = promptIsEn ? r.en : r.ja;
            return e('div', { style: { flex: 1, minWidth: 0 } },
              e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
                e('div', { style: { flex: 1, fontSize: 13, color: C.text, fontWeight: 600, marginBottom: 2 } },
                  promptText),
                promptIsEn && e(SpeakerBtn, { onClick: () => speak(r.en), color: profile.color, size: 26 }),
              ),
              e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
                e('div', { style: { flex: 1, fontSize: 12, color: C.sub } },
                  '→ ' + r.correct),
                correctIsEn && e(SpeakerBtn, { onClick: () => speak(r.correct), color: profile.color, size: 26 }),
              ),
              !r.isCorrect && e('div', { style: { fontSize: 11, color: C.danger, marginTop: 2 } },
                'あなたの答え: ' + r.chosen),
            );
          })(),
          e('div', { style: { fontSize: 10, color: C.sub, fontWeight: 600, flexShrink: 0 } },
            r.kind === 'vocab' ? '単語' : r.kind === 'sentence' ? '英作文' : 'フレーズ'),
        )),
      );
      return e(SessionDoneCard, { profile, correct, total: queue.length, onBack, extra: list });
    }

    // ============ STUDY ============
    if (!current || !optsObj) return null;
    const kindLabel = current.kind === 'vocab' ? '単語' : current.kind === 'sentence' ? '英作文' : 'フレーズ';
    const dirLabel  = optsObj.isEn2Ja ? '英語 → 日本語' : '日本語 → 英語';
    return e('div', { style: pageStyle },
      topBar,
      // Progress bar
      e('div', {
        style: {
          height: 4, background: C.line, borderRadius: 999, marginBottom: 18, overflow: 'hidden',
        }
      },
        e('div', {
          style: {
            width: ((index) / queue.length * 100) + '%',
            height: '100%', background: profile.color, transition: 'width .35s ease',
          }
        }),
      ),
      // Card
      e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 24, padding: '22px 22px', marginBottom: 16,
          boxShadow: '0 10px 26px rgba(42,37,32,0.06)',
          display: 'flex', flexDirection: 'column', gap: 14,
        }
      },
        // Chips
        e('div', { style: { display: 'flex', gap: 8 } },
          e('span', {
            style: {
              fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
              background: profile.color + '1A', color: profile.color,
            }
          }, kindLabel),
          e('span', {
            style: {
              fontSize: 11, fontWeight: 600, padding: '3px 10px', borderRadius: 999,
              background: C.softer, color: C.sub,
            }
          }, dirLabel),
        ),
        // Prompt — when prompt is English (EN→JA), put a speaker next to it.
        e('div', { style: { padding: '12px 0', display: 'flex', alignItems: 'center', gap: 12 } },
          e('div', {
            style: {
              flex: 1,
              fontSize: optsObj.isEn2Ja ? 32 : 28,
              fontWeight: 800, color: C.text, lineHeight: 1.4,
              fontFamily: optsObj.isEn2Ja ? SERIF : 'inherit',
            }
          }, optsObj.prompt),
          optsObj.isEn2Ja && e(SpeakerBtn, { onClick: () => speak(optsObj.prompt), color: profile.color, size: 44 }),
        ),
      ),
      // Options (4 buttons) — when options are English (JA→EN), every choice gets a 🔊.
      e('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
        optsObj.options.map((opt, i) => {
          const isPicked  = chosen === opt;
          const isCorrect = opt === optsObj.correct;
          const showResult = chosen !== null;
          const optionsAreEn = !optsObj.isEn2Ja;
          let bg = C.card, border = C.line, color = C.text;
          if (showResult && isCorrect) {
            bg = C.success + '22'; border = C.success; color = C.success;
          } else if (showResult && isPicked && !isCorrect) {
            bg = C.danger + '22'; border = C.danger; color = C.danger;
          }
          return e('div', {
            key: i,
            style: {
              display: 'flex', alignItems: 'stretch', gap: 8,
            }
          },
            e('button', {
              onClick: () => pick(opt),
              disabled: chosen !== null,
              style: {
                flex: 1,
                padding: '16px 18px', borderRadius: 14, textAlign: 'left',
                background: bg, border: '1px solid ' + border, color,
                fontSize: optsObj.isEn2Ja ? 16 : 18,
                fontWeight: 600, lineHeight: 1.4,
                fontFamily: optsObj.isEn2Ja ? 'inherit' : SERIF,
                cursor: chosen !== null ? 'default' : 'pointer',
              }
            }, opt),
            optionsAreEn && e(SpeakerBtn, {
              onClick: () => speak(opt),
              color: profile.color,
              size: 44,
            }),
          );
        }),
      ),
    );
  }

  // ---------- Claude API helpers (text + vision) ----------
  // ---------- Claude API (used by AI Translate) ----------
  // Both helpers call Claude Haiku 4.5 via the browser-direct path. Higher
  // max_tokens than before because the new translate UI asks for a structured
  // JSON response with multiple expressions, vocab, grammar, and an example.
  async function callClaudeText(prompt, system) {
    const apiKey = loadApiKey();
    if (!apiKey) throw new Error('API キーが設定されていません');
    const body = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1600,
      messages: [{ role: 'user', content: prompt }],
    };
    if (system) body.system = system;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error('翻訳に失敗しました (' + res.status + ') ' + txt.slice(0, 120));
    }
    const j = await res.json();
    const out = j.content && j.content[0] && j.content[0].text;
    return out || '';
  }
  async function callClaudeVision(mediaType, base64, prompt, system) {
    const apiKey = loadApiKey();
    if (!apiKey) throw new Error('API キーが設定されていません');
    const body = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1600,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: prompt },
        ],
      }],
    };
    if (system) body.system = system;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error('画像翻訳に失敗しました (' + res.status + ') ' + txt.slice(0, 120));
    }
    const j = await res.json();
    const out = j.content && j.content[0] && j.content[0].text;
    return out || '';
  }

  // ---------- Translate prompt + JSON parser ----------
  // The model is asked to return a single JSON object with main / casual /
  // formal / vocab / grammar / example. We strip optional code fences and
  // extract the first {...} block before parsing so a stray prefix like
  // "Here is the JSON:" doesn't break us.
  const TRANSLATE_SYSTEM =
    'You are a careful Japanese–English tutor for the Hayashi family. ' +
    'The middle son Yoshinari (吉成) is 16 and lives at a UK boarding school, ' +
    'so the family is learning British English. Prefer BrE spelling and idiom ' +
    '(colour, centre, flat, lift, queue, rubbish, brilliant, cheers, mate) ' +
    'over American English whenever both are natural. ' +
    'Always reply with one JSON object — no markdown, no code fences, no commentary.';
  // direction: 'auto' | 'ja2en' | 'en2ja'. The user can lock the
  // direction with the picker on the AI翻訳 screen; 'auto' (the default)
  // lets the model detect whichever is the source. The locked modes are
  // useful when the user is typing in their second language and wants
  // a forced target.
  function buildTranslatePrompt(text, direction) {
    let intro;
    if (direction === 'ja2en') {
      intro = 'Translate the user input from Japanese into natural, modern British English.';
    } else if (direction === 'en2ja') {
      intro = 'Translate the user input from English into natural, modern Japanese (with explicit subjects: 私は・あなたは・私たちは).';
    } else {
      intro = 'Translate the user input. Detect whether it is Japanese or English, then translate to the other language. Use natural, modern British English when the target is English.';
    }
    return (
      intro + ' ' +
      'Reply with ONE JSON object that matches this exact shape:\n\n' +
      '{\n' +
      '  "srcLang": "ja" | "en",\n' +
      '  "main":    "標準的で自然な訳（一番おすすめの言い方）",\n' +
      '  "casual":  "親しい人と話すときのカジュアルな言い方",\n' +
      '  "formal":  "丁寧・書き言葉的な言い方",\n' +
      '  "vocab": [\n' +
      '    { "word": "...", "phonetic": "発音 (IPA か カナ)", "meaning": "意味 (日本語、30字以内)" }\n' +
      '  ],\n' +
      '  "grammar": "この文で押さえたい文法ポイントを 1 つだけ、日本語で 1〜2 文、具体的に。",\n' +
      '  "example": { "en": "同じ文型の別の英文", "ja": "その日本語訳" }\n' +
      '}\n\n' +
      'Rules:\n' +
      '- main / casual / formal は 3 つとも違う表現にする。原文と同じ言語で書かない（必ず訳した側の言語で）。\n' +
      '- vocab は 2〜4 件。中学初級レベルの語 (I, you, the, is …) は外し、学習価値の高い語を選ぶ。\n' +
      '  word は英語側を入れる。phonetic は英語なら IPA、日本語語彙なら ふりがな。\n' +
      '- 日本語の文では主語を必ず明示する（私は／あなたは／私たちは など）。省略しない。\n' +
      '- 英訳は BrE。American 綴り (color, center, apartment, elevator, sidewalk, garbage) は使わない。\n' +
      '- example は main と同じ文型を使った別の例にする。main の単純な反復にしない。\n' +
      '- JSON のみ出力。前置きや ``` フェンスを付けない。\n\n' +
      'Input:\n' + text
    );
  }
  function buildVisionTranslatePrompt() {
    return (
      'Read the text in the image, then translate it. Detect language; ' +
      'translate Japanese to English and English to Japanese. ' +
      'Reply with ONE JSON object — no markdown, no fences, no commentary — ' +
      'matching this exact shape:\n\n' +
      '{\n' +
      '  "source":    "画像から読み取った原文（そのまま、改行は \\\\n）",\n' +
      '  "srcLang":   "ja" | "en",\n' +
      '  "main":      "標準的で自然な訳",\n' +
      '  "casual":    "親しい人と話すときのカジュアルな言い方",\n' +
      '  "formal":    "丁寧・書き言葉的な言い方",\n' +
      '  "vocab":     [ { "word": "...", "phonetic": "...", "meaning": "..." } ],\n' +
      '  "grammar":   "文法のポイントを 1 つ、日本語で 1〜2 文。",\n' +
      '  "example":   { "en": "...", "ja": "..." }\n' +
      '}\n\n' +
      'Rules: BrE 寄り。日本語の例文は主語を必ず明示。vocab は 2〜4 件。' +
      'main / casual / formal は 3 つとも違う表現にする。JSON のみ出力。'
    );
  }
  function parseTranslateJSON(text) {
    if (!text) return null;
    let s = String(text).trim();
    // Strip ```json ... ``` or ``` ... ``` fences if the model added them.
    s = s.replace(/^```(?:json|JSON)?\s*/, '').replace(/\s*```\s*$/, '').trim();
    const i = s.indexOf('{');
    const j = s.lastIndexOf('}');
    if (i < 0 || j < 0 || j <= i) return null;
    try { return JSON.parse(s.slice(i, j + 1)); } catch { return null; }
  }

  // ---------- Saved Translations storage ----------
  // Each profile has its own saved-translations list so Yoshinari can build
  // up a personal phrasebook he can flip-card-review later. Newest first;
  // capped at 200 entries so localStorage stays small.
  const SAVED_TRANSLATE_KEY = (memberId) => 'hfe_saved_translate_v1_' + memberId;
  const SAVED_TRANSLATE_MAX = 200;
  function loadSavedTranslations(memberId) {
    try {
      const raw = localStorage.getItem(SAVED_TRANSLATE_KEY(memberId));
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch { return []; }
  }
  function saveSavedTranslations(memberId, list) {
    try {
      const trimmed = list.slice(0, SAVED_TRANSLATE_MAX);
      localStorage.setItem(SAVED_TRANSLATE_KEY(memberId), JSON.stringify(trimmed));
    } catch {}
  }
  function addSavedTranslation(memberId, entry) {
    const list = loadSavedTranslations(memberId);
    // Dedup by src text — re-saving the same input replaces the old entry
    // (keeps the latest rich result).
    const filtered = list.filter(x => x.src !== entry.src);
    filtered.unshift({ ...entry, id: 'tr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7), ts: Date.now() });
    saveSavedTranslations(memberId, filtered);
  }
  function removeSavedTranslation(memberId, id) {
    const list = loadSavedTranslations(memberId).filter(x => x.id !== id);
    saveSavedTranslations(memberId, list);
  }
  function isSavedTranslation(memberId, src) {
    if (!src) return false;
    return loadSavedTranslations(memberId).some(x => x.src === src);
  }

  // ---------- AI Translate ----------
  // Rich output: main / casual / formal expressions, key vocab with phonetics,
  // a single grammar note, and an example sentence using the same pattern.
  // Tap ★ to save into the profile's personal phrasebook for later review.
  function AITranslate({ profile, onBack }) {
    const [input, setInput]   = useState('');
    const [result, setResult] = useState(null); // { src, srcLang, main, casual, formal, vocab, grammar, example }
    const [busy, setBusy]     = useState(false);
    const [error, setError]   = useState('');
    const [hasKey] = useState(() => !!loadApiKey());
    const [saved, setSaved]   = useState(false);
    // Translation direction picker. 'auto' (the default) detects which
    // language the user typed and translates to the other one — the
    // family's most common case. 'ja2en' / 'en2ja' force a direction
    // when the user is e.g. practising the language they're weaker in
    // and wants a specific target.
    const [direction, setDirection] = useState('auto');
    // Two separate hidden file inputs so iOS / Android can offer either
    // "take a photo now" or "pick from library" cleanly. iOS Safari treats
    // capture="environment" as "open camera"; without the attribute the
    // native picker (Photo Library / Files / etc.) opens.
    const cameraRef  = useRef(null);
    const libraryRef = useRef(null);
    // Voice input state. Web Speech API is available on Safari (iOS 14.5+),
    // Chrome, and Edge — not Firefox. We feature-detect on first tap and
    // surface a friendly message if it's missing instead of silently
    // failing.
    const [recording, setRecording]  = useState(false);
    const recognitionRef = useRef(null);
    const voiceBaseRef   = useRef('');

    function detectLang(s) {
      // Hiragana / katakana / CJK ideograph → treat as Japanese.
      return /[぀-ヿ一-鿿]/.test(s || '') ? 'ja' : 'en';
    }

    async function translateNow() {
      const text = (input || '').trim();
      if (!text || busy) return;
      setBusy(true); setError(''); setResult(null); setSaved(false);
      try {
        const raw = await callClaudeText(buildTranslatePrompt(text, direction), TRANSLATE_SYSTEM);
        const obj = parseTranslateJSON(raw);
        if (!obj || !obj.main) {
          // Fallback: if the model gave us plain text, show it as 'main'
          setResult({ src: text, srcLang: detectLang(text), main: (raw || '').trim(),
                      casual: '', formal: '', vocab: [], grammar: '', example: null });
        } else {
          setResult({
            src: text,
            srcLang: obj.srcLang || detectLang(text),
            main: obj.main || '', casual: obj.casual || '', formal: obj.formal || '',
            vocab: Array.isArray(obj.vocab) ? obj.vocab : [],
            grammar: obj.grammar || '',
            example: obj.example && obj.example.en ? obj.example : null,
          });
          setSaved(isSavedTranslation(profile.id, text));
        }
      } catch (err) {
        setError((err && err.message) || String(err));
      } finally {
        setBusy(false);
      }
    }

    async function handlePhoto(file) {
      if (!file || busy) return;
      setBusy(true); setError(''); setResult(null); setSaved(false);
      try {
        const dataUrl = await compressImageToDataUrl(file, 1400, 0.85);
        const m = dataUrl.match(/^data:(image\/[a-z+]+);base64,(.*)$/);
        if (!m) throw new Error('画像を読み込めませんでした');
        const raw = await callClaudeVision(m[1], m[2], buildVisionTranslatePrompt(), TRANSLATE_SYSTEM);
        const obj = parseTranslateJSON(raw);
        if (!obj || !obj.main) {
          setResult({ src: '(写真)', srcLang: 'en', main: (raw || '').trim(),
                      casual: '', formal: '', vocab: [], grammar: '', example: null });
        } else {
          const src = obj.source || '(写真)';
          setResult({
            src,
            srcLang: obj.srcLang || detectLang(src),
            main: obj.main || '', casual: obj.casual || '', formal: obj.formal || '',
            vocab: Array.isArray(obj.vocab) ? obj.vocab : [],
            grammar: obj.grammar || '',
            example: obj.example && obj.example.en ? obj.example : null,
          });
          setInput(src);
          setSaved(isSavedTranslation(profile.id, src));
        }
      } catch (err) {
        setError((err && err.message) || String(err));
      } finally {
        setBusy(false);
        if (cameraRef.current)  cameraRef.current.value  = '';
        if (libraryRef.current) libraryRef.current.value = '';
      }
    }

    // ---------- Voice input (Web Speech API) ----------
    // Tap to start, tap again to stop. While recording, the partial
    // transcript streams into the textarea so the user can see it land.
    // Language is guessed from what's already typed: empty / Japanese →
    // ja-JP, otherwise en-US. Errors are surfaced via setError.
    function startVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setError('この端末は音声入力に対応していません（Safari / Chrome 推奨）。');
        return;
      }
      try {
        // Pick the speech-recognition language. If the user has locked
        // a direction, the SOURCE side of that direction is what they
        // intend to speak. In auto mode, fall back to detecting from
        // whatever is already typed.
        let lang;
        if (direction === 'ja2en')      lang = 'ja-JP';
        else if (direction === 'en2ja') lang = 'en-US';
        else                            lang = detectLang(input || '') === 'en' ? 'en-US' : 'ja-JP';
        const r = new SR();
        r.lang = lang;
        r.continuous     = false;
        r.interimResults = true;
        voiceBaseRef.current = input ? (input.replace(/\s+$/, '') + ' ') : '';
        r.onresult = (ev) => {
          let txt = '';
          for (let i = 0; i < ev.results.length; i++) txt += ev.results[i][0].transcript;
          setInput(voiceBaseRef.current + txt);
          setSaved(false);
        };
        r.onerror = (ev) => {
          let m = 'マイクが使えませんでした。';
          if (ev && (ev.error === 'not-allowed' || ev.error === 'service-not-allowed')) {
            m = 'マイクが許可されていません。ブラウザの設定で許可してください。';
          } else if (ev && ev.error === 'no-speech') {
            m = '声が聞こえませんでした。もう一度試してください。';
          } else if (ev && ev.error === 'network') {
            m = 'ネットワークエラーで音声認識に失敗しました。';
          } else if (ev && ev.error) {
            m = '音声入力エラー: ' + ev.error;
          }
          setError(m);
          setRecording(false);
        };
        r.onend = () => {
          setRecording(false);
          recognitionRef.current = null;
        };
        r.start();
        recognitionRef.current = r;
        setRecording(true);
        setError('');
      } catch (err) {
        setError('音声入力を開始できませんでした: ' + ((err && err.message) || String(err)));
        setRecording(false);
      }
    }
    function stopVoice() {
      // iOS Safari is flaky about firing `onend` after `stop()`, so we
      // (a) flip the UI state immediately so the button reads "音声"
      // again, and (b) belt-and-braces both stop() and abort() to make
      // sure the mic actually releases. Clearing the ref first prevents
      // a delayed onend from confusing a freshly-started session.
      const r = recognitionRef.current;
      recognitionRef.current = null;
      setRecording(false);
      if (r) {
        try { r.stop(); }  catch {}
        try { r.abort(); } catch {}
      }
    }
    function toggleVoice() {
      if (recording) stopVoice();
      else           startVoice();
    }

    function toggleSave() {
      if (!result) return;
      if (saved) {
        // Find by src
        const list = loadSavedTranslations(profile.id);
        const hit = list.find(x => x.src === result.src);
        if (hit) removeSavedTranslation(profile.id, hit.id);
        setSaved(false);
      } else {
        addSavedTranslation(profile.id, result);
        setSaved(true);
      }
    }


    return e('div', { style: pageStyle },
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }

        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, 'AI翻訳'),
      ),
      e('div', { style: { padding: '4px 4px 18px' } },
        e('div', {

        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6, lineHeight: 1.6 } },

      ),

      !hasKey
        ? e('div', {

          },
            e('div', { style: { fontWeight: 700, marginBottom: 8 } }, 'API キーを設定すると使えます'),
            e('div', null, '① console.anthropic.com にアクセス'),
            e('div', null, '② 無料アカウント作成 → 「API Keys」'),
            e('div', null, '③ "Create Key" → コピー'),

        : e('div', null,

            e('div', {

  // ---------- Inline saved-translation list ----------

  // keeps the screen short — full archive is on 翻訳ノート.
  function InlineSavedList({ profile, savedToggle }) {
    // savedToggle is just a render trigger so the list refreshes after

    const [items, setItems] = useState(() => loadSavedTranslations(profile.id));
    useEffect(() => { setItems(loadSavedTranslations(profile.id)); }, [savedToggle]);

    function unsave(id) {
      removeSavedTranslation(profile.id, id);
      setItems(loadSavedTranslations(profile.id));

  // ---------- Translate Result Card ----------
  // Pulls main / casual / formal / vocab / grammar / example out of the
  // result object and stacks them in a single card with thin dividers. The
  // "more" expressions (casual/formal/example) are collapsible so the
  // card stays scannable on first view.
  function TranslateResult({ result, profile, saved, onToggleSave }) {
    const [showMore, setShowMore] = useState(false);
    if (!result) return null;
    const tgtLang = result.srcLang === 'ja' ? 'en' : 'ja';
    const speakLang = (s) => /[぀-ヿ一-鿿]/.test(s || '') ? 'ja' : 'en';

    const sectionTitle = (label) => e('div', {
      style: {
        fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
        letterSpacing: '0.16em', color: C.sub, textTransform: 'uppercase',
        marginBottom: 8,
      }
    }, label);

    return e('div', {
      style: {
        background: C.card, border: '1px solid ' + C.line,
        borderRadius: 14, padding: '16px 16px 14px',
      }
    },
      // Header: 翻訳結果 + speaker. The save toggle now lives in the
      // prominent panel at the bottom of the card — having both was
      // redundant and the small ☆ icon was easy to miss.
      e('div', {
        style: {
          display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10,
        }
      },
        e('span', {
          style: {
            fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
            letterSpacing: '0.16em', color: C.sub, flex: 1,

        }

      // Show more / less toggle. Only render the toggle if there is
      // anything else to show (casual / formal / example).
      (result.casual || result.formal || result.example) &&
        e('button', {
          onClick: () => setShowMore(v => !v),
          style: {
            marginTop: 12, padding: '6px 0',
            fontSize: 11, fontWeight: 700, letterSpacing: '0.06em',
            color: profile.color, fontFamily: SANS_UI,
            background: 'none', border: 'none', cursor: 'pointer',
          }
        }, showMore ? '言い換えを閉じる ▲' : '別の言い方を見る ▼'),

      // Casual / formal alternatives (collapsible)
      showMore && (result.casual || result.formal) && e('div', {

        result.casual && e('div', null,

        result.formal && e('div', null,
          e('div', {

              letterSpacing: '0.16em', color: C.sub, marginBottom: 4,
              display: 'flex', alignItems: 'center', gap: 8,

            e('span', { style: { flex: 1 } }, 'FORMAL · 丁寧'),

          result.vocab.map((v, i) => e('div', {
            key: i,
            style: { display: 'flex', alignItems: 'flex-start', gap: 10 }
          },
            e('div', { style: { flex: 1, minWidth: 0 } },
              e('div', {
                style: {
                  display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap',
                }
              },
                e('span', {
                  style: { fontFamily: SERIF, fontSize: 17, fontWeight: 700, color: C.text }

      result.grammar && e('div', {

      showMore && result.example && (result.example.en || result.example.ja) && e('div', {

          style: {

          e('div', { style: { flex: 1, minWidth: 0 } },
            result.example.en && e('div', {

      ),

      // Save prompt — surfaces the action below the result instead of

      e('div', {
        style: {
          marginTop: 14, paddingTop: 14,
          borderTop: '1px solid ' + C.line,
        }
      },
        saved
          ? e('div', {
              style: { display: 'flex', alignItems: 'center', gap: 10 }
            },
              e('span', {
                style: {
                  flex: 1, fontSize: 13, color: C.success, fontWeight: 700, fontFamily: SANS_UI,

              }, '✓ 辞書に保存しました'),
              e('button', {
                onClick: onToggleSave,
                style: {
                  padding: '8px 14px', borderRadius: 10,

  // ---------- Saved Translations ("翻訳ノート") ----------
  // Personal phrasebook of every translation the profile starred. Each row
  // is collapsed to source + main; tap to expand the full detail (casual /
  // formal / vocab / grammar / example). ★ removes the entry.
  function SavedTranslations({ profile, onBack }) {
    const [items, setItems] = useState(() => loadSavedTranslations(profile.id));
    const [expandedId, setExpandedId] = useState(null);

    function unsave(id) {
      removeSavedTranslation(profile.id, id);
      setItems(loadSavedTranslations(profile.id));
      if (expandedId === id) setExpandedId(null);
    }

    function fmtDate(ts) {
      try {
        const d = new Date(ts);
        const pad = (n) => String(n).padStart(2, '0');
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      } catch { return ''; }
    }

    return e('div', { style: pageStyle },
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '翻訳ノート'),
      ),
      e('div', { style: { padding: '4px 4px 18px' } },
        e('div', {
          style: { fontFamily: SERIF, fontSize: 26, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, '翻訳ノート'),
        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6, lineHeight: 1.6 } },
          'AI翻訳で ★ を押した文がここに溜まります。タップで詳細を開きます。'),
      ),

      items.length === 0
        ? e('div', {
            style: {
              background: C.softer, border: '1px dashed ' + C.line,
              borderRadius: 14, padding: '24px 22px',
              fontSize: 13, color: C.sub, lineHeight: 1.7, textAlign: 'center',
            }
          },
            e('div', { style: { fontSize: 24, marginBottom: 8 } }, '☆'),
            e('div', null, 'まだ保存した翻訳はありません。'),
            e('div', null, 'AI翻訳の結果カードにある ☆ を押すと、ここに溜まっていきます。'),
          )
        : e('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
            items.map((item) => {
              const expanded = expandedId === item.id;
              const dirLabel = item.srcLang === 'ja' ? '日本語 → 英語' : '英語 → 日本語';
              return e('div', {
                key: item.id,
                style: {

  // ---------- 1分英語解説 ----------
  // Single-lesson reading + 5-question MCQ flow. Phases:
  //   list   — pick a lesson (grouped by level)
  //   detail — read the 1-minute explanation, then "クイズへ"
  //   quiz   — one question at a time, immediate feedback
  //   result — score + retry / review wrong / back
  //
  // Audio: every English string has a 🔊. The helper strips the
  // "(日本語ヒント)" tail and replaces ___ with the right word so the
  // speech-synth voice reads a natural sentence.
  function speakLessonEnglish(text, fillBlankWith) {
    if (!text) return;
    let s = String(text);
    // Strip Japanese hint in trailing (...) or （...）
    s = s.replace(/[\(（][^)）]*[\)）]\s*/g, '');
    // Strip em-dash hints "— watch の過去形は？" style
    s = s.replace(/—.*$/, '').replace(/-{2,}.*$/, '');
    if (fillBlankWith) s = s.replace(/_{2,}/g, fillBlankWith);
    else               s = s.replace(/_{2,}/g, 'blank');
    speak(s.trim());
  }

  // ---------- シャドーイング ----------
  // Pure listen-and-repeat. No recording, no scoring. The app reads each
  // sentence, pauses briefly for the user to say it back, plays it again,
  // and after N reps auto-advances to the next sentence. 10 sentences ×
  // 3 reps each = ~3 minutes of mouth-moving practice.
  //
  // Speed selector (① / ② / ③) — slow / native / quick. Each has its own
  // TTS rate AND inter-rep pause so the rhythm stays right (slower
  // speech naturally needs more breathing room).
  const SHADOW_SESSION_COUNT = 10;
  const SHADOW_REPS          = 3;
  const SHADOW_SPEEDS = {
    1: { rate: 0.85, pauseMs: 2000 },  // ゆっくり
    2: { rate: 1.00, pauseMs: 1500 },  // ふつう
    3: { rate: 1.15, pauseMs: 1100 },  // 早口
  };
  const SHADOW_LEVELS = [1, 2, 3, 4, 5];

  // Group SHADOWING_QA into adjacent Q+A pairs (or singletons). Returns
  // [{ level, items: [...] }, ...]. Stable across renders since the
  // SHADOWING_QA constant is.
  const SHADOWING_GROUPS = (function () {
    const out = [];
    for (let i = 0; i < SHADOWING_QA.length; i++) {
      const cur = SHADOWING_QA[i];
      const nxt = SHADOWING_QA[i + 1];
      if (cur.role === 'Q' && nxt && nxt.role === 'A' && cur.level === nxt.level) {
        out.push({ level: cur.level, items: [cur, nxt] });
        i++;
      } else {
        out.push({ level: cur.level, items: [cur] });
      }
    }
    return out;
  })();

  // How many sentences live at a level (or total for 'auto').
  function shadowLevelSize(lv) {
    if (lv === 'auto') return SHADOWING_QA.length;
    return SHADOWING_QA.filter(s => s.level === lv).length;
  }

  function ShadowingPractice({ profile, onBack }) {
    const [phase, setPhase]         = useState('intro');    // 'intro' | 'practice' | 'done'
    const [queue, setQueue]         = useState([]);
    const [index, setIndex]         = useState(0);
    const [repNumber, setRepNumber] = useState(1);          // 1..SHADOW_REPS
    const [paused, setPaused]       = useState(false);
    const [isSpeaking, setIsSpeaking] = useState(false);
    const [replayKey, setReplayKey] = useState(0);          // bump to re-trigger current rep
    const sessionStartRef = useRef(null);

    // Default to おまかせ — the same per-profile level distribution
    // vocab and 瞬間英作文 use (pickLevelForProfile). Manual LV picks
    // are still available via the picker.
    const [selectedLevel, setSelectedLevel] = useState('auto');
    // Speed: 1 (slow) / 2 (native) / 3 (quick). Default is 2.
    const [speed, setSpeed] = useState(2);
    const speedConfig = SHADOW_SPEEDS[speed] || SHADOW_SPEEDS[2];

    const current = queue[index] || null;

    // The auto-loop. Speak the sentence, wait for the TTS to finish,
    // then a pause for the user to repeat, then advance (next rep or
    // next sentence). Cleanup cancels speech + timer if the user
    // pauses, navigates away, or skips.
    useEffect(() => {
      if (phase !== 'practice' || paused || !current) return;
      if (typeof window === 'undefined' || !window.speechSynthesis) return;
      let cancelled = false;
      let timeoutId = null;

      const u = new SpeechSynthesisUtterance(current.en);
      u.lang = 'en-GB';
      u.rate = speedConfig.rate;
      u.onstart = () => { if (!cancelled) setIsSpeaking(true); };
      const finish = () => {
        if (cancelled) return;
        setIsSpeaking(false);
        // Pause so the user can say the sentence back, then advance.
        timeoutId = setTimeout(() => {
          if (cancelled) return;
          if (repNumber < SHADOW_REPS) {
            setRepNumber(r => r + 1);
          } else {
            // Next sentence — or finish if this was the last one.
            if (index + 1 >= queue.length) {
              const durationMs = sessionStartRef.current ? Date.now() - sessionStartRef.current : null;
              try {
                db.recordTurn(profile.id, 'shadowing');
                db.pushEvent(profile.id, {
                  kind: 'shadowing',
                  total: queue.length,
                  durationMs,
                });
                markPathStepDone(profile, 'shadowing');
              } catch {}
              sessionStartRef.current = null;
              setPhase('done');
            } else {
              setIndex(i => i + 1);
              setRepNumber(1);
            }
          }
        }, speedConfig.pauseMs);
      };
      u.onend = finish;
      u.onerror = finish;

      // Stop anything in flight, then play.
      try { window.speechSynthesis.cancel(); } catch {}
      try { window.speechSynthesis.speak(u);   } catch {}

      return () => {
        cancelled = true;
        if (timeoutId) clearTimeout(timeoutId);
        try { window.speechSynthesis.cancel(); } catch {}
        setIsSpeaking(false);
      };
    }, [phase, index, repNumber, paused, replayKey]);

    function startSession() {
      const queueOut = [];

      if (selectedLevel === 'auto') {
        // おまかせ: pick a level via pickLevelForProfile per slot, then
        // pull a random unused group at that level. Same per-profile
        // distribution that vocab and 瞬間英作文 use, so e.g. Yoshinari
        // sees mostly L1+L2, Dad sees mostly L2+L3. Falls back to the
        // nearest non-empty level when the picked one has no content.
        const used = new Set();
        let safety = 0;
        while (queueOut.length < SHADOW_SESSION_COUNT && safety < 200) {
          safety++;
          let lv = pickLevelForProfile(profile);
          // Find candidates at this level; if empty, walk down then up.
          let candidates = SHADOWING_GROUPS.map((g, idx) => ({ g, idx }))
            .filter(x => x.g.level === lv && !used.has(x.idx));
          if (candidates.length === 0) {
            for (let dlv = lv - 1; dlv >= 1 && candidates.length === 0; dlv--) {
              candidates = SHADOWING_GROUPS.map((g, idx) => ({ g, idx }))
                .filter(x => x.g.level === dlv && !used.has(x.idx));
            }
          }
          if (candidates.length === 0) {
            for (let ulv = lv + 1; ulv <= 5 && candidates.length === 0; ulv++) {
              candidates = SHADOWING_GROUPS.map((g, idx) => ({ g, idx }))
                .filter(x => x.g.level === ulv && !used.has(x.idx));
            }
          }
          if (candidates.length === 0) break; // pool exhausted
          const pick = candidates[Math.floor(Math.random() * candidates.length)];
          used.add(pick.idx);
          if (queueOut.length + pick.g.items.length <= SHADOW_SESSION_COUNT) {
            queueOut.push(...pick.g.items);
          }
        }
      } else {
        // Specific LV: shuffle that level's groups and take.
        const filtered = SHADOWING_GROUPS.filter(g => g.level === selectedLevel).slice();
        for (let i = filtered.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = filtered[i]; filtered[i] = filtered[j]; filtered[j] = t;
        }
        for (const g of filtered) {
          if (queueOut.length + g.items.length <= SHADOW_SESSION_COUNT) {
            queueOut.push(...g.items);
          }
          if (queueOut.length >= SHADOW_SESSION_COUNT) break;
        }
      }

      setQueue(queueOut);
      setIndex(0);
      setRepNumber(1);
      setPaused(false);
      sessionStartRef.current = Date.now();
      setPhase('practice');
    }
    function togglePause() { setPaused(p => !p); }
    function skipSentence() {
      // Cancel anything playing, then jump.
      try { window.speechSynthesis.cancel(); } catch {}
      if (index + 1 >= queue.length) {
        const durationMs = sessionStartRef.current ? Date.now() - sessionStartRef.current : null;
        try {
          db.recordTurn(profile.id, 'shadowing');
          db.pushEvent(profile.id, {
            kind: 'shadowing', total: queue.length, durationMs,
          });
          markPathStepDone(profile, 'shadowing');
        } catch {}
        sessionStartRef.current = null;
        setPhase('done');
      } else {
        setIndex(i => i + 1);
        setRepNumber(1);
      }
    }
    function replayCurrent() {
      try { window.speechSynthesis.cancel(); } catch {}
      // Force the auto-loop effect to re-run for this same (index, rep).
      setReplayKey(k => k + 1);
    }
    function backToHome() {
      try { window.speechSynthesis.cancel(); } catch {}
      onBack();
    }

    const topBar = e('div', {
      style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 }
    },
      e('button', { onClick: backToHome,
        style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
      }, '‹'),
      e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, 'シャドーイング'),
      phase === 'practice' && e('div', {
        style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
      }, (index + 1) + ' / ' + queue.length),
    );

    // ============ INTRO ============
    if (phase === 'intro') {
      const canStart = shadowLevelSize(selectedLevel) > 0;
      return e('div', { style: pageStyle },
        topBar,
        e('div', { style: { padding: '4px 4px 18px' } },
          e('div', {
            style: { fontFamily: SERIF, fontSize: 26, fontWeight: 700, color: C.text, lineHeight: 1.2 }
          }, 'シャドーイング'),
          e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6, lineHeight: 1.7 } },
            '英文が ' + SHADOW_REPS + ' 回くりかえし流れる → そのたびに声に出してマネをする。' +
            SHADOW_SESSION_COUNT + ' 文ぶん終わったらゴール。録音はしない、口を動かすことに集中。'),
        ),

        // Level picker — おまかせ + LV1〜5. Empty levels show 準備中
        // and are not selectable.
        e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
            letterSpacing: '0.18em', textTransform: 'uppercase',
            color: C.sub, marginBottom: 10, paddingLeft: 4,
          }
        }, 'LEVEL'),
        e('div', {
          style: {
            display: 'flex', gap: 8, marginBottom: 18,
            overflowX: 'auto', paddingBottom: 4,
            WebkitOverflowScrolling: 'touch',
          }
        },
          [{ id: 'auto', label: 'おまかせ' }].concat(
            SHADOW_LEVELS.map(lv => ({ id: lv, label: 'LV' + lv }))
          ).map(opt => {
            const isActive = selectedLevel === opt.id;
            const count = shadowLevelSize(opt.id);
            const empty = count === 0;
            return e('button', {
              key: 'lv_' + opt.id,
              onClick: () => { if (!empty) setSelectedLevel(opt.id); },
              disabled: empty,
              style: {
                flexShrink: 0,
                padding: '8px 14px', borderRadius: 999,
                background: isActive ? profile.color : C.card,
                color:      isActive ? '#fff' : (empty ? C.sub : C.text),
                border: '1px solid ' + (isActive ? profile.color : C.line),
                fontSize: 12, fontWeight: 700, fontFamily: SANS_UI,
                cursor: empty ? 'default' : 'pointer',
                opacity: empty ? 0.45 : 1, letterSpacing: '0.04em',
                display: 'inline-flex', alignItems: 'center', gap: 8,
              }
            },
              e('span', null, opt.label),
              !empty && e('span', {
                style: {
                  fontSize: 10, fontWeight: 800,
                  background: isActive ? 'rgba(255,255,255,0.25)' : C.softer,
                  color:      isActive ? '#fff' : C.sub,
                  padding: '1px 6px', borderRadius: 999,
                }
              }, String(count)),
              empty && e('span', {
                style: {
                  fontSize: 9, fontWeight: 700, letterSpacing: 0,
                  color: C.sub,
                }
              }, '準備中'),
            );
          }),
        ),

        // Speed picker — ① ゆっくり / ② ふつう / ③ 早口
        e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
            letterSpacing: '0.18em', textTransform: 'uppercase',
            color: C.sub, marginBottom: 10, paddingLeft: 4,
          }
        }, 'SPEED'),
        e('div', {
          style: {
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
            gap: 8, marginBottom: 18,
          }
        },
          [
            { id: 1, label: '① ゆっくり' },
            { id: 2, label: '② ふつう' },
            { id: 3, label: '③ 早口' },
          ].map(opt => {
            const isActive = speed === opt.id;
            return e('button', {
              key: 'sp_' + opt.id,
              onClick: () => setSpeed(opt.id),
              style: {
                padding: '8px 0', borderRadius: 999,
                background: isActive ? profile.color : C.card,
                color:      isActive ? '#fff' : C.text,
                border: '1px solid ' + (isActive ? profile.color : C.line),
                fontSize: 12, fontWeight: 700, fontFamily: SANS_UI,
                cursor: 'pointer', letterSpacing: '0.04em',
              }
            }, opt.label);
          }),
        ),

        e('div', {
          style: {
            background: C.softer, border: '1px solid ' + C.line,
            borderRadius: 14, padding: '16px 18px', marginBottom: 18,
            fontSize: 13, color: C.text, lineHeight: 1.8,
          }
        },
          e('div', { style: { fontWeight: 700, marginBottom: 6 } }, '進め方'),
          e('div', null, '①  英文が自動で流れる（早めの自然なスピード）'),
          e('div', null, '②  すぐに声に出してそっくりマネする'),
          e('div', null, '③  同じ文が ' + SHADOW_REPS + ' 回くりかえし → 自動で次へ'),
          e('div', null, '④  ' + SHADOW_SESSION_COUNT + ' 文で 1 セット'),
        ),
        e('button', {
          onClick: () => { if (canStart) startSession(); },
          disabled: !canStart,
          style: {
            width: '100%', padding: '16px 0', borderRadius: 14,
            background: canStart ? profile.color : C.softer,
            color: canStart ? '#fff' : C.sub,
            border: '1px solid ' + (canStart ? profile.color : C.line),
            fontSize: 15, fontWeight: 700, fontFamily: SANS_UI,
            letterSpacing: '0.04em', cursor: canStart ? 'pointer' : 'default',
          }
        }, canStart ? 'スタート (最大 ' + SHADOW_SESSION_COUNT + ' 文)' : 'このレベルは準備中'),
      );
    }

    // ============ DONE ============
    // Review screen — now shows EN + JA + role badge so the user can
    // finally check "ah, that's what I was saying". Shadowing trains
    // ear/tongue without thinking about meaning; the meaning check
    // happens here, after the mouth has done its job.
    if (phase === 'done') {
      return e('div', { style: pageStyle },
        topBar,
        e('div', { style: { padding: '4px 4px 22px', textAlign: 'center' } },
          e('div', {
            style: { fontFamily: SERIF, fontSize: 30, fontWeight: 700, color: C.text, lineHeight: 1.2 }
          }, '🎉 おつかれさま！'),
          e('div', {
            style: { fontFamily: SERIF, fontSize: 56, fontWeight: 800, color: profile.color, lineHeight: 1, marginTop: 16 }
          }, queue.length + ' 文'),
          e('div', {
            style: { fontFamily: SANS_UI, fontSize: 12, color: C.sub, marginTop: 10 }
          }, SHADOW_REPS + ' 回ずつシャドーイング完了'),
        ),
        e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
            letterSpacing: '0.18em', textTransform: 'uppercase',
            color: C.sub, marginBottom: 10, paddingLeft: 4,
          }
        }, 'なんて言ってたか、いま確認しよう'),
        e('div', {
          style: {
            background: C.card, border: '1px solid ' + C.line,
            borderRadius: 14, padding: '6px 0', marginBottom: 18,
          }
        },
          queue.map((p, i) => e('div', {
            key: (p.id || '') + '_' + i,
            style: {
              display: 'flex', alignItems: 'flex-start', gap: 12,
              padding: '12px 16px',
              borderBottom: i === queue.length - 1 ? 'none' : '1px solid ' + C.line,
            }
          },
            e('span', {
              style: {
                fontSize: 12, color: C.sub, fontFamily: SANS_UI,
                width: 22, textAlign: 'right', flexShrink: 0,
                marginTop: 3, fontVariantNumeric: 'tabular-nums',
              }
