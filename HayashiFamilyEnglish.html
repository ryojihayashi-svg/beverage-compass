  const SENTENCE_BY_ID = Object.fromEntries(SENTENCES.map(s => [s.id, s]));

  // ---------- Data layer (localStorage today, swappable to Supabase later) ----------
  // Storage shape per member:
  //   { vocab: { [vocabId]: SrsState }, mistakes: [{ vocabId, at }] }
  const STORAGE_KEY = (memberId) => 'hfe_v1_' + memberId;

  const db = {
    load(memberId) {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY(memberId)) || '{}'); }
      catch { return {}; }
    },
    save(memberId, state) {
      try { localStorage.setItem(STORAGE_KEY(memberId), JSON.stringify(state)); }
      catch (err) { console.warn('localStorage write failed', err); }
    },
    getVocabProgress(memberId, vocabId) {
      const s = this.load(memberId);
      return (s.vocab && s.vocab[vocabId]) || null;
    },
    setVocabProgress(memberId, vocabId, progress) {
      const s = this.load(memberId);
      if (!s.vocab) s.vocab = {};
      s.vocab[vocabId] = progress;
      this.save(memberId, s);
    },
    pushMistake(memberId, vocabId) {
      const s = this.load(memberId);
      if (!s.mistakes) s.mistakes = [];
      // Dedup recent same vocabId, then unshift
      s.mistakes = s.mistakes.filter(m => m.vocabId !== vocabId);
      s.mistakes.unshift({ vocabId, at: new Date().toISOString() });
      s.mistakes = s.mistakes.slice(0, 50);
      this.save(memberId, s);
    },
    removeMistake(memberId, vocabId) {
      const s = this.load(memberId);
      if (!s.mistakes) return;
      s.mistakes = s.mistakes.filter(m => m.vocabId !== vocabId);
      this.save(memberId, s);
    },

    // Daily counters: { 'YYYY-MM-DD': { attempts, correct } }
    todayKey() {
      const d = new Date();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    },
    getDailyStats(memberId) {
      return this.load(memberId).daily || {};
    },
    recordDaily(memberId, isCorrect) {
      const s = this.load(memberId);
      if (!s.daily) s.daily = {};
      const k = this.todayKey();
      if (!s.daily[k]) s.daily[k] = { attempts: 0, correct: 0 };
      s.daily[k].attempts++;
      if (isCorrect) s.daily[k].correct++;
      this.save(memberId, s);
    },

    // Sentence (composition) progress: simple per-sentence counters.
    // Shape: state.composition[sentenceId] = { attempts, correct, lastAt }
    getSentenceProgress(memberId, sentenceId) {
      const s = this.load(memberId);
      return (s.composition && s.composition[sentenceId]) || null;
    },
    recordSentence(memberId, sentenceId, isCorrect) {
      const s = this.load(memberId);
      if (!s.composition) s.composition = {};
      const cur = s.composition[sentenceId] || { attempts: 0, correct: 0, lastAt: null };
      cur.attempts++;
      if (isCorrect) cur.correct++;
      cur.lastAt = new Date().toISOString();
      s.composition[sentenceId] = cur;
      this.save(memberId, s);
      this.recordDaily(memberId, isCorrect);
    },

    // Evaluate which user-composed support messages should now be unlocked
    // for `memberId`, given a trigger event. Returns the count of newly
    // unlocked messages.
    //
    // Conditions:
    //   open_now         — already unlocked at create time, never re-evaluated
    //   session_complete — unlocks when opts.sessionCompleted is true
    //   streak_3 / 7     — unlocks once the member's streak reaches the threshold
    evaluateUnlocks(memberId, opts) {
      const sessionDone = !!(opts && opts.sessionCompleted);
      const messages = loadUserMessages();
      let newlyUnlocked = 0;
      let changed = false;
      const now = new Date().toISOString();
      // Stats only needed for streak conditions; lazy-compute.
      let cachedStats = null;
      const getStats = () => cachedStats || (cachedStats = computeStats(memberId));
      for (const m of messages) {
        if (m.unlockedAt) continue;
        // Only auto-unlock messages addressed to this member or family-wide
        if (m.toMemberId && m.toMemberId !== memberId) continue;
        let unlock = false;
        if (m.unlockCondition === 'session_complete' && sessionDone) unlock = true;
        else if (m.unlockCondition === 'streak_3' && getStats().streakDays >= 3) unlock = true;
        else if (m.unlockCondition === 'streak_7' && getStats().streakDays >= 7) unlock = true;
        if (unlock) { m.unlockedAt = now; newlyUnlocked++; changed = true; }
      }
      if (changed) saveUserMessages(messages);
      return newlyUnlocked;
    },

    // Single entry point for "the user answered a question". Updates SRS state,
    // mistake log, and daily counters in one place. Pass removeOnCorrect: true
    // when the source is the mistake-review screen (a correct answer there
    // should clear the item from the mistake log).
    recordAnswer(memberId, vocabId, isCorrect, opts) {
      const prev = this.getVocabProgress(memberId, vocabId);
      const next = srs.apply(prev, isCorrect);
      this.setVocabProgress(memberId, vocabId, next);
      if (!isCorrect) this.pushMistake(memberId, vocabId);
      else if (opts && opts.removeOnCorrect) this.removeMistake(memberId, vocabId);
      this.recordDaily(memberId, isCorrect);
      return next;
    },
  };

  // ---------- Streak + weekly helpers ----------
  function dateKey(d) {
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }
  // Counts the number of consecutive days (ending today or yesterday) on which
  // the member had any attempts. Today with no activity does not break the
  // streak — it just means the streak was set yesterday.
  function computeStreak(daily) {
    let streak = 0;
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    const today = dateKey(d);
    if (!daily[today] || (daily[today].attempts || 0) === 0) {
      d.setDate(d.getDate() - 1);
    }
    while (true) {
      const k = dateKey(d);
      if (daily[k] && (daily[k].attempts || 0) > 0) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    return streak;
  }
  // Sum of correct answers over the trailing 7 days (today inclusive).
  function computeWeeklyCorrect(daily) {
    let total = 0;
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    for (let i = 0; i < 7; i++) {
      const k = dateKey(d);
      if (daily[k]) total += daily[k].correct || 0;
      d.setDate(d.getDate() - 1);
    }
    return total;
  }

  // ---------- SRS engine (Anki-like, simplified) ----------
  const srs = {
    initial() {
      return {
        status: 'new',           // 'new' | 'learning' | 'review' | 'mastered'
        consecutiveCorrect: 0,
        totalAttempts: 0,
        totalCorrect: 0,
        lastAt: null,
        nextAt: null,
        intervalDays: 0,
        ease: 2.5,
      };
    },
    apply(state, isCorrect) {
      const s = state ? Object.assign({}, state) : this.initial();
      s.totalAttempts++;
      s.lastAt = new Date().toISOString();
      if (isCorrect) {
        s.totalCorrect++;
        s.consecutiveCorrect++;
        if (s.intervalDays === 0)         { s.intervalDays = 1;  s.status = 'learning'; }
        else if (s.intervalDays < 4)      { s.intervalDays = Math.round(s.intervalDays * 2); s.status = 'learning'; }
        else if (s.intervalDays < 30)     { s.intervalDays = Math.round(s.intervalDays * s.ease); s.status = 'review'; }
        else                              { s.intervalDays = Math.round(s.intervalDays * s.ease); s.status = 'mastered'; }
      } else {
        s.consecutiveCorrect = 0;
        s.intervalDays = 0;
        s.status = 'learning';
        s.ease = Math.max(1.3, s.ease - 0.2);
      }
      s.nextAt = new Date(Date.now() + s.intervalDays * 86400000).toISOString();
      return s;
    },

    // Pick a queue for "today's 20":
    //   1) All due items, oldest nextAt first
    //   2) Filled with new items, preferring those near memberLevel
    // Returns up to `count` vocab objects (in display order).
    pickTodaysList(memberId, count, memberLevel) {
      const now = new Date().toISOString();
      const state = db.load(memberId);
      const progress = state.vocab || {};

      const due = [];
      const fresh = [];
      for (const v of VOCAB) {
        const p = progress[v.id];
        if (!p || p.status === 'new') fresh.push(v);
        else if (!p.nextAt || p.nextAt <= now) due.push({ v, p });
      }
      due.sort((a, b) => (a.p.nextAt || '').localeCompare(b.p.nextAt || ''));

      if (memberLevel) {
        fresh.sort((a, b) => {
          const da = Math.abs(a.level - memberLevel);
          const dbb = Math.abs(b.level - memberLevel);
          return da !== dbb ? da - dbb : a.level - b.level;
        });
      }

      const out = due.map(d => d.v);
      while (out.length < count && fresh.length > 0) out.push(fresh.shift());
      return {
        items: out.slice(0, count),
        dueCount: Math.min(due.length, count),
        freshCount: Math.max(0, Math.min(count, out.length) - Math.min(due.length, count)),
      };
    },
  };

  // ---------- Speech (TTS) — temporary stand-in until native MP3 audio is added ----------

  // Aggregate the current user's real stats from localStorage.
  function computeStats(memberId) {
    const state = db.load(memberId);
    const vocab = state.vocab || {};
    const daily = state.daily || {};
    let totalAttempts = 0, totalCorrect = 0, learnedCount = 0, masteredCount = 0;
    for (const vid in vocab) {
      const p = vocab[vid];
      totalAttempts += p.totalAttempts || 0;
      totalCorrect  += p.totalCorrect  || 0;
      if ((p.totalAttempts || 0) > 0) learnedCount++;
      if (p.status === 'mastered') masteredCount++;
    }
    const accuracy = totalAttempts > 0 ? Math.round(totalCorrect * 100 / totalAttempts) : 0;
    return {
      totalAttempts, totalCorrect, accuracy, learnedCount, masteredCount,
      weeklyCorrect: computeWeeklyCorrect(daily),
      streakDays:    computeStreak(daily),
    };
  }

  // ---------- Mastery helpers ----------
  // A vocab item is "mastered" once the SRS engine sets status = 'mastered'
  // (interval grows past ~30 days of correct answers).
  function getMasteredVocab(memberId) {
    const vocab = (db.load(memberId).vocab) || {};
    return VOCAB.filter(v => vocab[v.id] && vocab[v.id].status === 'mastered');
  }

  // A sentence is "mastered" once the user has answered it correctly 3+ times
  // with at least 70% overall accuracy.
  function isSentenceMastered(p) {
    if (!p || !p.attempts) return false;
    return p.correct >= 3 && (p.correct / p.attempts) >= 0.7;
  }
  function getMasteredSentences(memberId) {
    const composition = (db.load(memberId).composition) || {};
    return SENTENCES.filter(s => isSentenceMastered(composition[s.id]));
  }

  // ---------- Image compression (for photo attachments) ----------
  // Uses a canvas to downscale and re-encode as JPEG so photos don't blow up
  // localStorage. ~50-150KB per photo at maxDim 800.
  function compressImageToDataUrl(file, maxDim, quality) {
    if (!maxDim) maxDim = 800;
    if (quality == null) quality = 0.75;
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        try {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch (err) { URL.revokeObjectURL(url); reject(err); }
      };
      img.onerror = (err) => { URL.revokeObjectURL(url); reject(err); };
      img.src = url;
    });
  }

  // ---------- Time helper (relative, ja) ----------
  function timeAgo(iso) {
    if (!iso) return '';
    const ms = Date.now() - new Date(iso).getTime();
    if (ms < 60_000) return 'たった今';
    const min = Math.floor(ms / 60_000);
    if (min < 60)    return min + '分前';
    const hr  = Math.floor(min / 60);
    if (hr < 24)     return hr + '時間前';
    const d   = Math.floor(hr / 24);
    if (d < 30)      return d + '日前';
    return Math.floor(d / 30) + 'ヶ月前';
  }

  // ---------- App ----------
  function App() {
    const [route, setRoute] = useState({ name: 'profiles' });
    const [activeId, setActiveId] = useState(null);
    const profile = PROFILES.find(p => p.id === activeId) || null;

    if (route.name === 'profiles') {
      return e(ProfileSelect, {
        onPick:        (id) => { setActiveId(id); setRoute({ name: 'home' }); },
        onOpenSettings: () => setRoute({ name: 'settings' }),
      });
    }
    if (route.name === 'settings') {
      return e(SettingsScreen, {
        onBack: () => setRoute({ name: 'profiles' }),
      });
    }
    if (!profile) return null;

    if (route.name === 'home') {
      return e(EnglishHome, {
        profile,
        onBackToProfiles: () => setRoute({ name: 'profiles' }),
        onPickFeature:    (id) => setRoute({ name: 'feature', feature: id }),
      });
    }
    if (route.name === 'feature') {
      const feat = FEATURE_BY_ID[route.feature];
      const back = () => setRoute({ name: 'home' });
      if (route.feature === 'vocab')                  return e(VocabBrowse,        { profile, onBack: back });
      if (route.feature === 'daily20')                return e(Daily20,            { profile, onBack: back });
      if (route.feature === 'composition')            return e(SprintComposition,  { profile, onBack: back });
      if (route.feature === 'mistakes')               return e(MistakeReview,      { profile, onBack: back });
      if (route.feature === 'mastered_vocab')         return e(MasteredVocab,      { profile, onBack: back });
      if (route.feature === 'mastered_compositions')  return e(MasteredSentences,  { profile, onBack: back });
      if (route.feature === 'ranking')                return e(FamilyRanking,      { profile, onBack: back });
      if (route.feature === 'support')                return e(SupportMessages,    { profile, onBack: back });
      return e(ComingSoon, { profile, feature: feat, onBack: back });
    }
    return null;
  }

  // ---------- Vocab Browse (single flashcard, manual navigation) ----------
  function VocabBrowse({ profile, onBack }) {
    const [filter, setFilter] = useState('all');                 // 'all' | '1'..'5'
    const [index, setIndex]   = useState(0);
    const [flipped, setFlipped] = useState(false);
    const [tick, setTick]     = useState(0);                     // bump after marking, to re-read progress

    const filtered = useMemo(() => {
      if (filter === 'all') return VOCAB;
      const lv = parseInt(filter, 10);
      return VOCAB.filter(v => v.level === lv);
    }, [filter]);

    // Reset card state if filter changes or index out of range
    useEffect(() => { setIndex(0); setFlipped(false); }, [filter]);

    const total   = filtered.length;
    const current = filtered[Math.min(index, total - 1)] || null;
    const progress = current ? db.getVocabProgress(profile.id, current.id) : null;

    function go(delta) {
      setFlipped(false);
      setIndex(i => {
        const next = i + delta;
        if (next < 0) return total - 1;
        if (next >= total) return 0;
        return next;
      });
    }

    function mark(isKnown) {
      if (!current) return;
      db.recordAnswer(profile.id, current.id, isKnown);
      setTick(t => t + 1);
      // Auto-advance after a short beat so the user can see the new badge
      setTimeout(() => go(1), 200);
    }

    const levelChips = ['all','1','2','3','4','5'];
    const levelLabel = { all: 'All', '1':'L1', '2':'L2', '3':'L3', '4':'L4', '5':'L5' };

    const statusInfo = {
      new:      { label: '未学習', color: C.sub      },
      learning: { label: '学習中', color: C.accent   },
      review:   { label: '復習中', color: C.ocean    },
      mastered: { label: '習得',   color: C.success  },
    };
    const stInfo = statusInfo[(progress && progress.status) || 'new'];

    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '20px 22px 96px',

      }
    },
      // Top bar
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '単語学習'),
        e('div', {
          style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
        }, total > 0 ? (Math.min(index, total - 1) + 1) + ' / ' + total : '0 / 0'),
      ),

      // Filter chips
      e('div', {
        style: {
          display: 'flex', gap: 8, marginBottom: 22,
          overflowX: 'auto', paddingBottom: 4, WebkitOverflowScrolling: 'touch',
        }
      },
        levelChips.map(lv => {
          const isActive = lv === filter;
          return e('button', {
            key: lv, onClick: () => setFilter(lv),
            style: {
              padding: '8px 14px', borderRadius: 999, fontSize: 13, fontWeight: 600,
              flexShrink: 0, border: '1px solid ' + (isActive ? profile.color : C.line),
              background: isActive ? profile.color : C.card,
              color: isActive ? '#fff' : C.sub,

      // Empty state

          borderRadius: 18, padding: '40px 20px', textAlign: 'center', color: C.sub,
        }
      }, 'この階層の単語はまだありません'),

      // Flashcard (3D flip)
      current && e('div', { className: 'flip-wrap', style: { marginBottom: 18 } },

          style: { height: 320, cursor: 'pointer' },
          onClick: () => setFlipped(f => !f),
        },
          // FRONT
          e('div', { className: 'flip-face',
            style: {
              background: C.card, border: '1px solid ' + C.line,
              borderRadius: 24, padding: '24px 22px',
              display: 'flex', flexDirection: 'column',
              boxShadow: '0 10px 26px rgba(42,37,32,0.06)',
            }
          },
            // Header row
            e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
              e('div', { style: { display: 'flex', gap: 8 } },
                e('span', {
                  style: {
                    fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
                    background: profile.color + '1A', color: profile.color, letterSpacing: '0.06em',
                  }

                e('span', {

              'EXAMPLE'),
            e('div', { style: { display: 'flex', alignItems: 'flex-start', gap: 10 } },
              e('div', {
                style: { flex: 1, fontSize: 15, color: C.text, lineHeight: 1.5, fontFamily: SERIF, fontStyle: 'italic' }
              }, current.exEn),
              e('button', {
                onClick: (ev) => { ev.stopPropagation(); speak(current.exEn); },
                style: {

                  background: C.softer, color: profile.color, flexShrink: 0,

              current.exJa),

      // Action buttons (only meaningful while we have a card)
      current && e('div', { style: { display: 'flex', gap: 10, marginBottom: 14 } },

  // ---------- Today's 20 (SRS-driven session) ----------
  // For demo we cap at 10 questions (we only have 30 vocab items). Will scale to
  // 20 once the vocabulary master is expanded.
  const DAILY_COUNT = 10;

  function Daily20({ profile, onBack }) {
    const [bundle] = useState(() => srs.pickTodaysList(profile.id, DAILY_COUNT, profile.level));
    const [phase, setPhase]   = useState(bundle.items.length > 0 ? 'intro' : 'empty');
    const [index, setIndex]   = useState(0);
    const [revealed, setRevealed] = useState(false);
    const [results, setResults]   = useState([]);  // [{ vocabId, isCorrect }]
    const [unlockedCount, setUnlockedCount] = useState(0);

    const total   = bundle.items.length;
    const current = bundle.items[index] || null;
    const correct = results.filter(r => r.isCorrect).length;

    function record(isCorrect) {
      const cur = bundle.items[index];
      db.recordAnswer(profile.id, cur.id, isCorrect);
      const newResults = results.concat([{ vocabId: cur.id, isCorrect }]);
      setResults(newResults);
      if (index + 1 >= total) {
        setUnlockedCount(db.evaluateUnlocks(profile.id, { sessionCompleted: true }));
        setPhase('done');
        return;
      }
      setIndex(index + 1);
      setRevealed(false);
    }

    // Top bar (back + progress) — shared across phases
    const topBar = e('div', {
      style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 }
    },
      e('button', { onClick: onBack,
        style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
      }, '‹'),
      e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '今日の20問'),
      phase === 'study' && e('div', {
        style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
      }, (index + 1) + ' / ' + total),
    );

    // ============ INTRO ============
    if (phase === 'intro') {
      return e('div', { style: pageStyle, },
        topBar,
        e('div', { style: { padding: '32px 4px 20px' } },
          e('div', { style: { fontSize: 36, marginBottom: 10 } }, '🎯'),
          e('div', {
            style: { fontFamily: SERIF, fontSize: 30, fontWeight: 700, color: C.text, lineHeight: 1.15 }
          }, "Today's Practice"),
          e('div', { style: { fontSize: 13, color: C.sub, marginTop: 8, lineHeight: 1.6 } },
            total + ' 問の準備ができました。'),
        ),
        e(ProgressChips, { profile, style: { marginBottom: 16 } }),
        e('div', {
          style: {
            background: C.softer, border: '1px solid ' + C.line,
            borderRadius: 18, padding: '18px 20px', marginBottom: 22,
          }
        },
          e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
            e('div', null,
              e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.08em' } }, 'DUE'),
              e('div', { style: { fontSize: 24, fontWeight: 700, color: C.ocean, fontFamily: SERIF, marginTop: 2 } }, bundle.dueCount),
            ),
            e('div', { style: { width: 1, alignSelf: 'stretch', background: C.line, margin: '0 16px' } }),
            e('div', null,
              e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.08em' } }, 'NEW'),
              e('div', { style: { fontSize: 24, fontWeight: 700, color: C.accent, fontFamily: SERIF, marginTop: 2 } }, bundle.freshCount),
            ),
            e('div', { style: { width: 1, alignSelf: 'stretch', background: C.line, margin: '0 16px' } }),
            e('div', null,
              e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.08em' } }, 'TOTAL'),
              e('div', { style: { fontSize: 24, fontWeight: 700, color: C.text, fontFamily: SERIF, marginTop: 2 } }, total),
            ),
          ),
        ),
        e('button', {
          onClick: () => setPhase('study'),
          style: {
            width: '100%', padding: '16px 0', borderRadius: 16,
            background: profile.color, color: '#fff',
            fontSize: 16, fontWeight: 700, letterSpacing: '0.04em',
            boxShadow: '0 8px 22px ' + profile.color + '55',
          }
        }, '始める'),
      );
    }

    // ============ EMPTY ============
    if (phase === 'empty') {
      return e('div', { style: pageStyle },
        topBar,
        e('div', {
          style: {
            background: C.softer, border: '1px dashed ' + C.line,
            borderRadius: 20, padding: '40px 22px', textAlign: 'center', color: C.sub,
            marginTop: 12,
          }
        },
          e('div', { style: { fontSize: 36, marginBottom: 10 } }, '🌙'),
          e('div', {
            style: { fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 6 }
          }, '今日のDueはありません'),
          e('div', { style: { fontSize: 12, lineHeight: 1.7 } },
            '明日また会いましょう。\n単語学習で復習することもできます。'),
        ),
      );
    }

    // ============ DONE ============
    if (phase === 'done') {
      const accuracy = total > 0 ? Math.round(correct * 100 / total) : 0;
      const cheers =
        accuracy >= 90 ? '完璧！' :
        accuracy >= 70 ? 'よくできた！' :
        accuracy >= 50 ? 'いい調子。' : 'お疲れさま。';
      return e('div', { style: pageStyle },
        topBar,
        e('div', { style: { padding: '32px 4px 20px' } },
          e('div', { style: { fontSize: 44, marginBottom: 10 } }, accuracy >= 70 ? '🎉' : '🌱'),
          e('div', {
            style: { fontFamily: SERIF, fontSize: 32, fontWeight: 700, color: C.text, lineHeight: 1.15 }
          }, cheers),
          e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6 } },
            '今日の練習が終わりました。'),
        ),
        // Score block
        e('div', {
          style: {
            background: 'linear-gradient(135deg, ' + profile.color + ' 0%, ' + profile.color + 'D9 100%)',
            color: '#fff', padding: '22px 22px', borderRadius: 22, marginBottom: 18,
            boxShadow: '0 10px 28px ' + profile.color + '33',
          }
        },
          e('div', { style: { fontSize: 11, opacity: 0.85, letterSpacing: '0.14em', fontWeight: 600 } }, 'SCORE'),
          e('div', {
            style: { fontFamily: SERIF, fontSize: 42, fontWeight: 700, marginTop: 4, lineHeight: 1 }
          }, correct + ' / ' + total),
          e('div', { style: { fontSize: 13, opacity: 0.92, marginTop: 8 } },
            '精度 ' + accuracy + '%'),
        ),
        // Unlocked celebration banner
        unlockedCount > 0 && e(UnlockBanner, { count: unlockedCount }),
        // Per-question list
        e('div', {
          style: {
            background: C.card, border: '1px solid ' + C.line,
            borderRadius: 18, padding: 8, marginBottom: 18,
          }
        },
          results.map((r, i) => {
            const v = VOCAB.find(x => x.id === r.vocabId);
            if (!v) return null;
            return e('div', {
              key: r.vocabId,
              style: {
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '10px 12px',
                borderBottom: i < results.length - 1 ? '1px solid ' + C.line : 'none',
              }
            },
              e('div', {
                style: {
                  width: 24, height: 24, borderRadius: 999, fontSize: 13,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  background: r.isCorrect ? C.success + '22' : C.danger + '22',
                  color:      r.isCorrect ? C.success         : C.danger,
                  fontWeight: 700,
                }
              }, r.isCorrect ? '✓' : '✗'),
              e('div', { style: { flex: 1, minWidth: 0 } },
                e('div', { style: { fontSize: 14, fontWeight: 600, color: C.text } }, v.en),
                e('div', { style: { fontSize: 11, color: C.sub, marginTop: 1 } }, v.ja),
              ),
              e('div', { style: { fontSize: 10, color: C.sub, fontWeight: 600 } }, 'L' + v.level),
            );
          }),
        ),
        // Buttons

  // Compact "今日 N問 / 連続 N日 / 累計 N正解" strip for the active learner.
  // Returns null for viewer profiles (mother) since they don't study.
  function ProgressChips({ profile, includeTotal, style }) {
    if (profile.role === 'viewer') return null;
    const stats = computeStats(profile.id);
    const today = (db.getDailyStats(profile.id)[db.todayKey()] || {});
    const todayAttempts = today.attempts || 0;
    return e('div', {
      style: Object.assign({ display: 'flex', gap: 8, flexWrap: 'wrap' }, style || {}),
    },
      e(Chip, { label: '今日', value: todayAttempts + '問', color: profile.color }),
      stats.streakDays > 0 && e(Chip, {
        icon: '🔥', label: '連続', value: stats.streakDays + '日',
        color: profile.color, highlight: true,
      }),
      includeTotal && e(Chip, {
        label: '累計', value: stats.totalCorrect + '正解', color: profile.color,
      }),

  // ---------- Mistake Review (drives a session from the mistakes log) ----------
  function MistakeReview({ profile, onBack }) {
    // Build the deduped list once on mount
    const initialList = useMemo(() => {
      const ms = (db.load(profile.id).mistakes) || [];
      const seen = new Set(); const out = [];
      for (const m of ms) {
        if (seen.has(m.vocabId)) continue;
        seen.add(m.vocabId);
        const v = VOCAB.find(x => x.id === m.vocabId);
        if (v) out.push({ vocab: v, at: m.at });
      }
      return out;
    }, [profile.id]);

    const [phase, setPhase]     = useState('list');     // 'list' | 'study' | 'done'
    const [queue, setQueue]     = useState([]);
    const [index, setIndex]     = useState(0);
    const [revealed, setRevealed] = useState(false);
    const [results, setResults] = useState([]);
    const [unlockedCount, setUnlockedCount] = useState(0);

    function startAll() {
      if (initialList.length === 0) return;
      setQueue(initialList.map(m => m.vocab));
      setResults([]); setIndex(0); setRevealed(false);
      setPhase('study');
    }

    function record(isCorrect) {
      const cur = queue[index];
      db.recordAnswer(profile.id, cur.id, isCorrect, { removeOnCorrect: true });
      const newResults = results.concat([{ vocabId: cur.id, isCorrect }]);
      setResults(newResults);
      if (index + 1 >= queue.length) {
        setUnlockedCount(db.evaluateUnlocks(profile.id, { sessionCompleted: true }));
        setPhase('done');
        return;
      }
      setIndex(index + 1); setRevealed(false);
    }

    const topBar = e('div', {

        // Quiz card

          }
        },
          e('div', { style: { display: 'flex', gap: 8 } },
            e('span', {
              style: {
                fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
                background: profile.color + '1A', color: profile.color,

          e('div', { style: { textAlign: 'center', padding: '8px 0' } },
            e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.08em', marginBottom: 8 } },
              '日本語'),
            e('div', { style: { fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1.3 } }, current.ja),
          ),
          !revealed
            ? e('button', {
                onClick: () => setRevealed(true),
                style: {
                  marginTop: 'auto', padding: '14px 0', borderRadius: 14,
                  background: C.softer, color: profile.color,
                  fontSize: 14, fontWeight: 700, border: '1px solid ' + profile.color + '33',
                }
              }, '答えを見る')
            : e('div', { style: { marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: 12 } },
                e('div', {

                  }, current.exEn),
                  e('button', {

                ),
                e('div', { style: { fontSize: 12, color: C.sub, lineHeight: 1.6 } },
                  current.exJa),
              ),
        ),
        revealed && e('div', { style: { display: 'flex', gap: 10 } },
          e('button', {

  // ---------- Family Ranking ----------
  function FamilyRanking({ profile, onBack }) {
    const [metric, setMetric] = useState('weekly'); // 'weekly' | 'total'

    // Build entries: real stats for the active learner, dummy for others.
    const entries = useMemo(() => {
      return PROFILES.map(p => {
        if (p.role === 'viewer') {
          const d = DUMMY_STATS[p.id] || {};
          return {
            profile: p, kind: 'viewer', isMe: p.id === profile.id,
            cheers: d.cheers || 0,
          };
        }
        if (p.id === profile.id) {
          const real = computeStats(profile.id);
          return {
            profile: p, kind: 'real', isMe: true,
            weeklyCorrect: real.weeklyCorrect,
            totalCorrect:  real.totalCorrect,
            accuracy:      real.accuracy,
            streakDays:    real.streakDays,
            learnedCount:  real.learnedCount,
            masteredCount: real.masteredCount,
          };
        }
        const d = DUMMY_STATS[p.id] || { weeklyCorrect: 0, totalCorrect: 0, accuracy: 0, streakDays: 0 };
        return Object.assign({ profile: p, kind: 'dummy', isMe: false }, d);
      });
    }, [profile.id]);

    // Separate learners and viewer; sort learners by chosen metric desc.
    const learners = entries.filter(e_ => e_.kind !== 'viewer');
    const viewers  = entries.filter(e_ => e_.kind === 'viewer');
    const key = metric === 'weekly' ? 'weeklyCorrect' : 'totalCorrect';
    learners.sort((a, b) => (b[key] || 0) - (a[key] || 0));
    const maxValue = Math.max(1, ...learners.map(l => l[key] || 0));

    const medal = (rank) => rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : (rank + 1) + '位';

    return e('div', { style: pageStyle },
      // Top bar
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } },
          '家族ランキング'),
      ),

      // Header
      e('div', { style: { padding: '8px 4px 22px' } },
        e('div', { style: { fontSize: 32, marginBottom: 8 } }, '🏆'),
        e('div', {
          style: { fontFamily: SERIF, fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, 'Family Leaderboard'),
        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6 } },
          'みんなのがんばりが一目でわかります。'),
      ),

      // Metric toggle
      e('div', {
        style: {
          display: 'inline-flex', background: C.softer, borderRadius: 999,
          padding: 4, marginBottom: 16, border: '1px solid ' + C.line,
        }
      },
        ['weekly', 'total'].map(k => e('button', {
          key: k, onClick: () => setMetric(k),
          style: {
            padding: '8px 16px', borderRadius: 999, fontSize: 12, fontWeight: 700,
            background: metric === k ? C.card  : 'transparent',
            color:      metric === k ? C.text  : C.sub,
            boxShadow:  metric === k ? '0 2px 6px rgba(42,37,32,0.08)' : 'none',

      if (!file) return;
      setImgErr('');
      try {
        const dataUrl = await compressImageToDataUrl(file, 800, 0.75);
        // localStorage limit guard: ~5MB total, so cap a single photo at ~1MB base64.
        if (dataUrl.length > 1_400_000) {
          setImgErr('写真が大きすぎます。別の写真を試してください。');
          return;

        setImageUrl(dataUrl);

    const recipients = PROFILES.filter(p => p.id !== sender.id);  // can address anyone but self

          })),

      ),

      // ----- Unlock condition -----
      e('div', { style: { marginBottom: 22 } },
        e('div', {
          style: { fontSize: 11, color: C.sub, fontWeight: 700, letterSpacing: '0.1em', marginBottom: 10 }

        e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8 } },

  // ---------- Support Messages (cheerleader can compose; learners react) ----------
  function SupportMessages({ profile, onBack }) {
    const isMother = profile.isCheerleader === true;
    const dummyMessages = useMemo(buildDummyMessages, []);
    const [userMessages, setUserMessages] = useState(() => loadUserMessages());
    const [composeMode, setComposeMode] = useState(false);

    // Evaluate streak-based unlocks the moment the user opens the inbox.
    // (session_complete unlocks happen at session end, before navigation here.)
    useEffect(() => {
      const newly = db.evaluateUnlocks(profile.id);
      if (newly > 0) setUserMessages(loadUserMessages());
    }, [profile.id]);

    // Combined list: user's own + dummy seed
    const allMessages = useMemo(() => userMessages.concat(dummyMessages), [userMessages, dummyMessages]);

    function refreshUserMessages() { setUserMessages(loadUserMessages()); }
    function handleSubmitNew(msg) {
      addUserMessage(msg);
      refreshUserMessages();
      setComposeMode(false);
    }
    function handleDelete(id) {
      if (!confirm('このメッセージを削除しますか？')) return;
      deleteUserMessage(id);
      refreshUserMessages();
    }

    // Recipients see only their messages or family-wide; cheerleaders see all.
    const visible = useMemo(() => {
      const list = isMother
        ? allMessages
        : allMessages.filter(m => m.toMemberId === null || m.toMemberId === profile.id);
      return list.slice().sort((a, b) => {
        const au = !!a.unlockedAt, bu = !!b.unlockedAt;
        if (au !== bu) return au ? -1 : 1;
        return (b.createdAt || '').localeCompare(a.createdAt || '');
      });
    }, [allMessages, isMother, profile.id]);

    const [reactions, setReactions] = useState(() => loadReactions(profile.id));

    // ============ COMPOSE FORM ============
    if (composeMode) {
      return e(MessageCompose, {
        sender: profile,
        onCancel: () => setComposeMode(false),
        onSubmit: handleSubmitNew,
      });
    }

    function react(messageId, emoji) {
      const next = Object.assign({}, reactions);
      if (next[messageId] === emoji) delete next[messageId]; else next[messageId] = emoji;
      setReactions(next);
      saveReactions(profile.id, next);
    }

    const motherProfile = PROFILES.find(p => p.id === 'mother');
    const lookupMember  = (id) => PROFILES.find(p => p.id === id);

    const hueToColor = {
      rose: C.rose, orange: C.accent, sun: C.sun, ocean: C.ocean, forest: C.forest,
    };

    return e('div', { style: pageStyle },
      // Top bar
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } },
          '応援メッセージ'),
      ),

      // Header
      e('div', { style: { padding: '8px 4px 22px' } },
        e('div', { style: { fontSize: 32, marginBottom: 8 } }, '💌'),
        e('div', {
          style: { fontFamily: SERIF, fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, 'Cheer Mail'),
        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6 } },
          isMother
            ? 'みんなへの応援を、ためたり開けてもらったり。'
            : getDisplayName(motherProfile) + 'からの一言メッセージ。'),
      ),

      // Cheerleader compose CTA
      isMother && e('button', {
        onClick: () => setComposeMode(true),
        style: {
          width: '100%', padding: '14px 0', borderRadius: 14,
          background: motherProfile.color, color: '#fff',
          fontSize: 14, fontWeight: 700, marginBottom: 18,
          boxShadow: '0 6px 16px ' + motherProfile.color + '55',
        }
      }, '＋ 新しい応援を送る'),

      // Empty state
      visible.length === 0 && e('div', {
        style: {
          background: C.softer, border: '1px dashed ' + C.line,
          borderRadius: 20, padding: '40px 22px', textAlign: 'center', color: C.sub,
        }
      },
        e('div', { style: { fontSize: 36, marginBottom: 10 } }, '📭'),
        e('div', { style: { fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 6 } },
          'まだメッセージはありません'),
      ),

      // Messages
      e('div', { style: { display: 'flex', flexDirection: 'column', gap: 14 } },
        visible.map(m => {
          const sender = lookupMember(m.fromMemberId) || motherProfile;
          const recipient = m.toMemberId ? lookupMember(m.toMemberId) : null;
          const isLocked = !m.unlockedAt;
          const accent = hueToColor[m.imageHue] || sender.color;
          const myReaction = reactions[m.id];

          return e('div', {
            key: m.id,
            style: {
              background: C.card,
              border: '1px solid ' + (isLocked ? C.line : accent + '33'),

            e('div', {

                  ? '#000'

                }
              },
                e('span', { style: { fontSize: 16 } }, sender.emoji),
                e('span', { style: { fontWeight: 600, color: C.text } }, getDisplayName(sender)),

                isMother && m.id && m.id.indexOf('usr_') === 0 && e('button', {
                  onClick: () => handleDelete(m.id),
                  title: '削除',
                  style: {
                    width: 22, height: 22, borderRadius: 999,
                    background: C.softer, color: C.sub, border: '1px solid ' + C.line,
                    fontSize: 11, lineHeight: 1, cursor: 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }
                }, '✕'),
              ),

              // Content

  // ---------- Sprint Composition (瞬間英作文) ----------
  // Picks ~10 sentences near the member's level, runs a Daily20-style flow:
  // intro → study (JP prompt → reveal EN → self-grade) → done (score + list).
  const COMP_COUNT = 10;

  function pickComposition(memberLevel, count) {
    // Prefer sentences near the member's level (allow ±1), then fall back to all.
    const inRange = SENTENCES.filter(s => Math.abs(s.level - (memberLevel || 1)) <= 1);
    const pool = inRange.length >= count ? inRange : SENTENCES.slice();
    // Fisher-Yates shuffle
    const arr = pool.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr.slice(0, count);
  }

  function SprintComposition({ profile, onBack }) {
    const [queue]    = useState(() => pickComposition(profile.level, COMP_COUNT));
    const [phase, setPhase]   = useState(queue.length > 0 ? 'intro' : 'empty');
    const [index, setIndex]   = useState(0);
    const [revealed, setRevealed] = useState(false);
    const [results, setResults]   = useState([]);
    const [unlockedCount, setUnlockedCount] = useState(0);

    const total   = queue.length;
    const current = queue[index] || null;
    const correct = results.filter(r => r.isCorrect).length;

    function record(isCorrect) {
      const cur = queue[index];
      db.recordSentence(profile.id, cur.id, isCorrect);
      const newResults = results.concat([{ sentenceId: cur.id, isCorrect }]);
      setResults(newResults);
      if (index + 1 >= total) {
        setUnlockedCount(db.evaluateUnlocks(profile.id, { sessionCompleted: true }));
        setPhase('done');
        return;
      }
      setIndex(index + 1); setRevealed(false);
    }

    const topBar = e('div', {
      style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 }
    },
      e('button', { onClick: onBack,
        style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
      }, '‹'),
      e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '瞬間英作文'),
      phase === 'study' && e('div', {
        style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }

    // ============ INTRO ============
    if (phase === 'intro') {
      const byLevel = { 1: 0, 2: 0, 3: 0 };
      queue.forEach(s => { byLevel[s.level] = (byLevel[s.level] || 0) + 1; });
      return e('div', { style: pageStyle },
        topBar,

  function SettingsScreen({ onBack }) {
    const [names, setNames] = useState(() => loadDisplayNames());

    function update(id, value) {
      setNames(prev => Object.assign({}, prev, { [id]: value }));
    }
    function save() {
      // Trim, drop empties (so they fall back to role labels).
      const clean = {};
      for (const id in names) {
        const v = (names[id] || '').trim();
        if (v) clean[id] = v;
      }
      saveDisplayNames(clean);
      onBack();
    }
    function clearAll() {
      saveDisplayNames({});
      setNames({});
    }

    function resetAllData() {
      if (!confirm('この端末のすべての学習データを消去しますか？\n\n・語彙の進捗\n・間違いの記録\n・日次統計\n・応援メッセージとリアクション\n・カスタム名前\n\nが消えます。元に戻せません。')) return;
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf('hfe_') === 0) keys.push(k);
      }
      keys.forEach(k => localStorage.removeItem(k));
      location.reload();
    }

      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },

        e('div', {
          style: {
            height: 4, background: C.line, borderRadius: 999,
            overflow: 'hidden', marginTop: 16,
          }
        },
          e('div', {
            style: {
              width: pct + '%', height: '100%',
              background: 'linear-gradient(90deg, ' + C.gold + ' 0%, ' + profile.color + ' 100%)',
              transition: 'width .5s ease',
            }
          }),
        ),
        e('div', {
          style: {
            fontSize: 10, color: C.sub, marginTop: 8, fontFamily: SANS_UI,
            letterSpacing: '0.08em', textTransform: 'uppercase',
          }
        }, pct.toFixed(1) + '% to goal'),
      ),

      // Empty state
      count === 0
        ? e('div', {
            style: {
              background: C.softer, border: '1px dashed ' + C.line,
              borderRadius: 14, padding: '40px 22px', textAlign: 'center', color: C.sub,
            }
          },
            e('div', { style: { fontSize: 36, marginBottom: 10 } }, '🌱'),
            e('div', { style: { fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 6 } },
              'まだ覚えた単語はありません'),
            e('div', { style: { fontSize: 12, lineHeight: 1.7 } },
              '今日の20問・単語学習で\n何度も正解すると、ここに加わります。'),
          )
        // List
        : e('div', {
            style: {
              background: C.card, border: '1px solid ' + C.line,
              borderRadius: 14, overflow: 'hidden',
            }
          },
            items.map((v, i) => e('div', {
              key: v.id,
              style: {
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '14px 16px',
                borderBottom: i < items.length - 1 ? '1px solid ' + C.line : 'none',
              }
            },
              e('div', {
                style: {
                  fontFamily: SERIF, fontSize: 18, fontWeight: 600, color: C.text,
                  flex: 1, minWidth: 0,
                }
              }, v.en),
              e('div', { style: { fontSize: 13, color: C.sub, flex: 1, minWidth: 0 } }, v.ja),
              e('span', {
                style: {
                  fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 999,
                  background: C.softer, color: C.gold, fontFamily: SANS_UI,
                  letterSpacing: '0.06em', flexShrink: 0,
                }
              }, 'L' + v.level),
              e('button', {
                onClick: (ev) => { ev.stopPropagation(); speak(v.en); },
                style: {
                  width: 30, height: 30, borderRadius: 999, fontSize: 13,
                  background: C.softer, color: profile.color, flexShrink: 0,
                  border: '1px solid ' + C.line,
                }
              }, '🔊'),
            )),
          ),
    );
  }

  // ---------- Mastered Sentences ----------
  function MasteredSentences({ profile, onBack }) {
    const items = useMemo(() => getMasteredSentences(profile.id), [profile.id]);
    const total = SENTENCES.length;
    const count = items.length;
    const pct   = total > 0 ? Math.min(100, count * 100 / total) : 0;

    return e('div', { style: pageStyle },
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1, fontFamily: SANS_UI } },
          '覚えた英作文'),
      ),

      // Hero
      e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 14, padding: '24px 22px 20px', marginBottom: 18,
          textAlign: 'center',
        }
      },
        e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 10, fontWeight: 600,
            letterSpacing: '0.32em', textTransform: 'uppercase',
            color: C.gold, marginBottom: 6,
          }
        }, 'Sentences Mastered'),
        e('div', { style: { display: 'flex', alignItems: 'baseline', justifyContent: 'center', gap: 4 } },
          e('div', {
            style: { fontFamily: SERIF, fontSize: 56, fontWeight: 500, color: C.text, lineHeight: 1 }
          }, count),
          e('div', {
            style: { fontFamily: SERIF, fontSize: 22, fontWeight: 400, color: C.sub, lineHeight: 1 }
          }, '/ ' + total),
        ),
        e('div', {
          style: { fontSize: 12, color: C.sub, marginTop: 6, fontFamily: SANS_UI, letterSpacing: '0.06em' }
        }, 'sentences mastered'),
        e('div', {
          style: { height: 4, background: C.line, borderRadius: 999, overflow: 'hidden', marginTop: 16 }
        },
          e('div', {
            style: {
              width: pct + '%', height: '100%',
              background: 'linear-gradient(90deg, ' + C.gold + ' 0%, ' + profile.color + ' 100%)',
              transition: 'width .5s ease',
            }
          }),
        ),
        e('div', {
          style: {
            fontSize: 10, color: C.sub, marginTop: 8, fontFamily: SANS_UI,
            letterSpacing: '0.08em', textTransform: 'uppercase',
          }
        }, pct.toFixed(0) + '% complete'),
      ),

      count === 0
        ? e('div', {
            style: {
              background: C.softer, border: '1px dashed ' + C.line,
              borderRadius: 14, padding: '40px 22px', textAlign: 'center', color: C.sub,
            }
          },
            e('div', { style: { fontSize: 36, marginBottom: 10 } }, '✍️'),
            e('div', { style: { fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 6 } },
              'まだ覚えた英作文はありません'),
            e('div', { style: { fontSize: 12, lineHeight: 1.7 } },
              '瞬間英作文で同じ文を3回正解すると\nここに加わります。'),
          )
        : e('div', {
            style: {
              background: C.card, border: '1px solid ' + C.line,
              borderRadius: 14, overflow: 'hidden',
            }
          },
            items.map((s, i) => e('div', {
              key: s.id,
              style: {
                display: 'flex', alignItems: 'flex-start', gap: 12,
                padding: '14px 16px',
                borderBottom: i < items.length - 1 ? '1px solid ' + C.line : 'none',
              }
            },
              e('div', { style: { flex: 1, minWidth: 0 } },
                e('div', { style: { fontSize: 12, color: C.sub, marginBottom: 4 } }, s.ja),
                e('div', {
                  style: { fontFamily: SERIF, fontSize: 16, fontWeight: 500, color: C.text, lineHeight: 1.4 }
                }, s.en),
              ),
              e('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6, flexShrink: 0 } },
                e('span', {
                  style: {
                    fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 999,
                    background: C.softer, color: C.gold, fontFamily: SANS_UI, letterSpacing: '0.06em',
                  }
                }, 'L' + s.level),
                e('button', {
                  onClick: (ev) => { ev.stopPropagation(); speak(s.en); },
                  style: {
                    width: 30, height: 30, borderRadius: 999, fontSize: 13,
                    background: C.softer, color: profile.color,
                    border: '1px solid ' + C.line,
                  }
                }, '🔊'),
              ),
            )),
          ),
    );
  }

  // ---------- Coming Soon (placeholder for each feature, until implemented) ----------
  function ComingSoon({ profile, feature, onBack }) {
    if (!feature) return null;
    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '20px 22px 96px',

      }
    },
      // Top bar
      e('div', {
        style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 22 }
      },
        e('button', {
          onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em' } },
          'ホームに戻る'),
      ),

      // Header
      e('div', { style: { marginBottom: 28, paddingLeft: 4 } },
        e('div', { style: { fontSize: 36, marginBottom: 8 } }, feature.emoji),
        e('div', {
          style: { fontFamily: SERIF, fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, feature.label),
        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6 } }, feature.desc),
      ),

      // Coming soon panel
      e('div', {
        style: {
          background: C.softer, border: '1px dashed ' + C.line,
          borderRadius: 20, padding: '36px 24px', textAlign: 'center', color: C.sub,
        }
      },
        e('div', { style: { fontSize: 32, marginBottom: 10 } }, '🛠️'),
        e('div', {
          style: { fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 6 }

        e('div', { style: { fontSize: 12, lineHeight: 1.7 } },
          'この機能は順番に作っていきます。'),
      ),
    );
  }

  // ---------- Mount ----------
  ReactDOM.createRoot(document.getElementById('root')).render(e(App));
})();
