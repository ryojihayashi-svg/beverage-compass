  function EnglishLessons({ profile, onBack }) {
    const [phase, setPhase]       = useState('list');     // list | detail | quiz | result
    const [activeId, setActiveId] = useState(null);
    const [qIndex, setQIndex]     = useState(0);
    const [picked, setPicked]     = useState(null);       // selected choice index (null = not picked yet)
    const [results, setResults]   = useState([]);         // [{q, correct, picked}]
    const [retryWrongOnly, setRetryWrongOnly] = useState(false);
    // Wall-clock time the current quiz attempt began. Used to attach an
    // accurate `durationMs` to the session event when the last question
    // is answered.
    const quizStartRef = useRef(null);

    const lesson = activeId ? LESSON_BY_ID[activeId] : null;
    const quizSet = (() => {
      if (!lesson) return [];
      if (!retryWrongOnly) return lesson.quiz;
      // After "復習する" is tapped, drill only the questions that were wrong
      const wrongIds = new Set(results.filter(r => !r.correct).map(r => r.q));
      return lesson.quiz.filter(q => wrongIds.has(q.q));
    })();
    const currentQ = quizSet[qIndex] || null;
    const lastQ    = qIndex >= quizSet.length - 1;

    function startLesson(id) {
      setActiveId(id); setPhase('detail');
      setQIndex(0); setPicked(null); setResults([]); setRetryWrongOnly(false);
    }
    function startQuiz() {
      setPhase('quiz');
      setQIndex(0); setPicked(null); setResults([]);
      quizStartRef.current = Date.now();
    }
    function pick(i) {
      if (picked !== null) return;
      setPicked(i);
    }
    function nextQuestion() {
      const correct = picked === currentQ.answer;
      const newResults = [...results, { q: currentQ.q, correct, picked }];
      setResults(newResults);
      if (lastQ) {
        // Persist mistakes + a record of the attempt
        const wrong = newResults.filter(r => !r.correct).map(r => ({ q: r.q }));
        if (wrong.length > 0) pushLessonMistakes(profile.id, lesson.id, wrong);
        // Clear mistakes the learner just got right (so 復習 list shrinks)
        newResults.forEach(r => { if (r.correct) clearLessonMistake(profile.id, lesson.id, r.q); });
        const score = newResults.filter(r => r.correct).length;
        recordLessonResult(profile.id, lesson.id, score, newResults.length);
        if (db && typeof db.recordTurn === 'function') db.recordTurn(profile.id, 'lesson');
        // Stamp this lesson into the activity log just like vocab /
        // composition / mctest sessions do, so the home page shows that
        // 1分英語解説 was completed (lesson title carried in `label`).
        const durationMs = quizStartRef.current ? Date.now() - quizStartRef.current : null;
        db.pushEvent(profile.id, {
          kind: 'lesson',
          total: newResults.length,
          correct: score,
          label: lesson.title,
          durationMs,
        });
        markPathStepDone(profile, 'english_lessons');
        quizStartRef.current = null;
        setPhase('result');
      } else {
        setQIndex(qIndex + 1);
        setPicked(null);
      }
    }
    function reviewWrong() {
      setRetryWrongOnly(true);
      setPhase('quiz'); setQIndex(0); setPicked(null); setResults([]);
    }
    function retryAll() {
      setRetryWrongOnly(false);
      setPhase('quiz'); setQIndex(0); setPicked(null); setResults([]);
    }
    function backToList() {
      setActiveId(null); setPhase('list');
      setQIndex(0); setPicked(null); setResults([]); setRetryWrongOnly(false);
    }

    return e('div', { style: pageStyle },
      // Top bar
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', {
          onClick: () => phase === 'list' ? onBack() : backToList(),
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 },
          'aria-label': '戻る',
        }, '‹'),
        e('div', {
          style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 }
        }, '1分英語解説'),
      ),

      phase === 'list'   && e(LessonListView,   { profile, onPick: startLesson }),
      phase === 'detail' && e(LessonDetailView, { profile, lesson, onStartQuiz: startQuiz }),
      phase === 'quiz'   && currentQ && e(LessonQuizView, {
        profile, lesson, q: currentQ, qIndex, total: quizSet.length, picked,
        onPick: pick, onNext: nextQuestion, isLast: lastQ,
      }),
      phase === 'result' && e(LessonResultView, {
        profile, lesson, results,
        onRetryAll: retryAll,
        onReviewWrong: reviewWrong,
        onBack: backToList,
      }),
    );
  }

  // ---------- Lesson list (grouped by level) ----------
  // Level chip labels (subtitle below the LV number) — kept in one place
  // so the pill row and the section caption stay in sync.
  const LESSON_LEVEL_LABELS = {
    1: '超初級',     2: '中学初級',  3: '中学後半',
    4: '英検準2級', 5: '英検2級〜',
  };
  function LessonListView({ profile, onPick }) {
    const progress = loadLessonProgress(profile.id);
    // Recommended level = the user's profile level (Kippei→1, Yoshinari/
    // Mom→2, Dad→3, Naruchichi→4). If that level is still 準備中 we
    // walk DOWN first (closer to their comfort), then UP to find any
    // available content.
    const recommendedLevel = (function () {
      const want = profile.level || 1;
      for (let lv = want; lv >= 1; lv--) {
        if ((LESSONS_BY_LEVEL[lv] || []).length > 0) return lv;
      }
      for (let lv = want + 1; lv <= 5; lv++) {
        if ((LESSONS_BY_LEVEL[lv] || []).length > 0) return lv;
      }
      return 1;
    })();
    const [selectedLevel, setSelectedLevel] = useState(recommendedLevel);

    const lessons = LESSONS_BY_LEVEL[selectedLevel] || [];

    // Recommended lesson within the selected level — first un-attempted
    // one. Only flagged when the user is on the recommended-level tab,
    // so switching to a different LV doesn't keep highlighting a lesson
    // they're not currently looking at.
    const recommendedLessonId = (function () {
      if (selectedLevel !== recommendedLevel) return null;
      const undone = lessons.find(l => !progress[l.id]);
      if (undone) return undone.id;
      // All lessons attempted — recommend the one with the lowest best
      // score so the user circles back to weak spots.
      let best = null;
      for (const l of lessons) {
        const p = progress[l.id];
        if (!best || (p && p.bestScore < (progress[best.id]?.bestScore || 0))) best = l;
      }
      return best ? best.id : null;
    })();
    // If the user has navigated AWAY from the recommended level, the
    // recommended-level tab itself glows so they know where to go back.
    const tabNeedsGlow = selectedLevel !== recommendedLevel;

    return e('div', null,
      e('div', { style: { padding: '4px 4px 18px' } },
        e('div', {
          style: { fontFamily: SERIF, fontSize: 26, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, '1分英語解説'),
        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6, lineHeight: 1.6 } },
          '短い解説と 5 問のクイズで、文法と単語の感覚を 1 テーマずつ。1 つ 3 分以内で終わります。'),
      ),

      // Level pill tabs — horizontally scrollable on narrow screens so all
      // five tabs stay reachable without wrapping.
      e('div', {
        style: {
          display: 'flex', gap: 8, marginBottom: 18,
          overflowX: 'auto', paddingBottom: 4,
          // Hide horizontal scrollbar visuals; scroll still works.
          WebkitOverflowScrolling: 'touch',
        }
      },
        [1, 2, 3, 4, 5].map((lv) => {
          const isActive = selectedLevel === lv;
          const count = (LESSONS_BY_LEVEL[lv] || []).length;
          // Glow the recommended-level tab when the user has wandered
          // off to a different LV, to nudge them back to their level.
          const glow = tabNeedsGlow && lv === recommendedLevel;
          return e('button', {
            key: 'lv_tab_' + lv,
            onClick: () => setSelectedLevel(lv),
            className: glow ? 'hfe-step-current' : '',
            style: {
              flexShrink: 0,
              padding: '8px 14px', borderRadius: 999,
              background: isActive ? profile.color : C.card,
              color:      isActive ? '#fff'         : C.text,
              border: '1px solid ' + ((isActive || glow) ? profile.color : C.line),
              fontSize: 12, fontWeight: 700, fontFamily: SANS_UI,
              cursor: 'pointer', letterSpacing: '0.04em',
              display: 'inline-flex', alignItems: 'center', gap: 8,
            }
          },
            e('span', null, 'LV' + lv),
            count > 0 && e('span', {
              style: {
                fontSize: 10, fontWeight: 800,
                background: isActive ? 'rgba(255,255,255,0.25)' : C.softer,
                color:      isActive ? '#fff'                  : C.sub,
                padding: '1px 6px', borderRadius: 999,
              }
            }, String(count)),
          );
        }),
      ),

      // Selected-level header caption
      e('div', {
        style: {
          fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
          letterSpacing: '0.18em', textTransform: 'uppercase',
          color: C.sub, marginBottom: 12, paddingLeft: 4,
        }
      }, 'LEVEL ' + selectedLevel + ' · ' + (LESSON_LEVEL_LABELS[selectedLevel] || '')),

      lessons.length === 0
        ? e('div', {
            style: {
              background: C.softer, border: '1px dashed ' + C.line,
              borderRadius: 12, padding: '24px 20px',
              fontSize: 13, color: C.sub, textAlign: 'center', lineHeight: 1.7,
            }
          },
            e('div', { style: { fontSize: 20, marginBottom: 6 } }, '🛠'),
            e('div', null, 'このレベルは準備中です。'),
            e('div', null, '別のレベルのタブを押してみてください。'),
          )
        : e('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
            lessons.map((l) => {
              const p = progress[l.id];
              const sub = p
                ? '最高 ' + (p.bestScore || 0) + '/' + (p.lastTotal || 5) + ' · ' + (p.attempts || 1) + ' 回挑戦'
                : '未挑戦';
              const isRecommended = l.id === recommendedLessonId;
              return e('button', {
                key: l.id,
                onClick: () => onPick(l.id),
                className: isRecommended ? 'hfe-step-current' : '',
                style: {
                  display: 'flex', width: '100%', textAlign: 'left',
                  padding: '16px 16px', gap: 14, alignItems: 'center',
                  background: isRecommended ? (profile.color + '0F') : C.card,
                  border: '1px solid ' + (isRecommended ? profile.color : C.line),
                  borderRadius: 14, cursor: 'pointer',
                }
              },
                e('div', {
                  style: {
                    width: 44, height: 44, flexShrink: 0,
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    background: C.softer, border: '1px solid ' + C.line,
                    borderRadius: 12, fontSize: 22,
                  }
                }, l.icon || '✦'),
                e('div', { style: { flex: 1, minWidth: 0 } },
                  e('div', {
                    style: { fontFamily: SERIF, fontSize: 18, fontWeight: 700, color: C.text, lineHeight: 1.3 }
                  }, l.title),
                  e('div', {
                    style: { fontSize: 12, color: C.sub, marginTop: 3, lineHeight: 1.5 }
                  }, l.subtitle),
                  e('div', {
                    style: {
                      fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
                      letterSpacing: '0.06em', color: p && p.bestScore >= 4 ? C.success : C.sub,
                      marginTop: 6,
                    }
                  }, sub),
                ),
                e('span', {
                  style: { fontSize: 18, color: C.sub, flexShrink: 0 }
                }, '›'),
              );
            })
          ),
    );
  }

          style: {
            fontFamily: SANS_UI, fontSize: 12, fontWeight: 700, color: C.text,
            fontVariantNumeric: 'tabular-nums',
          }
        }, (qIndex + 1) + ' / ' + total),
      ),
      e('div', {
        style: {
          height: 4, background: C.line, borderRadius: 999,
          marginBottom: 22, overflow: 'hidden',
        }
      },
        e('div', {
          style: {
            width: ((qIndex + 1) / total * 100) + '%',
            height: '100%', background: profile.color,
            transition: 'width .3s ease',
          }
        }),
      ),

      // Question card — English (big) on top, optional Japanese hint
      // (small, dimmer) on a separate line below. Splitting the two makes
      // the English the visual centrepiece while still giving a nudge for
      // kids who don't know what the sentence means.
      e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 16, padding: '20px 20px 18px', marginBottom: 16,
        }
      },
        e('div', {
          style: { display: 'flex', alignItems: 'flex-start', gap: 10 }
        },
          e('div', {
            style: { flex: 1, fontFamily: SERIF, fontSize: 22, fontWeight: 700, color: C.text, lineHeight: 1.45 }
          }, q.q),
          e(SpeakerBtn, {
            onClick: () => speakLessonEnglish(q.q, isAnswered ? q.choices[q.answer] : null),
            color: profile.color, size: 32,
          }),
        ),
        q.qJa && e('div', {
          style: {
            marginTop: 10, paddingTop: 10,
            borderTop: '1px dashed ' + C.line,
            fontSize: 13, color: C.sub, lineHeight: 1.6,
          }
        }, q.qJa),
      ),

      // Choices
      e('div', {
        style: { display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 16 }
      },
        q.choices.map((c, i) => {
          let bg = C.card, border = '1px solid ' + C.line, color = C.text;
          if (isAnswered) {
            if (i === q.answer)        { bg = C.success + '1A'; border = '1px solid ' + C.success; color = C.success; }
            else if (i === picked)     { bg = C.danger  + '1A'; border = '1px solid ' + C.danger;  color = C.danger;  }
            else                       { bg = C.softer; border = '1px solid ' + C.line; color = C.sub; }
          }
          return e('button', {
            key: i,
            onClick: () => onPick(i),
            disabled: isAnswered,
            style: {
              display: 'flex', alignItems: 'center', gap: 12,
              padding: '14px 16px',
              background: bg, border, color,
              borderRadius: 14, textAlign: 'left',
              fontFamily: SERIF, fontSize: 18, fontWeight: 600,
              cursor: isAnswered ? 'default' : 'pointer',
              transition: 'background .15s, border-color .15s',
            }
          },
            e('span', {
              style: {
                width: 26, height: 26, flexShrink: 0,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                background: 'rgba(0,0,0,0.04)', color: 'inherit',
                borderRadius: 999, fontSize: 12, fontWeight: 700, fontFamily: SANS_UI,
              }
            }, String.fromCharCode(65 + i)),
            e('span', { style: { flex: 1 } }, c),
            e(SpeakerBtn, { onClick: (ev) => { ev.stopPropagation(); speak(c); }, color: profile.color, size: 24 }),
          );
        }),
      ),

      // Explanation card — shown after the user picks an answer. Made
      // generous (big icon, headline result, the correct word in serif,
      // a short note in plain text) so it reads like its own page rather
      // than a tiny annotation under the choices.
      isAnswered && e('div', {
        style: {
          background: (isCorrect ? C.success : C.danger) + '12',
          border: '1px solid ' + (isCorrect ? C.success : C.danger) + '66',
          borderRadius: 16, padding: '18px 18px 16px', marginBottom: 14,
        }
      },
        e('div', {
          style: {
            display: 'flex', alignItems: 'center', gap: 10,
            marginBottom: 12,
          }
        },
          e('span', {
            style: {
              fontSize: 22, fontWeight: 800,
              color: isCorrect ? C.success : C.danger,
              lineHeight: 1,
            }
          }, isCorrect ? '⭕' : '✕'),
          e('span', {
            style: {
              fontFamily: SERIF, fontSize: 20, fontWeight: 700,
              color: isCorrect ? C.success : C.danger,
            }
          }, isCorrect ? '正解！' : 'おしい！'),
          e('span', { style: { flex: 1 } }),
          e('span', {
            style: {
              fontSize: 11, color: C.sub, fontFamily: SANS_UI,
              fontWeight: 700, letterSpacing: '0.16em',
            }
          }, '解説'),
        ),
        // Correct answer pulled out so it's unmissable, even when the
        // explanation text is long.
        e('div', {
          style: {
            display: 'flex', alignItems: 'center', gap: 10,
            background: C.card, border: '1px solid ' + C.line,
            borderRadius: 12, padding: '10px 14px', marginBottom: 12,
          }
        },
          e('span', {
            style: {
              fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
              letterSpacing: '0.12em', color: C.sub, flexShrink: 0,
            }
          }, '答え'),
          e('span', {
            style: {
              flex: 1, fontFamily: SERIF, fontSize: 18, fontWeight: 700,
              color: C.text, lineHeight: 1.4,
            }
          }, q.choices[q.answer]),
          e(SpeakerBtn, {
            onClick: () => speak(q.choices[q.answer]),
            color: profile.color, size: 26,
          }),
        ),
        e('div', {
          style: { fontSize: 14, color: C.text, lineHeight: 1.75 }
        }, q.explain),
      ),
      isAnswered && e('button', {
        onClick: onNext,
        style: {
          width: '100%', padding: '14px 0', borderRadius: 14,
          background: C.brand, color: '#fff',
          border: '1px solid ' + C.brand,
          fontSize: 15, fontWeight: 700, fontFamily: SANS_UI,
          letterSpacing: '0.04em', cursor: 'pointer',
        }
      }, isLast ? '結果を見る →' : '次の問題 →'),
    );
  }

  // ---------- Lesson result (score + retry) ----------
  function LessonResultView({ profile, lesson, results, onRetryAll, onReviewWrong, onBack }) {
    const score = results.filter(r => r.correct).length;
    const total = results.length;
    const ratio = total === 0 ? 0 : score / total;
    const wrongCount = total - score;
    const headline = ratio === 1 ? '全問正解！'
                    : ratio >= 0.8 ? 'すごい！'
                    : ratio >= 0.6 ? 'いい調子！'
                    : 'もう一回トライ！';
    return e('div', null,
      e('div', { style: { padding: '4px 4px 22px', textAlign: 'center' } },
        e('div', {
          style: { fontFamily: SERIF, fontSize: 30, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, headline),
        e('div', {
          style: { fontFamily: SERIF, fontSize: 56, fontWeight: 800, color: profile.color, lineHeight: 1, marginTop: 16 }
        }, score + ' / ' + total),
        e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 11, fontWeight: 700,
            letterSpacing: '0.18em', color: C.sub, marginTop: 10,
          }
        }, lesson.title.toUpperCase()),
      ),

      // Per-question summary
      e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 14, padding: '6px 0', marginBottom: 18,
        }
      },
        results.map((r, i) => e('div', {
          key: i,
          style: {
            display: 'flex', alignItems: 'center', gap: 12,
            padding: '12px 16px',
            borderBottom: i === results.length - 1 ? 'none' : '1px solid ' + C.line,
          }
        },
          e('span', {
            style: {
              width: 22, height: 22, flexShrink: 0,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              background: (r.correct ? C.success : C.danger) + '1A',
              color: r.correct ? C.success : C.danger,
              borderRadius: 999, fontSize: 11, fontWeight: 800,
            }
          }, r.correct ? '○' : '✕'),
          e('span', {
            style: { flex: 1, fontSize: 12, color: C.text, lineHeight: 1.5, fontFamily: SERIF }
          }, r.q),
        )),
      ),

      // Action buttons
      e('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
        wrongCount > 0 && e('button', {
          onClick: onReviewWrong,
          style: {
            width: '100%', padding: '14px 0', borderRadius: 14,
            background: profile.color + '14', color: profile.color,
            border: '1px solid ' + profile.color,
            fontSize: 14, fontWeight: 700, fontFamily: SANS_UI, cursor: 'pointer',
          }
        }, '間違えた ' + wrongCount + ' 問だけ復習する'),
        e('button', {
          onClick: onRetryAll,
          style: {
            width: '100%', padding: '14px 0', borderRadius: 14,
            background: C.softer, color: C.text,
            border: '1px solid ' + C.line,
            fontSize: 14, fontWeight: 700, fontFamily: SANS_UI, cursor: 'pointer',
          }
        }, 'もう一度 5 問やる'),
        e('button', {
          onClick: onBack,
          style: {
            width: '100%', padding: '14px 0', borderRadius: 14,
            background: 'none', color: C.sub,
            border: 'none',
            fontSize: 13, fontWeight: 700, fontFamily: SANS_UI, cursor: 'pointer',
          }
        }, '一覧に戻る'),
      ),
    );
  }

  // ---------- Coming Soon (placeholder for each feature, until implemented) ----------
  function ComingSoon({ profile, feature, onBack }) {
    if (!feature) return null;
    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '44px 22px 96px',

      }
    },
      // Top bar
      e('div', {
        style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 22 }
      },
        e('button', {
          onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em' } },
          'ホームに戻る'),
      ),

      // Header
      e('div', { style: { marginBottom: 28, paddingLeft: 4 } },
        e('div', { style: { fontSize: 36, marginBottom: 8 } }, feature.emoji),
        e('div', {
          style: { fontFamily: SERIF, fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, feature.label),
        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6 } }, feature.desc),
      ),

      // Coming soon panel
      e('div', {
        style: {
          background: C.softer, border: '1px dashed ' + C.line,
          borderRadius: 20, padding: '36px 24px', textAlign: 'center', color: C.sub,
        }
      },
        e('div', { style: { fontSize: 32, marginBottom: 10 } }, '🛠️'),
        e('div', {
          style: { fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 6 }
        }, '次のステップで実装します'),
        e('div', { style: { fontSize: 12, lineHeight: 1.7 } },
          'この機能は順番に作っていきます。'),
      ),
    );
  }

  // ---------- Mount ----------
  ReactDOM.createRoot(document.getElementById('root')).render(e(App));

  // One-time migration: if this device already has local names / avatars /
  // photos set under the old (timestamp-less) scheme, stamp the local
  // timestamp now so the first cloud hydrate doesn't overwrite them with
  // an older empty cloud row.
  (function migrateFamilySharedLocalTs() {
    if (loadFamilySharedLocalTs()) return;
    const hasData =
      Object.keys(loadDisplayNames()).length > 0 ||
      Object.keys(loadAvatars()).length > 0 ||
      loadFamilyPhotos().length > 0;
    if (hasData) stampFamilySharedLocal();
  })();

  // One-time migration: seed `turns` from `daily.attempts` so the
  // activity panel reflects practice the family did before turn-tracking
  // was added. Marked with a flag so it only runs once per profile.
  (function backfillTurnsForAllProfiles() {
    PROFILES.forEach(p => {
      try { db.backfillTurnsFromDaily(p.id); } catch {}
    });
  })();

  // Verify the cloud connection on boot so the Settings panel shows a green
  // dot immediately when everything's healthy. Failure is silent — the app
  // keeps working offline.
  if (cloud.status.enabled) {
    cloud.pingTest().catch(() => {});
    // Restore family-shared data (names, avatars, photos) from the cloud
    // so anything set on another device shows up here too. Names + avatars
    // + photos all live in one shared row so one save can't wipe the rest.
    hydrateFamilySharedFromCloud().catch(() => {});
    // Pull every family member's learning progress so the ProfileSelect
    // screen shows fresh stats for everyone, not only the profile that's
    // most recently been opened on this device. This is what makes
    // 'Yoshinari studied overnight in the UK' visible to Dad's iPad
    // the next morning.
    hydrateAllProfilesFromCloud().catch(() => {});
  }
  // When the device comes back online, also re-pull everyone's progress
  // so a parent who's been offline picks up the kids' overnight study
  // without having to relaunch the app.
  if (typeof window !== 'undefined') {
    window.addEventListener('online', () => {
      if (cloud.status.enabled) {
        hydrateAllProfilesFromCloud().catch(() => {});
        hydrateFamilySharedFromCloud().catch(() => {});
      }
    });
  }

  // ---------- Service Worker registration + update prompt ----------
  // Registered relative to this HTML file so it works on GitHub Pages
  // (path: /beverage-compass/sw.js) and on a local file server alike.
  // Also wires the update-available event used by UpdateBanner.
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        if (!reg) return;
        // If a new SW is already waiting from a previous load, raise the flag.
        if (reg.waiting && navigator.serviceWorker.controller) {
          window.dispatchEvent(new CustomEvent('hfe:update-available'));
        }
        // Listen for new SW installs.
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.dispatchEvent(new CustomEvent('hfe:update-available'));
            }
          });
        });
        // Re-check periodically while the page is open so a kid who never
        // closes the app still picks up new versions within the hour.
        setInterval(() => { reg.update().catch(() => {}); }, 30 * 60 * 1000);
      }).catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
      // When the controller actually changes (after skipWaiting), reload
      // so the page picks up the new HTML / JS bundle.
      let controllerSwapped = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (controllerSwapped) return;
        controllerSwapped = true;
        // Tiny delay to let any in-flight saves finish.
        setTimeout(() => location.reload(), 100);
      });
    });
  }
})();
</script>
</body>
