            )
          : e('div', null,
              e('div', {
                style: {
                  display: 'flex', alignItems: 'center', gap: 8,
                  fontFamily: SANS_UI, fontSize: 11, fontWeight: 800,
                  letterSpacing: '0.12em', color: C.sub, marginBottom: 6,
                }
              },
                e('span', { style: { flex: 1 } }, '今日の学習'),
                e('span', {
                  style: {
                    color: profile.color, fontVariantNumeric: 'tabular-nums',
                  }
                }, doneSteps + ' / ' + totalSteps),
              ),
              e('div', {
                style: { fontSize: 14, color: C.text, lineHeight: 1.6, fontWeight: 600 }
              },
                '次は ',
                e('span', {
                  style: { color: profile.color, fontWeight: 800 }
                }, '「' + (PATH_STEP_LABEL[currentStepId] || currentStepId) + '」'),
                ' をやろう。',
              ),
              // Tiny dot row: filled = done, empty = remaining, ring = current.
              e('div', {
                style: { display: 'flex', gap: 6, marginTop: 8, alignItems: 'center' }
              },
                path.steps.map((s, i) => e('span', {
                  key: 'dot_' + i,
                  style: {
                    width: 8, height: 8, borderRadius: 999,
                    background: s.doneAt ? profile.color : 'transparent',
                    border: '1.5px solid ' + (i === currentIdx ? profile.color : (s.doneAt ? profile.color : C.line)),
                    boxShadow: i === currentIdx ? '0 0 0 3px ' + profile.color + '33' : 'none',
                  }
                })),
              ),
            ),
      ),

      // Section label
      e('div', {
        style: {
          fontSize: 12, color: C.sub, letterSpacing: '0.12em',
          fontWeight: 600, marginBottom: 10, paddingLeft: 4, fontFamily: SANS_UI,
        }
      }, 'ENGLISH LEARNING'),

      // Feature tiles
      e('div', {
        style: {
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12,
        }
      },
        visibleFeatures.map(f => {
          // Inject live numbers — today's date + activity count for practice
          // tiles, total counts for the summary tiles.
          const turns  = db.getTurns(profile.id);
          const todayK = db.todayKey(profile.id);
          const today  = turns[todayK] || {};
          // Yoshinari sees London-local 'today'; everyone else uses
          // their device-local date.
          const [, mmStr, ddStr] = todayK.split('-');
          const dateLabel = parseInt(mmStr, 10) + '/' + parseInt(ddStr, 10);
          let subtitle = f.desc;
          if (f.id === 'random_test') {
            subtitle = dateLabel + ' ' + (today.random_test || 0) + '回';
          } else if (f.id === 'phrases') {
            const flips = today.flip   || 0;
            const tests = today.mctest || 0;
            const parts = [];
            parts.push(flips + 'めくり');
            if (tests > 0) parts.push(tests + '回テスト');
            subtitle = dateLabel + ' ' + parts.join(' / ');
          } else if (f.id === 'vocab_ja2en' || f.id === 'vocab_en2ja') {
            // Both directions share the same counter — turning over 10
            // questions in either direction counts as one vocab turn.
            subtitle = (f.desc ? f.desc + ' · ' : '') + dateLabel + ' ' + (today.vocab || 0) + '回';
          } else if (f.id === 'composition_ja2en' || f.id === 'composition_en2ja') {
            subtitle = (f.desc ? f.desc + ' · ' : '') + dateLabel + ' ' + (today.composition || 0) + '回';
          } else if (f.id === 'mistakes') {
            // Total mistakes overcome (lifetime) instead of pending count
            // per the new spec — '何個の間違いを克服したか'.
            const t = computeTotalOvercome(profile.id);
            subtitle = '間違い克服数: ' + t + ' 件';
          } else if (f.id === 'mastered') {
            const v = getMasteredVocab(profile.id).length;
            const s = getMasteredSentences(profile.id).length;
            subtitle = '一語一文 · ' + v + '語 / ' + s + '文';
          } else if (f.id === 'ai_translate') {
            subtitle = loadApiKey()
              ? '日本語 ⇄ 英語 / 写真の文字も翻訳できる'
              : '設定で API キーを登録してください';
          } else if (f.id === 'english_lessons') {
            const total = ENGLISH_LESSONS.length;
            const progress = loadLessonProgress(profile.id);
            const done = ENGLISH_LESSONS.filter(l => progress[l.id]).length;
            subtitle = '1テーマずつ、解説 + 5問クイズ · ' + done + ' / ' + total + ' 挑戦済み';
          } else if (f.id === 'shadowing') {
            const t = today.shadowing || 0;
            subtitle = '聞いて即真似する音読練習 · ' + dateLabel + ' ' + t + '回';
          } else if (f.id === 'saved_translate') {
            const n = loadSavedTranslations(profile.id).length;
            subtitle = n > 0 ? '保存した翻訳 ' + n + ' 件 · タップで復習' : 'AI翻訳の★で保存した文をここで復習';
          }
          return e(FeatureTile, {
            key: f.id, feature: f,
            onClick: () => onPickFeature(f.id),
            subtitle,
            pathStatus: pathStatusFor(f.id),
            profileColor: profile.color,
          });
        }),
      ),

      // 7-day activity panel — date columns × activity rows. Replaces the
      // previous bare grid with a quick at-a-glance look at how many turns
      // each activity has clocked over the last week.
      e(ActivityPanel, { profile }),
      e(SessionLog,    { profile }),
    );
  }

  // ---------- Session log ----------
  // Reverse-chronological list of practice events (each session, each
  // mistake-overcome) with date / time / contents. Most recent on top.
  // Times are formatted in the member's own timezone so Yoshinari's
  // London evenings don't show up as midday in Japan.
  function SessionLog({ profile }) {
    const [, setTick] = useState(0);
    useEffect(() => {
      const id = setInterval(() => setTick(t => t + 1), 60_000);
      return () => clearInterval(id);
    }, []);
    const events = db.getEvents(profile.id);
    if (events.length === 0) {
      return e('div', { style: { marginTop: 26 } },
        e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
            letterSpacing: '0.18em', textTransform: 'uppercase',
            color: C.sub, marginBottom: 12, paddingLeft: 4,
          }
        }, '学習ログ'),
        e('div', {
          style: {
            background: C.softer, border: '1px dashed ' + C.line,
            borderRadius: 12, padding: '24px 16px', textAlign: 'center',
            fontSize: 12, color: C.sub,
          }
        }, '練習を始めるとここに記録が残ります。'),
      );
    }
    const tz = MEMBER_TIMEZONE[profile.id];
    const dayFmt = new Intl.DateTimeFormat('ja-JP', Object.assign({
      year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'short',
    }, tz ? { timeZone: tz } : {}));
    const timeFmt = new Intl.DateTimeFormat('ja-JP', Object.assign({
      hour: '2-digit', minute: '2-digit', hour12: false,
    }, tz ? { timeZone: tz } : {}));
    const KIND_LABEL = {
      vocab: '単語学習', composition: '瞬間英作文',
      random_test: 'ランダムテスト',  mctest: 'Daily English テスト',
      flip: 'Daily English めくり',   overcome: '間違い克服',
      lesson: '1分英語解説',          shadowing: 'シャドーイング',
    };
    return e('div', { style: { marginTop: 26 } },
      e('div', {
        style: {
          fontFamily: SANS_UI, fontSize: 10, fontWeight: 700,
          letterSpacing: '0.18em', textTransform: 'uppercase',
          color: C.sub, marginBottom: 12, paddingLeft: 4,
        }
      }, '学習ログ'),
      e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 14, overflow: 'hidden',
        }
      },
        events.slice(0, 30).map((ev, i) => {
          const at = new Date(ev.at || Date.now());
          const day = dayFmt.format(at);
          const tm  = timeFmt.format(at);
          const kindLabel = KIND_LABEL[ev.kind] || ev.kind;
          let detail = '';
          // For lessons, the topic title (carried in ev.label) is the
          // most useful detail — show it before the score.
          if (ev.kind === 'lesson' && ev.label) {
            detail = ev.label;
          }
          if (typeof ev.total === 'number') {
            const scorePart = ev.total + '問'
              + (typeof ev.correct === 'number' ? ' (' + ev.correct + '/' + ev.total + ' 正解)' : '');
            detail = (detail ? detail + ' · ' : '') + scorePart;
          }
          if (ev.direction) {
            const dirJa = ev.direction === 'ja2en' ? '日本語 → 英語'
                        : ev.direction === 'en2ja' ? '英語 → 日本語' : ev.direction;
            detail = (detail ? detail + ' · ' : '') + dirJa;
          }
          if (ev.level && ev.level !== 'auto') {
            detail = (detail ? detail + ' · ' : '') + 'レベル ' + ev.level;
          }
          // Show measured session duration (when the firing component
          // recorded one) as a small "(N分)" tail.
          if (typeof ev.durationMs === 'number' && ev.durationMs >= 30_000) {
            const mins = Math.round(ev.durationMs / 60000);
            if (mins >= 1) detail = (detail ? detail + ' · ' : '') + mins + '分';
          }
          return e('div', {
            key: ev.at + '_' + i,
            style: {
              display: 'flex', alignItems: 'flex-start', gap: 12,
              padding: '12px 14px',
              borderBottom: i < Math.min(30, events.length) - 1 ? '1px solid ' + C.line : 'none',
            }
          },
            e('div', { style: { flex: '0 0 96px', minWidth: 0 } },
              e('div', {
                style: { fontSize: 11, color: C.sub, fontFamily: SANS_UI, fontVariantNumeric: 'tabular-nums' }
              }, day),
              e('div', {
                style: { fontSize: 14, color: C.text, fontWeight: 700, fontFamily: SANS_UI, fontVariantNumeric: 'tabular-nums' }
              }, tm),
            ),
            e('div', { style: { flex: 1, minWidth: 0 } },
              e('div', {
                style: { fontSize: 13, color: C.text, fontWeight: 700 }
              }, kindLabel),
              detail && e('div', {
                style: { fontSize: 11, color: C.sub, marginTop: 2 }
              }, detail),
            ),
          );
        }),
      ),
    );
  }

  function FeatureTile({ feature, onClick, subtitle, pathStatus, profileColor }) {
    const sub = subtitle || feature.desc;
    const isCurrent  = pathStatus && pathStatus.isCurrent;
    const isDone     = pathStatus && pathStatus.isDone;
    const isUpcoming = pathStatus && pathStatus.isUpcoming;
    const accent = profileColor || C.brand;
    return e('button', {
      onClick,
      // The pulsing ring is added when this is the next step on the
      // user's daily path; otherwise the tile renders exactly as before.
      className: isCurrent ? 'hfe-step-current' : '',
      style: {
        gridColumn: feature.fullWidth ? '1 / -1' : 'auto',
        background: isCurrent ? (accent + '0F') : C.card,
        color: C.text,
        border: '1px solid ' + (isCurrent ? accent : C.line),
        borderRadius: 14, padding: '16px 14px',
        textAlign: 'left', minHeight: feature.fullWidth ? 64 : 86,
        display: 'flex',
        flexDirection: feature.fullWidth ? 'row' : 'column',
        justifyContent: 'center',
        alignItems: feature.fullWidth ? 'center' : 'stretch',
        gap: feature.fullWidth ? 12 : 4,
        cursor: 'pointer',
        position: 'relative',
        opacity: isDone ? 0.55 : 1,
      }
    },
      // Step badge in the top-right corner — shows the step number for
      // upcoming/current path steps, ✓ for completed ones.
      pathStatus && (isCurrent || isUpcoming || isDone) && e('span', {
        style: {
          position: 'absolute', top: 8, right: 8,
          minWidth: 22, height: 22, padding: '0 6px', borderRadius: 999,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 11, fontWeight: 800, fontFamily: SANS_UI,
          background: isCurrent ? accent : isDone ? C.success : C.softer,
          color: (isCurrent || isDone) ? '#fff' : accent,
          border: '1px solid ' + (isCurrent ? accent : isDone ? C.success : accent + '55'),
          letterSpacing: 0,
        }
      }, isDone ? '✓' : String(pathStatus.stepNum || '')),

      e('div', { style: { flex: feature.fullWidth ? 1 : 'unset' } },
        // Tile label uses SANS_UI (DM Sans + Noto Sans JP) so digits
        // like the "1" in "1分英語解説" render with a clean numeric
        // glyph instead of Mincho's stylised "1".
        e('div', { style: { fontFamily: SANS_UI, fontSize: 15, fontWeight: 700, lineHeight: 1.2 } }, feature.label),
        e('div', {
          style: {
            fontSize: 11, marginTop: 2, lineHeight: 1.4,
            color: C.sub, fontFamily: SANS_UI, fontWeight: 600,
          }
        }, sub),
      ),
      feature.fullWidth && e('div', {
        style: { color: C.sub, fontSize: 18, flexShrink: 0 }
      }, '›'),
    );
  }

  // ---------- Vocab Browse (10-question session, accordion reveal) ----------
  // Each session draws 10 shuffled words from the chosen level filter,
  // shows them one at a time with the answer hidden behind a tap, and
  // ends on the shared SessionDoneCard once the learner has gone through
  // all 10. The short cap matches kids' attention span and gives a clear
  // finish line every few minutes.
  const VOCAB_SESSION_COUNT = 10;
  function VocabBrowse({ profile, onBack, forcedDirection }) {
    const [direction, setDirection] = useState(forcedDirection || 'en2ja'); // 'en2ja' | 'ja2en'
    const [selectedLevel, setSelectedLevel] = useState('auto');  // 'auto' | 1..5
    const [phase, setPhase]   = useState('intro');               // 'intro' | 'study' | 'done'
    const [queue, setQueue]   = useState([]);
    const [index, setIndex]   = useState(0);
    const [revealed, setRevealed] = useState(false);
    const [correctCount, setCorrectCount] = useState(0);

    function buildQueue() {
      if (selectedLevel === 'auto') {
        return pickWeightedQueue(VOCAB, profile, VOCAB_SESSION_COUNT);
      }
      const pool = VOCAB.filter(v => v.level === selectedLevel);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = pool[i]; pool[i] = pool[j]; pool[j] = t;
      }
      return pool.slice(0, VOCAB_SESSION_COUNT);
    }
    function startSession() {
      setQueue(buildQueue());
      setIndex(0); setRevealed(false); setCorrectCount(0);
      setPhase('study');
    }
    function restart() {
      // Same level / direction, fresh shuffled queue.
      setQueue(buildQueue());
      setIndex(0); setRevealed(false); setCorrectCount(0);
      setPhase('study');
    }

    const total   = queue.length;
    const current = queue[Math.min(index, total - 1)] || null;
    const progress = current ? db.getVocabProgress(profile.id, current.id) : null;

    function mark(isKnown) {
      if (!current || phase !== 'study') return;
      db.recordAnswer(profile.id, current.id, isKnown, { direction });
      if (isKnown) { soundCorrect(); hapticTap(); }
      else         { soundWrong();   hapticBuzz(); }
      const nextCorrect = correctCount + (isKnown ? 1 : 0);
      setCorrectCount(nextCorrect);
      // Advance — or finish the session if we've answered all 10.
      setTimeout(() => {
        if (index + 1 >= total) {
          soundComplete();
          db.recordTurn(profile.id, 'vocab');
          db.pushEvent(profile.id, {
            kind: 'vocab', total, correct: nextCorrect,
            level: selectedLevel === 'auto' ? 'auto' : selectedLevel,
            direction,
          });
          // Mark the matching step on today's guided path so the home
          // screen advances the glow to the next recommended activity.
          markPathStepDone(profile, direction === 'ja2en' ? 'vocab_ja2en' : 'vocab_en2ja');
          setPhase('done');
        } else {
          setRevealed(false);
          setIndex(i => i + 1);
        }
      }, 240);
    }

    const statusInfo = {
      new:      { label: '未学習', color: C.sub      },
      learning: { label: '学習中', color: C.accent   },
      review:   { label: '復習中', color: C.ocean    },
      mastered: { label: '習得',   color: C.success  },
    };
    const stInfo = statusInfo[(progress && progress.status) || 'new'];
    const isJa2En = direction === 'ja2en';

    // ============ DONE ============
    // Once the learner has worked through all 10 cards, hand off to the
    // shared finish-screen body — random family photo, bilingual cheer,
    // plain score. 'もう10問やる' restarts with a fresh shuffled deck.
    if (phase === 'done') {
      return e(SessionDoneCard, {
        profile, correct: correctCount, total, onBack,
        extra: e('button', {
          onClick: restart,
          style: {
            width: '100%', padding: '14px 0', borderRadius: 12,
            background: C.softer, color: profile.color,
            border: '1px solid ' + profile.color + '33',
            fontSize: 14, fontWeight: 700, fontFamily: SANS_UI,
            marginBottom: 12, cursor: 'pointer',
          }
        }, 'もう10問やる'),
      });
    }

    // ============ INTRO ============
    // Mirrors SprintComposition's intro: pick a level (or 'おまかせ'),
    // optionally a direction, then start a 10-question session.
    if (phase === 'intro') {
      const memberName = getDisplayName(profile);
      const levelOpts = [
        { value: 'auto', label: 'おまかせ',   desc: memberName + 'に合わせて選びます' },
        { value: 1,      label: 'レベル 1',  desc: '超基礎・英検5/4級' },
        { value: 2,      label: 'レベル 2',  desc: '中学基礎・英検4/3級' },
        { value: 3,      label: 'レベル 3',  desc: '中3完了・英検3/準2級' },
        { value: 4,      label: 'レベル 4',  desc: '高校標準・英検2級' },
        { value: 5,      label: 'レベル 5',  desc: '高校発展・英検準1級' },
      ];
      return e('div', {
        style: { maxWidth: 480, margin: '0 auto', padding: '44px 22px 96px' }
      },
        // Top bar
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
          e('button', { onClick: onBack,
            style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
          }, '‹'),
          e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '単語学習'),
        ),
        // Header
        e('div', { style: { padding: '4px 4px 18px' } },
          e('div', {
            style: { fontFamily: SERIF, fontSize: 26, fontWeight: 700, color: C.text, lineHeight: 1.2 }
          }, '単語学習'),
          e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6, lineHeight: 1.6 } },
            'レベルを選んで 10 問チャレンジしよう。'),
        ),
        // Level picker
        e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 11, fontWeight: 600,
            letterSpacing: '0.16em', textTransform: 'uppercase',
            color: C.sub, marginBottom: 10, paddingLeft: 4,
          }
        }, 'レベルを選ぶ'),
        e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 22 } },
          levelOpts.map(opt => {
            const isActive = selectedLevel === opt.value;
            return e('button', {
              key: 'lv_' + opt.value,
              onClick: () => setSelectedLevel(opt.value),
              style: {
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '12px 14px', borderRadius: 14, textAlign: 'left',
                background: isActive ? profile.color + '14' : C.card,
                border: '1px solid ' + (isActive ? profile.color : C.line),
                cursor: 'pointer',
              }
            },
              e('div', { style: { flex: 1, minWidth: 0 } },
                e('div', { style: { fontSize: 15, fontWeight: 700, color: C.text } }, opt.label),
                e('div', { style: { fontSize: 11, color: C.sub, marginTop: 2 } }, opt.desc),
              ),
              isActive && e('div', { style: { fontSize: 16, color: profile.color, flexShrink: 0, fontWeight: 700 } }, '✓'),
            );
          })
        ),
        // Direction picker (hidden when the tile already chose a direction)
        !forcedDirection && e('div', {
          style: {
            fontFamily: SANS_UI, fontSize: 11, fontWeight: 600,
            letterSpacing: '0.16em', textTransform: 'uppercase',
            color: C.sub, marginBottom: 10, paddingLeft: 4,
          }
        }, '方向を選ぶ'),
        !forcedDirection && e('div', { style: { display: 'flex', gap: 8, marginBottom: 22 } },
          [
            { value: 'en2ja', label: '英語 → 日本語', desc: '英語を見て意味を答える' },
            { value: 'ja2en', label: '日本語 → 英語', desc: '日本語を見て英語を答える' },
          ].map(opt => {
            const isActive = direction === opt.value;
            return e('button', {
              key: 'dir_' + opt.value,
              onClick: () => setDirection(opt.value),
              style: {
                flex: 1, padding: '12px 10px', borderRadius: 14, textAlign: 'left',
                background: isActive ? profile.color + '14' : C.card,
                border: '1px solid ' + (isActive ? profile.color : C.line),
                cursor: 'pointer',
              }
            },
              e('div', { style: { fontSize: 13, fontWeight: 700, color: C.text } }, opt.label),
              e('div', { style: { fontSize: 11, color: C.sub, marginTop: 2 } }, opt.desc),
            );
          })
        ),
        // Start
        e('button', {
          onClick: startSession,
          style: {
            width: '100%', padding: '16px 0', borderRadius: 16,
            background: profile.color, color: '#fff',
            fontSize: 16, fontWeight: 700, letterSpacing: '0.04em',
          }
        }, '10 問 始める'),
      );
    }

    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '44px 22px 96px',

      }
    },
      // Top bar
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: () => setPhase('intro'),
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '単語学習'),
        e('div', {
          style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
        }, total > 0 ? (Math.min(index, total - 1) + 1) + ' / ' + total : '0 / 0'),
      ),

      // Empty state
      !current && e('div', {
        style: {
          background: C.softer, border: '1px dashed ' + C.line,
          borderRadius: 18, padding: '40px 20px', textAlign: 'center', color: C.sub,
        }
      }, 'この階層の単語はまだありません'),

      // Card (single, no flip — answer expands inline on reveal)
      current && e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 18, padding: '22px 20px', marginBottom: 16,
          display: 'flex', flexDirection: 'column', gap: 16,
        }
      },
        // Header chips (level + pos + status)
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
          e('div', { style: { display: 'flex', gap: 8 } },
            e('span', {
              style: {
                fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
                background: profile.color + '1A', color: profile.color, fontFamily: SANS_UI,

            }, 'レベル ' + current.level),
            e('span', {
              style: {

          ),
          e('span', {
            style: {
              fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,

        ),
        // Prompt — only one side visible until 答えを見る is tapped
        isJa2En
          ? e('div', { style: { textAlign: 'center', padding: '20px 0' } },
              e('div', {

              }, '日本語'),
              e('div', {
                style: { fontSize: 38, fontWeight: 800, color: C.text, lineHeight: 1.3 }
              }, current.ja),
            )
          : e('div', { style: { textAlign: 'center', padding: '20px 0' } },
              e('div', {
                style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', marginBottom: 10, fontFamily: SANS_UI }
              }, 'English'),
              e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 } },
                e('div', {
                  style: {
                    fontFamily: SERIF, fontSize: 48, fontWeight: 800,
                    letterSpacing: '-0.02em', color: C.text,
                  }
                }, current.en),
                e(SpeakerBtn, { onClick: () => speak(current.en), color: profile.color, size: 52 }),
              ),
            ),
        // Reveal area — collapsed by default, expands inline when tapped
        !revealed
          ? e('button', {
              onClick: () => setRevealed(true),
              style: {
                padding: '14px 0', borderRadius: 12,
                background: C.softer, color: profile.color,
                fontSize: 14, fontWeight: 700, fontFamily: SANS_UI,
                border: '1px solid ' + profile.color + '33',
                cursor: 'pointer',
              }
            }, '答えを見る')
          : e('div', {
              style: {
                borderTop: '1px dashed ' + C.line, paddingTop: 16,
                display: 'flex', flexDirection: 'column', gap: 14,
              }
            },
              isJa2En
                ? e('div', null,
                    e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', marginBottom: 8, fontFamily: SANS_UI } }, 'English'),
                    e('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
                      e('div', {
                        style: { flex: 1, fontFamily: SERIF, fontSize: 36, fontWeight: 800, letterSpacing: '-0.02em', color: C.text, lineHeight: 1.2 }
                      }, current.en),
                      e(SpeakerBtn, { onClick: () => speak(current.en), color: profile.color, size: 44 }),
                    ),
                  )
                : e('div', null,
                    e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', marginBottom: 8, fontFamily: SANS_UI } }, '日本語'),
                    e('div', {
                      style: { fontSize: 32, fontWeight: 800, color: C.text, lineHeight: 1.3 }
                    }, current.ja),
                  ),
              // Example sentence (always shown after reveal)
              e('div', null,
                e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', marginBottom: 8, fontFamily: SANS_UI } }, 'Example'),
                e('div', { style: { display: 'flex', alignItems: 'flex-start', gap: 12 } },
                  e('div', {
                    style: { flex: 1, fontSize: 18, fontWeight: 600, color: C.text, lineHeight: 1.5, fontFamily: SERIF }
                  }, current.exEn),
                  e(SpeakerBtn, { onClick: () => speak(current.exEn), color: profile.color, size: 36 }),
                ),
                e('div', { style: { fontSize: 13, color: C.sub, lineHeight: 1.6, marginTop: 6 } },
                  current.exJa),
              ),
              // Similar words / synonyms — shown only when the card has any.
              // Idioms ship with inline `syn`; for ordinary vocab we look up
              // VOCAB_SYNONYMS by id so we don't have to rewrite the table.
              (function () {
                const list = current.syn || getVocabSynonyms(current.id);
                if (!list || list.length === 0) return null;
                return e('div', null,
                  e('div', {
                    style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.16em',
                             textTransform: 'uppercase', marginBottom: 8, fontFamily: SANS_UI }
                  }, '類義語 (Similar)'),
                  e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 6 } },
                    list.map((w, i) => e('div', {
                      key: 'syn_' + i,
                      style: {
                        display: 'inline-flex', alignItems: 'center', gap: 6,
                        padding: '4px 10px 4px 12px', borderRadius: 999,
                        background: C.softer, border: '1px solid ' + C.line,
                        fontSize: 13, color: C.text, fontFamily: SERIF, fontWeight: 600,
                      }
                    },
                      e('span', null, w),
                      e(SpeakerBtn, { onClick: () => speak(w), color: profile.color, size: 24 }),
                    )),
                  ),
                );
              })(),
              // Usage / disambiguation note — shown when the headword has
              // close synonyms whose usage differs (see vs look at vs watch,
              // equal vs fair, etc.). Idioms can carry an inline `usage`;
              // ordinary vocab looks the entry up in VOCAB_USAGE by id.
              (function () {
                const note = current.usage || getVocabUsage(current.id);
                if (!note) return null;
                return e('div', null,
                  e('div', {
                    style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.16em',
                             textTransform: 'uppercase', marginBottom: 8, fontFamily: SANS_UI }
                  }, '使い分け (Usage)'),
                  e('div', {
                    style: {
                      background: C.softer, border: '1px solid ' + C.line,
                      borderRadius: 12, padding: '12px 14px',
                      fontSize: 13, color: C.text, lineHeight: 1.7,
                    }
                  }, note),
                );
              })(),
              // Past tense / past participle — only for verbs and idioms.
              // Shown as a small annotation under the synonyms so the
              // learner picks up irregular forms alongside the meaning.
              (function () {
                const conj = getConjugation(current);
                if (!conj) return null;
                const samePast = conj.past === current.en;
                const samePp   = conj.pp   === current.en;
                return e('div', null,
                  e('div', {
                    style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.16em',

                  }, '活用 (Past tense)'),

                    e('span', { style: { color: C.sub, margin: '0 8px' } }, '/'),
                    e('span', null, '過去分詞: '),
                    e('span', { style: samePp ? { color: C.sub, fontStyle: 'italic' } : null }, conj.pp),
                  ),
                );
              })(),

      // 覚えてない / 覚えた buttons (only after reveal)
      current && revealed && e('div', { style: { display: 'flex', gap: 10 } },
        e('button', {
          onClick: () => mark(false),
          style: {
            flex: 1, padding: '15px 0', borderRadius: 12,
            background: C.danger + '14', color: C.danger,
            fontWeight: 700, fontSize: 15, border: '1px solid ' + C.danger + '33',
            fontFamily: SANS_UI,

        }, '覚えてない'),
        e('button', {
          onClick: () => mark(true),
          style: {
            flex: 1, padding: '15px 0', borderRadius: 12,
            background: C.success, color: '#fff',
            fontWeight: 700, fontSize: 15, border: '1px solid ' + C.success,
            fontFamily: SANS_UI,
          }
        }, '覚えた'),
      ),
    );
  }

  // ---------- Today's 20 (mixed: vocab + sentences, with review-of-mastered) ----------
  // Cap at 12 for now; the queue mixes vocab + sentence with ~1/3 already-mastered
  // material so old learning isn't forgotten.
  const DAILY_COUNT = 12;


  const pageStyle = {
    maxWidth: 480, margin: '0 auto', padding: '44px 22px 96px',

  };

  // ---------- Reusable chips ----------
  function Chip({ icon, label, value, color, highlight }) {
    return e('div', {
      style: {

        padding: '6px 12px', borderRadius: 999,

      icon && e('span', { style: { fontSize: 12 } }, icon),
      e('span', { style: { fontWeight: 600 } }, label),
      e('strong', { style: { fontWeight: 700, color: highlight ? (color || C.accent) : C.text } }, value),
    );
  }

  // Compact "今日 N問 / 連続 N日 / 累計 N正解" strip for the active learner.
  // Returns null for viewer profiles (mother) since they don't study.
  function ProgressChips({ profile, includeTotal, style }) {
    if (profile.role === 'viewer') return null;
    const stats = computeStats(profile.id);
    const today = (db.getDailyStats(profile.id)[db.todayKey(profile.id)] || {});
    const todayAttempts = today.attempts || 0;
    return e('div', {

  // ---------- Mistake Review (drives a session from the mistakes log) ----------
  // Resolve a normalized mistake entry { kind, id } to a uniform shape with
  // ja / en / extra fields the review UI can render.
  function resolveMistake(entry) {
    if (entry.kind === 'vocab') {
      const v = VOCAB.find(x => x.id === entry.id);
      if (!v) return null;
      // Pass through inline syn / usage so idioms (which carry these on the
      // VOCAB entry itself) keep their disambiguation hints in the review
      // card. Plain vocab still falls back to VOCAB_SYNONYMS / VOCAB_USAGE
      // by id at render time.
      return { kind: 'vocab', id: v.id, ja: v.ja, en: v.en, exEn: v.exEn, exJa: v.exJa,
               level: v.level, pos: v.pos, syn: v.syn, usage: v.usage };
    }
    if (entry.kind === 'sentence') {
      const s = SENTENCE_BY_ID[entry.id];
      if (!s) return null;
      return { kind: 'sentence', id: s.id, ja: s.ja, en: s.en, level: s.level, grammar: s.grammar };
    }
    if (entry.kind === 'phrase') {
      const p = PHRASE_BY_ID[entry.id];
      if (!p) return null;
      return { kind: 'phrase', id: p.id, ja: p.ja, en: p.en, scene: p.scene };
    }
    return null;
  }

  function MistakeReview({ profile, onBack, kindFilter }) {
    // The user picks 'all' / 'vocab' / 'sentence' from a chooser at the
    // top of the list screen. If a kindFilter prop was passed (legacy
    // route), seed the picker with it.
    const [activeFilter, setActiveFilter] = useState(kindFilter || 'all');
    const initialList = useMemo(() => {
      const ms = db.getMistakesNormalized(profile.id);
      const seen = new Set(); const out = [];
      for (const m of ms) {
        if (activeFilter !== 'all' && m.kind !== activeFilter) continue;
        const key = m.kind + ':' + m.id;
        if (seen.has(key)) continue;
        seen.add(key);
        const item = resolveMistake(m);
        if (item) out.push({ item, at: m.at });
      }
      return out;
    }, [profile.id, activeFilter]);

    const titleLabel = activeFilter === 'vocab'   ? '間違えた単語'
                     : activeFilter === 'sentence' ? '間違えた英作文'
                     : '間違い復習';

    const [phase, setPhase]     = useState('list');     // 'list' | 'study' | 'done'
    const [queue, setQueue]     = useState([]);
    const [index, setIndex]     = useState(0);
    const [revealed, setRevealed] = useState(false);
    const [results, setResults] = useState([]);

    function startAll() {
      if (initialList.length === 0) return;
      setQueue(initialList.map(m => m.item));
      setResults([]); setIndex(0); setRevealed(false);
      setPhase('study');
    }

    function record(isCorrect) {
      const cur = queue[index];
      // Per-kind recording (auto-removes from mistakes on correct via the
      // recordAnswer / recordSentence / recordPhrase helpers).
      if (cur.kind === 'vocab') {
        db.recordAnswer(profile.id, cur.id, isCorrect, { removeOnCorrect: true });
      } else if (cur.kind === 'sentence') {
        db.recordSentence(profile.id, cur.id, isCorrect);
        if (isCorrect) db.removeMistakeEx(profile.id, 'sentence', cur.id);
      } else if (cur.kind === 'phrase') {
        db.recordPhrase(profile.id, cur.id, isCorrect);
        if (isCorrect) db.removeMistakeEx(profile.id, 'phrase', cur.id);
      }
      if (isCorrect) {
        soundCorrect(); hapticTap();
        // Each correct answer in 間違い復習 counts as one '克服' (overcome).
        db.recordTurn(profile.id, 'overcome');
      } else {
        soundWrong(); hapticBuzz();
      }
      const newResults = results.concat([{ item: cur, isCorrect }]);
      setResults(newResults);
      if (index + 1 >= queue.length) {
        const correctCount = newResults.filter(r=>r.isCorrect).length;
        const acc = newResults.length > 0 ? Math.round(correctCount * 100 / newResults.length) : 0;
        setTimeout(() => { soundComplete(); if (acc >= 70) hapticWin(); }, 250);
        // Stamp this session into the activity log so 間違い克服 shows up
        // alongside vocab / composition / random_test / mctest etc.
        db.pushEvent(profile.id, {
          kind: 'overcome',
          total: newResults.length,
          correct: correctCount,
        });
        markPathStepDone(profile, 'mistakes');
        setPhase('done');
        return;

  // ---------- Message Compose Form (cheerleader → recipient) ----------
  function MessageCompose({ sender, onCancel, onSubmit }) {
    const [toId, setToId]         = useState('');                 // '' === whole family
    const [body, setBody]         = useState('');
    const [hue, setHue]           = useState('rose');
    const [unlockCond, setUnlock] = useState('open_now');
    const [imageUrl, setImageUrl] = useState(null);
    const [imgErr, setImgErr]     = useState('');
    const [voiceUrl, setVoiceUrl] = useState(null);
    const [voiceErr, setVoiceErr] = useState('');
    const [recording, setRecording] = useState(false);   // boolean
    const [recordSec, setRecordSec] = useState(0);
    const fileInputRef            = useRef(null);
    const recorderRef             = useRef(null);
    const recordTimerRef          = useRef(null);

    async function pickImage(file) {
      if (!file) return;
      setImgErr('');
      try {
        const dataUrl = await compressImageToDataUrl(file, 800, 0.75);
        // localStorage limit guard: ~5MB total, so cap a single photo at ~1MB base64.
        if (dataUrl.length > 1_400_000) {
          setImgErr('写真が大きすぎます。別の写真を試してください。');
          return;
        }
        setImageUrl(dataUrl);
      } catch (err) {
        setImgErr('写真を読み込めませんでした。');
      }
    }

    async function startRecording() {
      setVoiceErr('');
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setVoiceErr('この端末は録音に対応していません。');
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
        const recorder = new MediaRecorder(stream, mimeType ? { mimeType, audioBitsPerSecond: 24000 } : {});
        const chunks = [];
        recorder.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          if (recordTimerRef.current) { clearInterval(recordTimerRef.current); recordTimerRef.current = null; }
          setRecording(false);
          const blob = new Blob(chunks, { type: mimeType || 'audio/webm' });
          if (blob.size > 600_000) {
            setVoiceErr('録音が大きすぎます。短く録り直してください。');
            return;
          }
          const reader = new FileReader();
          reader.onloadend = () => setVoiceUrl(reader.result);
          reader.onerror = () => setVoiceErr('録音の読み込みに失敗しました。');
          reader.readAsDataURL(blob);
        };
        recorderRef.current = recorder;
        recorder.start();
        setRecording(true);
        setRecordSec(0);
        recordTimerRef.current = setInterval(() => {
          setRecordSec(s => {
            const next = s + 1;
            if (next >= 15) stopRecording();
            return next;
          });
        }, 1000);
      } catch (err) {
        setVoiceErr('マイクの許可が必要です。');
      }
    }
    function stopRecording() {
      if (recorderRef.current && recorderRef.current.state !== 'inactive') {
        try { recorderRef.current.stop(); } catch {}
      }
    }
    function clearVoice() {
      setVoiceUrl(null);
      setVoiceErr('');
    }

    const recipients = PROFILES.filter(p => p.id !== sender.id);  // can address anyone but self
    const HUES = [
      { id: 'rose',   color: C.rose,   label: 'ピンク' },
      { id: 'orange', color: C.accent, label: 'オレンジ' },
      { id: 'sun',    color: C.sun,    label: 'イエロー' },
      { id: 'ocean',  color: C.ocean,  label: 'ブルー' },
      { id: 'forest', color: C.forest, label: 'グリーン' },
    ];
    const UNLOCKS = [
      { id: 'open_now',         label: 'すぐに開ける' },
      { id: 'session_complete', label: '🎯 今日の20問クリアで開く' },
      { id: 'streak_3',         label: '🔥 3日連続クリアで開く' },

  // ---------- Sprint Composition (瞬間英作文) ----------
  // Picks ~10 sentences near the member's level, runs a Daily20-style flow:
  // intro → study (JP prompt → reveal EN → self-grade) → done (score + list).
  const COMP_COUNT = 10;

  function pickComposition(profile, count, opts) {
    opts = opts || {};
    // Build a unified pool of SENTENCES + DAILY_PHRASES tagged with kind, so
    // recordPhrase / recordSentence can be dispatched cleanly at answer time.
    const pool = [];
    SENTENCES.forEach(s => pool.push({
      kind: 'sentence',
      id: s.id, level: s.level, ja: s.ja, en: s.en, grammar: s.grammar,
    }));
    DAILY_PHRASES.forEach(p => pool.push({
      kind: 'phrase',
      id: p.id, level: 2, ja: p.ja, en: p.en,
      grammar: '日常英会話・' + (SCENE_LABELS[p.scene] || p.scene),
    }));
    // Selection rules (priority):
    //   1. If opts.level is a number (1-5): exact level only
    //   2. Else if profile.maxLevel set: strict <= maxLevel
    //   3. Else: profile-weighted distribution (pickLevelForProfile)
    if (opts.level && [1, 2, 3, 4, 5].indexOf(opts.level) >= 0) {
      const candidates = pool.filter(it => it.level === opts.level);
      const arr = candidates.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr.slice(0, count);
    }
    if (profile && profile.maxLevel) {
      const candidates = pool.filter(it => it.level <= profile.maxLevel);
      const arr = candidates.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr.slice(0, count);
    }
    // Profile-weighted: each draw picks a level matching the family
    // member's distribution and grabs a random unused item from it.
    return pickWeightedQueue(pool, profile, count);
  }

  function SprintComposition({ profile, onBack, forcedDirection }) {
    const [selectedLevel, setSelectedLevel] = useState('auto'); // 'auto' | 1..5
    const [direction, setDirection] = useState(forcedDirection || 'ja2en'); // 'ja2en' | 'en2ja'
    const [queue, setQueue]   = useState([]);
    const [phase, setPhase]   = useState('intro');
    const [index, setIndex]   = useState(0);
    const [revealed, setRevealed] = useState(false);
    const [results, setResults]   = useState([]);

    function startSession() {
      const opts = selectedLevel === 'auto' ? {} : { level: selectedLevel };
      const q = pickComposition(profile, COMP_COUNT, opts);
      if (q.length === 0) { setPhase('empty'); return; }
      setQueue(q); setIndex(0); setRevealed(false); setResults([]);
      setPhase('study');
    }

    const total   = queue.length;
    const current = queue[index] || null;
    const correct = results.filter(r => r.isCorrect).length;

    function record(isCorrect) {
      const cur = queue[index];
      // Dispatch by kind so phrase wrongs hit recordPhrase (and the unified
      // mistake log) rather than being recorded as sentences.
      if (cur.kind === 'phrase') db.recordPhrase(profile.id, cur.id, isCorrect);
      else                       db.recordSentence(profile.id, cur.id, isCorrect);
      if (isCorrect) { soundCorrect(); hapticTap(); }
      else           { soundWrong();   hapticBuzz(); }
      const newResults = results.concat([{ sentenceId: cur.id, isCorrect, kind: cur.kind }]);
      setResults(newResults);
      if (index + 1 >= total) {
        const correctCount = newResults.filter(r=>r.isCorrect).length;
        const acc = total > 0 ? Math.round(correctCount * 100 / total) : 0;
        setTimeout(() => { soundComplete(); if (acc >= 70) hapticWin(); }, 250);
        db.recordTurn(profile.id, 'composition');
        db.pushEvent(profile.id, {
          kind: 'composition', total, correct: correctCount, direction,
        });
        markPathStepDone(profile, direction === 'ja2en' ? 'composition_ja2en' : 'composition_en2ja');
        setPhase('done');
        return;
      }
      setIndex(index + 1); setRevealed(false);
    }

    const topBar = e('div', {
      style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 }
    },
      e('button', { onClick: onBack,
        style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }

      e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '瞬間英作文'),
      phase === 'study' && e('div', {
        style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
      }, (index + 1) + ' / ' + total),
    );

    // ============ INTRO ============
    if (phase === 'intro') {
      // Build the level-picker options. Respect profile.maxLevel by graying
      // out levels above the cap (e.g., Yoshinari can't pick L3-L5).
      const memberName = getDisplayName(profile);
      const levelOpts = [
        { value: 'auto', label: 'おまかせ',  desc: memberName + 'に合わせて選びます' },
        { value: 1,      label: 'レベル 1', desc: '超基礎・英検5/4級' },
        { value: 2,      label: 'レベル 2', desc: '中学基礎・英検4/3級' },
        { value: 3,      label: 'レベル 3', desc: '中3完了・英検3/準2級' },
        { value: 4,      label: 'レベル 4', desc: '高校標準・英検2級' },
        { value: 5,      label: 'レベル 5', desc: '高校発展・英検準1級' },
      ];
      const maxLv = profile.maxLevel;
      return e('div', { style: pageStyle },
        topBar,
        e('div', { style: { padding: '20px 4px 18px' } },
          e('div', {
            style: { fontFamily: SERIF, fontSize: 26, fontWeight: 700, color: C.text, lineHeight: 1.2 }

        e(ProgressChips, { profile, style: { marginBottom: 18 } }),
        // Level picker (single label per row, no monogram square)
        e('div', {

            fontFamily: SANS_UI, fontSize: 11, fontWeight: 600,

          }

        e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 22 } },

            boxShadow: '0 8px 22px ' + profile.color + '55',

      );

    // ============ EMPTY ============
    if (phase === 'empty') {
      return e('div', { style: pageStyle },
        topBar,
        e('div', {
          style: {
            background: C.softer, border: '1px dashed ' + C.line,

    // ============ DONE ============

  // Friendly relative time. "数秒前 / 12分前 / 3時間前 / 2日前 / 2026/4/26 12:00".
  function formatRelativeTime(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    if (!t || isNaN(t)) return '';
    const sec = Math.max(0, Math.round((Date.now() - t) / 1000));
    if (sec < 5)    return 'たった今';
    if (sec < 60)   return sec + ' 秒前';
    const min = Math.round(sec / 60);
    if (min < 60)   return min + ' 分前';
    const hr = Math.round(min / 60);
    if (hr  < 24)   return hr  + ' 時間前';
    const day = Math.round(hr / 24);
    if (day < 30)   return day + ' 日前';
    return new Date(iso).toLocaleDateString('ja-JP');
  }

  // ---------- Cloud sync status panel (Supabase health + per-member detail) ----------
  function CloudStatusPanel() {
    const [, setTick] = useState(0);
    const [pinging, setPinging] = useState(false);
    const [syncing, setSyncing] = useState(false);
    const [memberRows, setMemberRows] = useState([]);   // [{ profile, updatedAt }]
    const [familyRow,  setFamilyRow]  = useState(null); // { updatedAt }
    // Re-render every 30s so the relative-time labels stay fresh.
    const [, setNowTick] = useState(0);
    useEffect(() => {
      const id = setInterval(() => setNowTick(t => t + 1), 30_000);
      return () => clearInterval(id);
    }, []);
    useEffect(() => cloud.subscribe(() => setTick(t => t + 1)), []);

    async function refreshDetail() {
      if (!cloud.status.enabled || syncing) return;
      setSyncing(true);
      try {
        // Pull every member row + the family-shared row in parallel so we can
        // show one consistent snapshot of "what cloud has".
        const ids = PROFILES.map(p => p.id).concat([FAMILY_SHARED_ID]);
        const results = await Promise.all(ids.map(id =>
          cloud.pull(id).then(r => ({ id, r })).catch(() => ({ id, r: null }))
        ));
        const byId = {};
        results.forEach(({ id, r }) => { byId[id] = r; });
        setMemberRows(PROFILES.map(p => ({
          profile: p,
          updatedAt: byId[p.id] && byId[p.id].updated_at ? byId[p.id].updated_at : null,
        })));
        setFamilyRow(byId[FAMILY_SHARED_ID]
          ? { updatedAt: byId[FAMILY_SHARED_ID].updated_at }
          : null);
        // Also refresh local copies of the family-shared row (names/avatars/
        // photos) in case another device wrote to it.
        await hydrateFamilySharedFromCloud();
      } finally {
        setSyncing(false);
      }
    }
    // First time the panel mounts, do the detail pull so the UI lights up
    // with real per-member timestamps.
    useEffect(() => { refreshDetail(); /* eslint-disable-next-line */ }, []);

    const s = cloud.status;
    const pendingCount = cloud.pendingCount();
    // Offline is a calm, expected state — not an error. We surface it
    // with a friendly grey/blue tone instead of red so kids studying in
    // a no-Wi-Fi dorm don't think something is broken.
    const dotColor = !s.enabled ? C.sub
                    : !s.online ? C.ocean
                    : s.lastError ? C.danger

                    : C.success;

                      : !s.online
                          ? (pendingCount > 0
                              ? 'オフライン (' + pendingCount + ' 件は復帰時に同期)'
                              : 'オフライン')
                      : s.lastError ? 'エラー'
                      : (s.pending || syncing) ? '同期中…'

    return e('div', { style: { marginTop: 32 } },
      e('div', {
        style: {

          letterSpacing: '0.18em', textTransform: 'uppercase',

      }, 'Cloud Sync'),
      e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          borderRadius: 14, padding: '14px 16px',
        }
      },
        // Status row
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 } },
          e('span', {
            style: {
              width: 10, height: 10, borderRadius: 999, background: dotColor, flexShrink: 0,
            }
          }),
          e('div', { style: { flex: 1, fontSize: 13, fontWeight: 700, color: C.text } }, statusText),
          e('button', {
            onClick: async () => {
              if (pinging || syncing) return;
              setPinging(true);
              await cloud.pingTest();
              await refreshDetail();
              setPinging(false);
            },
            disabled: !s.enabled || pinging || syncing,
            style: {
              padding: '6px 12px', borderRadius: 999,
              background: C.softer, border: '1px solid ' + C.line,
              fontSize: 11, fontWeight: 600, color: C.sub, fontFamily: SANS_UI,
              cursor: !s.enabled || pinging || syncing ? 'default' : 'pointer',
              opacity: !s.enabled || pinging || syncing ? 0.5 : 1,
            }
          }, (pinging || syncing) ? '同期中…' : '今すぐ同期'),
        ),
        // What's being synced
        e('div', { style: { fontSize: 11, color: C.sub, lineHeight: 1.6, marginBottom: 12 } },
          !s.enabled
            ? 'Supabase クライアントを読み込めませんでした。オフラインのまま使えます。'
            : !s.online
                ? 'オフラインでもアプリは普通に使えます。学習データは端末に保存され、Wi-Fi が戻ったときに自動でクラウドへ同期されます。'
                : '学習データ・名前・プロフィール写真・ファミリー写真を Supabase に保存しています。別の端末で同じプロフィールを開けば、そのまま続きから始められます。'),
        // Per-member rows (only once we have detail)
        s.enabled && memberRows.length > 0 && e('div', {

  // ---------- Settings (custom display names — local to this device) ----------
  function SettingsScreen({ onBack }) {
    const [names, setNames] = useState(() => loadDisplayNames());
    const [avatars, setAvatars] = useState(() => loadAvatars());
    const [avatarErr, setAvatarErr] = useState('');
    const fileInputRefs = useRef({});
    const [apiKey, setApiKey] = useState(() => loadApiKey());
    const [apiKeyVisible, setApiKeyVisible] = useState(false);
    const [apiKeyMsg, setApiKeyMsg] = useState('');
    const [photos, setPhotos] = useState(() => loadFamilyPhotos());
    const [photoErr, setPhotoErr] = useState('');
    const [photoMsg, setPhotoMsg] = useState('');   // transient success message
    const [photoBusy, setPhotoBusy] = useState(false);
    const photoInputRef = useRef(null);

    async function addFamilyPhotos(files) {
      if (!files || files.length === 0) return;
      setPhotoErr('');
      setPhotoMsg('');
      setPhotoBusy(true);
      // Always start from the freshest list on disk so a quick second tap
      // doesn't overwrite the result of the first one (avoids the stale-
      // closure issue where two rapid Add taps see the same `photos` from
      // the render they were defined in).
      const next = loadFamilyPhotos().slice();
      let added = 0;
      let oversized = 0;
      try {
        for (const file of Array.from(files)) {
          try {
            const dataUrl = await compressImageToDataUrl(file, 1200, 0.78);
            if (dataUrl.length > 1_400_000) {
              oversized++;
              continue;
            }
            next.push({ id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7), url: dataUrl });
            added++;
          } catch {
            setPhotoErr('一部の写真を読み込めませんでした。');
          }
        }
        setPhotos(next);
        saveFamilyPhotos(next);   // writes localStorage + stamps + cloud-pushes
        if (added > 0) setPhotoMsg(added + ' 枚追加して保存しました。');
        if (oversized > 0) setPhotoErr(oversized + ' 枚はファイルが大きすぎたので追加できませんでした。');
      } finally {
        setPhotoBusy(false);
        if (photoInputRef.current) photoInputRef.current.value = '';
        // Auto-clear the success line after 4s so it doesn't pile up.
        setTimeout(() => setPhotoMsg(''), 4000);
      }
    }
    function removeFamilyPhoto(id) {
      if (!confirm('この写真を削除しますか？\n\n（20問終わったあとに表示される写真の中から外されます。元には戻せません。）')) return;
      const next = loadFamilyPhotos().filter(p => p.id !== id);
      setPhotos(next);
      saveFamilyPhotos(next);
    }

    function saveApiKeyNow() {
      const trimmed = (apiKey || '').trim();
      saveApiKey(trimmed);
      setApiKeyMsg(trimmed ? '保存しました' : '削除しました');
      setTimeout(() => setApiKeyMsg(''), 1800);
    }

    // Ping Claude with a tiny request to confirm the key is accepted.
    // Uses whatever is currently in the input field (not necessarily the
    // saved value), so the user can paste-and-test in one go. On success,
    // we also auto-save so they don't have to click "保存" separately.
    const [apiKeyTestBusy,   setApiKeyTestBusy]   = useState(false);
    const [apiKeyTestStatus, setApiKeyTestStatus] = useState(null); // { ok: bool, msg: string }
    async function testApiKeyNow() {
      const key = (apiKey || '').trim();
      if (!key) {
        setApiKeyTestStatus({ ok: false, msg: 'キーを入力してから試してください。' });
        return;
      }
      setApiKeyTestBusy(true);
      setApiKeyTestStatus(null);
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type': 'application/json',
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 16,
            messages: [{ role: 'user', content: 'Reply with exactly the two letters: OK' }],
          }),
        });
        if (!res.ok) {
          const body = await res.text().catch(() => '');
          let hint;
          if (res.status === 401)      hint = 'キーが正しくないか、無効になっています。console.anthropic.com で再発行してください。';
          else if (res.status === 403) hint = 'このキーには権限がないようです。';
          else if (res.status === 429) hint = 'リクエスト数の上限です。少し待ってから試してください。';
          else if (res.status === 400) hint = 'リクエストが拒否されました（モデル名やフォーマット）。';
          else if (res.status >= 500)  hint = 'Anthropic 側のエラーです。少し待ってから試してください。';
          else                          hint = 'エラーが返ってきました。';
          throw new Error(hint + '  [HTTP ' + res.status + '] ' + body.slice(0, 160));
        }
        const j = await res.json();
        const out = (j.content && j.content[0] && j.content[0].text) || '';
        // Save on successful test so they don't have to press 保存 separately.
        saveApiKey(key);
        setApiKeyTestStatus({
          ok: true,
          msg: 'つながりました。キーも保存しました。 (Claude の返答: "' + (out.trim() || '—').slice(0, 40) + '")',
        });
      } catch (err) {
        let m = (err && err.message) || String(err);
        if (!navigator.onLine) m = 'オフラインです。Wi-Fi / 通信を確認してください。';
        setApiKeyTestStatus({ ok: false, msg: m });
      } finally {
        setApiKeyTestBusy(false);
      }
    }

    async function pickAvatar(profileId, file) {
      if (!file) return;
      setAvatarErr('');
      try {
        const dataUrl = await compressImageToDataUrl(file, 400, 0.8);
        if (dataUrl.length > 350_000) {
          setAvatarErr('写真が大きすぎます。別の写真を試してください。');
          return;
        }
        const next = Object.assign({}, avatars, { [profileId]: dataUrl });
        setAvatars(next);
        saveAvatar(profileId, dataUrl);
      } catch {
        setAvatarErr('写真を読み込めませんでした。');
      }
    }
    function clearAvatar(profileId) {
      const next = Object.assign({}, avatars);
      delete next[profileId];
      setAvatars(next);
      saveAvatar(profileId, null);
    }

    function update(id, value) {
      setNames(prev => Object.assign({}, prev, { [id]: value }));
    }
    function save() {
      // Trim, drop empties (so they fall back to role labels).
      const clean = {};
      for (const id in names) {
        const v = (names[id] || '').trim();
        if (v) clean[id] = v;
      }
      saveDisplayNames(clean);
      onBack();
    }
    function clearAll() {
      saveDisplayNames({});
      setNames({});
    }

    function resetAllData() {
      if (!confirm('この端末の学習データを消去しますか？\n\n・語彙の進捗\n・間違いの記録\n・日次統計\n・応援メッセージとリアクション\n・家族タイムライン\n\nが消えます。\n\nカスタム名・プロフィール写真・ファミリーフォト・APIキーは残ります。\n元に戻せません。')) return;
      // Keys we want to PRESERVE through a learning-data reset.
      const PRESERVE = new Set([
        NAMES_KEY,                // hfe_names_v1               — custom display names
        AVATARS_KEY,              // hfe_avatars_v1             — profile photos
        FAMILY_PHOTOS_KEY,        // hfe_family_photos_v1       — family photo gallery
        FAMILY_SHARED_TS_KEY,     // hfe_family_shared_ts_v1    — last-edit timestamp
        AI_KEY_STORAGE,           // hfe_anthropic_key_v1       — AI chat key
        INSTALL_DISMISS_KEY,      // hfe_install_dismissed_v1   — install prompt state
      ]);
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf('hfe_') === 0 && !PRESERVE.has(k)) keys.push(k);
      }
      keys.forEach(k => localStorage.removeItem(k));
      location.reload();
    }

    return e('div', { style: pageStyle },
      // Top bar — back + reload button on the right
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
