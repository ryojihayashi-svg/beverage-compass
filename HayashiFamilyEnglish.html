<style>
  *,*:before,*:after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: #F6F4F0; color: #1A1714; font-family: 'Shippori Mincho', 'Noto Sans JP', 'DM Sans', serif; -webkit-font-smoothing: antialiased; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  #root { min-height: 100vh; min-height: 100dvh; }
  /* Flip card — 3D rotateY for the Daily English phrasebook rows */
  .flip-wrap   { perspective: 1200px; }
  .flip-inner  { position: relative; width: 100%; transform-style: preserve-3d;
                 transition: transform .55s cubic-bezier(.2,.8,.2,1); }
  .flip-inner.is-flipped { transform: rotateY(180deg); }
  .flip-face   { position: absolute; inset: 0; -webkit-backface-visibility: hidden; backface-visibility: hidden; }
  .flip-face.front { position: relative; }
  .flip-face.back  { transform: rotateY(180deg); }
  /* Reload button spin (visible only when .is-spinning is set) */
  @keyframes hfe-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .hfe-reload-icon.is-spinning { animation: hfe-spin 0.8s linear infinite; }
  /* Subtle pulse for the 'update available' dot on the reload button */
  @keyframes hfe-pulse { 0%, 100% { opacity: 1; transform: scale(1); }
                         50%       { opacity: 0.55; transform: scale(0.85); } }
  .hfe-update-dot { animation: hfe-pulse 1.6s ease-in-out infinite; }
  /* "Today's path" — soft pulsing ring on the next recommended tile.
     Uses the brand color (#7A6F60). 1.6s period, gentle expansion so it
     reads as guidance, not an alarm. */
  @keyframes hfe-step-pulse {
    0%, 100% { box-shadow: 0 0 0 0   rgba(122, 111, 96, 0.45); }
    50%      { box-shadow: 0 0 0 10px rgba(122, 111, 96, 0);    }
  }
  .hfe-step-current { animation: hfe-step-pulse 1.8s ease-in-out infinite; }
</style>

  function regularPast(verb) {
    if (!verb) return verb;
    if (verb.endsWith('e')) return verb + 'd';
    // consonant + y → ied (try → tried)
    if (/[^aeiou]y$/.test(verb)) return verb.slice(0, -1) + 'ied';
    return verb + 'ed';
  }
  // Returns { past, pp } strings or null if the entry isn't a verb / idiom.
  // Phrasal verbs like "go out" only conjugate the leading verb.
  function getConjugation(item) {
    if (!item) return null;
    if (item.pos !== 'verb' && item.pos !== 'idiom') return null;
    const phrase = (item.en || '').trim();
    if (!phrase) return null;
    const tokens = phrase.split(' ');
    const head = tokens[0].toLowerCase();
    const tail = tokens.slice(1).join(' ');
    const irr = IRREGULAR_VERBS[head];
    const past = irr ? irr[0] : regularPast(head);
    const pp   = irr ? irr[1] : regularPast(head);
    return {
      past: tail ? past + ' ' + tail : past,
      pp:   tail ? pp   + ' ' + tail : pp,
    };
  }

  // ---------- Per-profile level distribution ----------
  // The "おまかせ" (auto) picker for vocab + sprint composition uses these
  // weights so each family member sees a level mix that fits their stage.
  //
  // Distributions per family request:
  //   Kippei (son3, 小6 はじめての英語):  L1 80% / L2 20%
  //   Yoshinari (son2, 中学復習):        L1 40% / L2 60%
  //   Ayumi (mother, 中学基礎):          L1 40% / L2 60%
  //   Ryoji (father, 英検準2級):         L2 40% / L3 60%
  //   Narumichi (son1, 英検2級):         L3 40% / L4 60%
  //
  // The ladder is one level apart per family member, so each kid sees
  // mostly content one notch above their comfort zone — easy enough not
  // to freeze, hard enough to stretch.
  function pickLevelForProfile(profile) {
    const r = Math.random();
    const id = (profile && profile.id) || '';
    if (id === 'son3') {                       // Kippei
      return r < 0.80 ? 1 : 2;
    }
    if (id === 'son2' || id === 'mother') {    // Yoshinari, Ayumi
      return r < 0.40 ? 1 : 2;
    }
    if (id === 'father') {                     // Ryoji
      return r < 0.40 ? 2 : 3;
    }
    if (id === 'son1') {                       // Narumichi
      return r < 0.40 ? 3 : 4;
    }
    // Generic fallback — moderate mix.
    if (r < 0.40) return 1;
    if (r < 0.85) return 2;
    return 3;
  }

  // Build a profile-weighted queue of `count` unique items from `pool`.
  // Each draw picks a level via pickLevelForProfile and grabs a random
  // unused item from that level. Falls back to the whole pool if a level
  // bucket is empty so the queue always fills.
  function pickWeightedQueue(pool, profile, count) {
    if (!pool || pool.length === 0) return [];
    const byLevel = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    for (const item of pool) {
      const lv = item.level || 1;
      if (byLevel[lv]) byLevel[lv].push(item);
    }
    const used = new Set();
    const out = [];
    let safety = count * 20;
    while (out.length < count && safety-- > 0) {
      const lv = pickLevelForProfile(profile);
      let bucket = byLevel[lv];
      if (!bucket || bucket.length === 0) bucket = pool;
      let picked = null;
      for (let t = 0; t < 12; t++) {
        const c = bucket[Math.floor(Math.random() * bucket.length)];
        if (!used.has(c.id)) { picked = c; break; }
      }
      // Last-ditch — if we keep colliding within the chosen bucket, try
      // any pool item we haven't used.
      if (!picked) {
        for (const c of pool) {
          if (!used.has(c.id)) { picked = c; break; }
        }
      }
      if (!picked) break;
      used.add(picked.id);
      out.push(picked);
    }
    return out;
  }

  const LESSON_BY_ID    = Object.fromEntries(ENGLISH_LESSONS.map(l => [l.id, l]));
  const LESSONS_BY_LEVEL = ENGLISH_LESSONS.reduce((acc, l) => {
    (acc[l.level] = acc[l.level] || []).push(l); return acc;
  }, {});

  // ---------- Lesson progress + mistake storage (per profile) ----------
  // progress  : { [lessonId]: { lastDoneTs, bestScore, attempts } }
  // mistakes  : { [lessonId]: [ { q: <q text>, ts } ] } — keyed so we can
  //             reissue them later as a "review" pass.
  const LESSON_PROGRESS_KEY = (memberId) => 'hfe_lesson_progress_v1_' + memberId;
  const LESSON_MISTAKES_KEY = (memberId) => 'hfe_lesson_mistakes_v1_' + memberId;
  function loadLessonProgress(memberId) {
    try { return JSON.parse(localStorage.getItem(LESSON_PROGRESS_KEY(memberId)) || '{}') || {}; }
    catch { return {}; }
  }
  function saveLessonProgress(memberId, p) {
    try { localStorage.setItem(LESSON_PROGRESS_KEY(memberId), JSON.stringify(p)); } catch {}
  }
  function recordLessonResult(memberId, lessonId, score, total) {
    const p = loadLessonProgress(memberId);
    const cur = p[lessonId] || { bestScore: 0, attempts: 0, lastDoneTs: 0 };
    p[lessonId] = {
      lastDoneTs: Date.now(),
      bestScore: Math.max(cur.bestScore || 0, score),
      attempts: (cur.attempts || 0) + 1,
      lastTotal: total,
    };
    saveLessonProgress(memberId, p);
  }
  function loadLessonMistakes(memberId) {
    try { return JSON.parse(localStorage.getItem(LESSON_MISTAKES_KEY(memberId)) || '{}') || {}; }
    catch { return {}; }
  }
  function saveLessonMistakes(memberId, m) {
    try { localStorage.setItem(LESSON_MISTAKES_KEY(memberId), JSON.stringify(m)); } catch {}
  }
  // Persist every wrong question by its full q text so re-shuffles or future
  // edits to a quiz won't accidentally bring back the wrong stale entry.
  function pushLessonMistakes(memberId, lessonId, wrongQItems) {
    if (!wrongQItems || wrongQItems.length === 0) return;
    const all = loadLessonMistakes(memberId);
    const list = all[lessonId] || [];
    const seen = new Set(list.map(x => x.q));
    wrongQItems.forEach(item => {
      if (!seen.has(item.q)) {
        list.push({ q: item.q, ts: Date.now() });
        seen.add(item.q);
      }
    });
    all[lessonId] = list;
    saveLessonMistakes(memberId, all);
  }
  function clearLessonMistake(memberId, lessonId, qText) {
    const all = loadLessonMistakes(memberId);
    const list = (all[lessonId] || []).filter(x => x.q !== qText);
    if (list.length === 0) delete all[lessonId];
    else all[lessonId] = list;
    saveLessonMistakes(memberId, all);
  }
  // Aggregate mistakes across every lesson for the profile, returning
  // [{ lesson, items: [<quiz item>] }] so the review screen can group by
  // lesson.
  function getLessonMistakeReview(memberId) {
    const all = loadLessonMistakes(memberId);
    const out = [];
    Object.keys(all).forEach((lessonId) => {
      const lesson = LESSON_BY_ID[lessonId];
      if (!lesson) return;
      const ids = new Set(all[lessonId].map(x => x.q));
      const items = lesson.quiz.filter(q => ids.has(q.q));
      if (items.length > 0) out.push({ lesson, items });
    });
    return out;
  }

  // ---------- Today's learning path ----------
  // A guided routine. We pre-build a per-day, per-profile "ladder" of
  // steps and highlight whichever step is up next. The path is stamped
  // into localStorage so it survives reloads / app re-opens; it gets
  // rebuilt when the day rolls over.
  //
  // Step generation: deterministic per (day, profile) so opening the app
  // twice in the same day shows the same plan. Mistake review steps only
  // show up when there ARE mistakes; otherwise they're skipped.
  const DAILY_PATH_KEY = (memberId) => 'hfe_daily_path_v1_' + memberId;
  function _hashCode(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return h >>> 0;
  }
  function _mulberry32(seed) {
    let t = seed >>> 0;
    return function () {
      t = (t + 0x6D2B79F5) | 0;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }
  function buildTodaysPath(profile) {
    const memberId = profile.id;
    const today    = db.todayKey(memberId);
    const rand     = _mulberry32(_hashCode(today + ':' + memberId));
    const out      = [];
    const undoneLessons = ENGLISH_LESSONS.filter(
      l => !(loadLessonProgress(memberId)[l.id])
    ).length;
    // 1. Daily English warm-up (60% of the time)
    if (rand() < 0.6) out.push({ id: 'phrases' });
    // 2 + 4. Two main inputs in random order
    const main = ['vocab_ja2en', 'composition_ja2en'];
    if (rand() < 0.5) main.reverse();
    out.push({ id: main[0] });
    // Mistake review slots are always part of the plan; reconcilePath
    // auto-resolves them when there's nothing to review at that moment.
    out.push({ id: 'mistakes' });
    out.push({ id: main[1] });
    out.push({ id: 'mistakes' });
    // 6. 1分英語解説 (50% if there's an unfinished lesson)
    if (undoneLessons > 0 && rand() < 0.5) out.push({ id: 'english_lessons' });
    // 7. Random test as the closer
    out.push({ id: 'random_test' });
    return out.map((s, i) => ({ ...s, idx: i, doneAt: null }));
  }
  function loadTodaysPath(profile) {
    try {
      const raw = localStorage.getItem(DAILY_PATH_KEY(profile.id));
      const p = raw ? JSON.parse(raw) : null;
      if (!p || !Array.isArray(p.steps)) return null;
      // Day boundary check — Yoshinari uses London time per MEMBER_TIMEZONE.
      if (p.day !== db.todayKey(profile.id)) return null;
      return p;
    } catch { return null; }
  }
  function saveTodaysPath(profile, p) {
    try { localStorage.setItem(DAILY_PATH_KEY(profile.id), JSON.stringify(p)); }
    catch {}
  }
  function getOrCreateTodaysPath(profile) {
    let p = loadTodaysPath(profile);
    if (p) return p;
    const steps = buildTodaysPath(profile);
    p = { day: db.todayKey(profile.id), steps, createdAt: Date.now() };
    saveTodaysPath(profile, p);
    return p;
  }
  // Mark the FIRST undone step matching `featureId` as done. Two
  // 'mistakes' steps in the same path get knocked off in sequence —
  // first review session clears step 3, the second clears step 5.
  function markPathStepDone(profile, featureId) {
    const p = loadTodaysPath(profile);
    if (!p) return;
    const i = p.steps.findIndex(s => s.id === featureId && !s.doneAt);
    if (i < 0) return;
    p.steps[i].doneAt = Date.now();
    saveTodaysPath(profile, p);
  }
  // Auto-skip steps that don't apply right now (e.g. mistake review
  // when there's nothing in the mistake bin). Mutates and persists when
  // any step gets auto-skipped. Returns true if anything changed.
  function reconcilePath(p, profile) {
    if (!p || !Array.isArray(p.steps)) return false;
    let changed = false;
    for (const s of p.steps) {
      if (s.doneAt) continue;
      if (s.id === 'mistakes') {
        const has = db.getMistakesNormalized && db.getMistakesNormalized(profile.id).length > 0;
        if (!has) { s.doneAt = Date.now(); s.skipped = true; changed = true; }
      }
    }
    if (changed) saveTodaysPath(profile, p);
    return changed;
  }
  // Returns the index of the first undone step, or -1 when the path is
  // complete. Used by the home screen to highlight the next tile.
  function currentPathStep(p) {
    if (!p || !Array.isArray(p.steps)) return -1;
    return p.steps.findIndex(s => !s.doneAt);
  }
  // Friendly label for a step ID, used by the "次は ___" hint in the
  // path header card.
  const PATH_STEP_LABEL = {
    phrases:           'Daily English',
    vocab_ja2en:       '単語学習',
    vocab_en2ja:       '単語学習',
    composition_ja2en: '瞬間英作文',
    composition_en2ja: '瞬間英作文',
    mistakes:          '間違い復習',
    english_lessons:   '1分英語解説',
    random_test:       'ランダムテスト',
  };


  // ---------- Data layer (localStorage today, swappable to Supabase later) ----------
  // Storage shape per member:
  //   { vocab: { [vocabId]: SrsState }, mistakes: [{ vocabId, at }] }
  const STORAGE_KEY = (memberId) => 'hfe_v1_' + memberId;

  const db = {
    load(memberId) {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY(memberId)) || '{}'); }
      catch { return {}; }
    },
    save(memberId, state) {
      try { localStorage.setItem(STORAGE_KEY(memberId), JSON.stringify(state)); }
      catch (err) { console.warn('localStorage write failed', err); }
    },
    getVocabProgress(memberId, vocabId) {
      const s = this.load(memberId);
      return (s.vocab && s.vocab[vocabId]) || null;
    },
    setVocabProgress(memberId, vocabId, progress) {
      const s = this.load(memberId);
      if (!s.vocab) s.vocab = {};
      s.vocab[vocabId] = progress;
      this.save(memberId, s);
    },
    // Vocab-only wrappers (kept for backward compatibility with older code).
    pushMistake(memberId, vocabId)  { this.pushMistakeEx(memberId, 'vocab', vocabId); },
    removeMistake(memberId, vocabId){ this.removeMistakeEx(memberId, 'vocab', vocabId); },

    // Daily counters: { 'YYYY-MM-DD': { attempts, correct } }
    // Yoshinari's day rolls over on London time (he's in the UK dorm).
    // Everyone else uses the device's local date. Pass memberId so the
    // boundary is correct for whoever's being recorded.
    todayKey(memberId) {
      return dateKeyForMember(memberId, new Date());
    },
    getDailyStats(memberId) {
      return this.load(memberId).daily || {};
    },
    recordDaily(memberId, isCorrect) {
      const s = this.load(memberId);
      if (!s.daily) s.daily = {};
      const k = this.todayKey(memberId);
      if (!s.daily[k]) s.daily[k] = { attempts: 0, correct: 0 };
      s.daily[k].attempts++;
      if (isCorrect) s.daily[k].correct++;
      this.save(memberId, s);
    },

    // Per-day "turn" counters keyed by activity kind:
    //   'vocab'      — finished a 10-question vocab session
    //   'composition'— finished a 10-question 瞬間英作文 session
    //   'random_test'— finished a 10-question ランダムテスト
    //   'mctest'     — finished Daily English's 10問テスト
    //   'flip'       — flipped a Daily English phrasebook card open
    //   'overcome'   — answered a mistake correctly in 間違い復習
    // Stored at state.turns[YYYY-MM-DD][kind] = N. Mirrors recordDaily.
    recordTurn(memberId, kind, n) {
      const inc = n || 1;
      const s = this.load(memberId);
      if (!s.turns) s.turns = {};
      const k = this.todayKey(memberId);
      if (!s.turns[k]) s.turns[k] = {};
      s.turns[k][kind] = (s.turns[k][kind] || 0) + inc;
      this.save(memberId, s);
    },
    getTurns(memberId) {
      return this.load(memberId).turns || {};
    },

    // Append a session event for the activity log.
    // event = { kind, count?, correct?, total?, label? } — we stamp `at`.
    pushEvent(memberId, event) {
      const s = this.load(memberId);
      if (!s.events) s.events = [];
      s.events.unshift(Object.assign({ at: new Date().toISOString() }, event || {}));
      // Cap so the local row doesn't balloon past localStorage limits.
      if (s.events.length > 200) s.events.length = 200;
      this.save(memberId, s);
    },
    getEvents(memberId) {
      return this.load(memberId).events || [];
    },

    // One-time migration: if this member has historical `daily.attempts`
    // but no `turns` data yet (because turn-tracking was added later),
    // seed an approximate turn count so the activity panel reflects what
    // the learner actually did. Marked with `_backfilled` so we don't
    // overwrite real data on subsequent runs.
    backfillTurnsFromDaily(memberId) {
      const s = this.load(memberId);
      if (s.turnsBackfilled) return false;
      const daily = s.daily || {};
      if (!s.turns) s.turns = {};
      let touched = false;
      for (const date in daily) {
        const attempts = daily[date].attempts || 0;
        if (attempts <= 0) continue;
        const existing = s.turns[date] || {};
        const realTotal =
          (existing.vocab || 0) +
          (existing.composition || 0) +
          (existing.random_test || 0) +
          (existing.mctest || 0);
        if (realTotal > 0) continue;        // already have precise data
        const guessed = Math.max(1, Math.round(attempts / 10));
        s.turns[date] = Object.assign({}, existing, {
          vocab: guessed, _backfilled: true,
        });
        touched = true;
      }
      s.turnsBackfilled = true;
      this.save(memberId, s);
      return touched;
    },
    // Returns the last `days` days' data as [{ date: 'YYYY-MM-DD', counts: {...} }],
    // ordered oldest → newest, including days with no activity (counts={}).
    getTurnsByDate(memberId, days) {
      const turns = this.getTurns(memberId);
      const arr = [];
      // Walk back N days using each member's own timezone — for Yoshinari
      // the 'today' column on the panel is London-local, not Japan-local.
      const todayK = this.todayKey(memberId);
      // Parse 'YYYY-MM-DD' as a UTC noon date so subtracting days never
      // crosses a DST boundary on the device clock.
      const [Y, M, D] = todayK.split('-').map(n => parseInt(n, 10));
      const base = new Date(Date.UTC(Y, M - 1, D, 12, 0, 0));
      for (let i = (days || 7) - 1; i >= 0; i--) {
        const dd = new Date(base); dd.setUTCDate(base.getUTCDate() - i);
        const m = String(dd.getUTCMonth() + 1).padStart(2, '0');
        const day = String(dd.getUTCDate()).padStart(2, '0');
        const key = dd.getUTCFullYear() + '-' + m + '-' + day;
        arr.push({
          date: key,
          mm: parseInt(m, 10),
          dd: parseInt(day, 10),
          counts: turns[key] || {},
          isToday: key === todayK,
        });
      }
      return arr;
    },

    // Sentence (composition) progress: simple per-sentence counters.
    // Shape: state.composition[sentenceId] = { attempts, correct, lastAt }
    getSentenceProgress(memberId, sentenceId) {
      const s = this.load(memberId);
      return (s.composition && s.composition[sentenceId]) || null;
    },
    recordSentence(memberId, sentenceId, isCorrect) {
      const s = this.load(memberId);
      if (!s.composition) s.composition = {};
      const cur = s.composition[sentenceId] || {
        attempts: 0, correct: 0, consecutiveCorrect: 0, lastAt: null,
      };
      cur.attempts++;
      if (isCorrect) {
        cur.correct++;
        cur.consecutiveCorrect = (cur.consecutiveCorrect || 0) + 1;
      } else {
        cur.consecutiveCorrect = 0;
      }
      cur.lastAt = new Date().toISOString();
      s.composition[sentenceId] = cur;
      this.save(memberId, s);
      this.recordDaily(memberId, isCorrect);
      if (!isCorrect) this.pushMistakeEx(memberId, 'sentence', sentenceId);
      else this.removeMistakeEx(memberId, 'sentence', sentenceId);
    },

    // Phrase (daily English) progress
    getPhraseProgress(memberId, phraseId) {
      const s = this.load(memberId);
      return (s.phrases && s.phrases[phraseId]) || null;
    },
    recordPhrase(memberId, phraseId, isCorrect) {
      const s = this.load(memberId);
      if (!s.phrases) s.phrases = {};
      const cur = s.phrases[phraseId] || { attempts: 0, correct: 0, lastAt: null };
      cur.attempts++;
      if (isCorrect) cur.correct++;
      cur.lastAt = new Date().toISOString();
      s.phrases[phraseId] = cur;
      this.save(memberId, s);
      this.recordDaily(memberId, isCorrect);
      if (!isCorrect) this.pushMistakeEx(memberId, 'phrase', phraseId);
      else this.removeMistakeEx(memberId, 'phrase', phraseId);
    },

    // Generic mistakes (kind: 'vocab' | 'sentence' | 'phrase').
    // Backward-compatible with older entries that only carried { vocabId, at };
    // those are normalised to { kind: 'vocab', id: vocabId, at } at read time.
    pushMistakeEx(memberId, kind, id) {
      const s = this.load(memberId);
      if (!s.mistakes) s.mistakes = [];
      // Strip any existing entry for the same (kind, id)
      s.mistakes = s.mistakes.filter(m => {
        const k = m.kind || 'vocab';
        const i = m.id  || m.vocabId;
        return !(k === kind && i === id);
      });
      s.mistakes.unshift({ kind, id, at: new Date().toISOString() });
      s.mistakes = s.mistakes.slice(0, 80);
      this.save(memberId, s);
    },
    removeMistakeEx(memberId, kind, id) {
      const s = this.load(memberId);
      if (!s.mistakes) return;
      s.mistakes = s.mistakes.filter(m => {
        const k = m.kind || 'vocab';
        const i = m.id  || m.vocabId;
        return !(k === kind && i === id);
      });
      this.save(memberId, s);
    },
    getMistakesNormalized(memberId) {
      const raw = this.load(memberId).mistakes || [];
      return raw.map(m => ({
        kind: m.kind || 'vocab',
        id:   m.id  || m.vocabId,
        at:   m.at,
      })).filter(m => m.id);
    },

    // Single entry point for "the user answered a question". Updates SRS state,
    // mistake log, and daily counters in one place. Pass removeOnCorrect: true
    // when the source is the mistake-review screen (a correct answer there
    // should clear the item from the mistake log).
    recordAnswer(memberId, vocabId, isCorrect, opts) {
      const prev = this.getVocabProgress(memberId, vocabId);
      const direction = (opts && opts.direction) || 'ja2en';
      const next = srs.apply(prev, isCorrect, direction);
      this.setVocabProgress(memberId, vocabId, next);
      if (!isCorrect) this.pushMistake(memberId, vocabId);
      else if (opts && opts.removeOnCorrect) this.removeMistake(memberId, vocabId);
      this.recordDaily(memberId, isCorrect);
      return next;
    },
  };

  // ---------- Cloud sync (Supabase) ----------
  // Strategy:
  //   - localStorage stays the source of truth on each device (offline-first).
  //   - Every db.save() also schedules a debounced upsert into Supabase's
  //     member_state table (a single jsonb blob keyed by member_id).
  //   - On profile select we pull the cloud row; if it's newer than the local
  //     copy we replace local. Last-write-wins.
  // Tradeoff: simultaneous edits on two devices for the same member can lose
  // each other. Acceptable for a personal family app; revisit if needed.
  const SUPABASE_URL  = 'https://rfuuhelnojqgnfkhpyxn.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_bCxvDUceZIT6rHK6pAcV4w_f3l-njzp';
  const CLOUD_TABLE   = 'member_state';

  const cloud = (function () {
    let client = null;
    try {
      if (window.supabase && window.supabase.createClient) {
        client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
          auth: { persistSession: false, autoRefreshToken: false },
        });
      }
    } catch (err) { console.warn('Supabase init failed', err); }

    const status = {
      enabled: !!client,
      online:  typeof navigator !== 'undefined' ? navigator.onLine !== false : true,
      lastError: null,
      lastSyncAt: null,    // ISO string
      pending: false,      // a write is queued / in flight / waiting for connectivity
    };
    const listeners = new Set();
    function notify() { listeners.forEach(fn => { try { fn(status); } catch {} }); }

    // Debounced per-member upsert. We coalesce rapid db.save() calls (e.g.
    // many record() in a session) into a single network round-trip per
    // member. If the upsert fails (offline / network error) the state stays
    // in `pending` and is retried automatically when connectivity returns.
    const timers  = {};
    const pending = {};
    function schedulePush(memberId, state) {
      if (!client) return;
      pending[memberId] = state;
      status.pending = true;
      notify();
      clearTimeout(timers[memberId]);
      timers[memberId] = setTimeout(() => flushPush(memberId), 800);
    }
    async function flushPush(memberId) {
      if (!client) return;
      const state = pending[memberId];
      if (!state) return;
      // If the device is offline, leave the entry in `pending` so the
      // 'online' listener below can retry it. Don't even attempt the
      // network call (Safari may surface a noisy fetch error otherwise).
      if (!status.online) {
        status.pending = true;
        notify();
        return;
      }
      // Optimistically remove from queue; we'll put it back on failure.
      delete pending[memberId];
      try {
        const { error } = await client
          .from(CLOUD_TABLE)
          .upsert({ member_id: memberId, data: state }, { onConflict: 'member_id' });
        if (error) throw error;
        status.lastError  = null;
        status.lastSyncAt = new Date().toISOString();
      } catch (err) {
        // Keep the latest version of state pending so the next online retry
        // catches the most recent edit.
        if (!pending[memberId]) pending[memberId] = state;
        status.lastError = (err && err.message) || String(err);
        console.warn('cloud upsert failed', err);
      } finally {
        status.pending = Object.keys(pending).length > 0;
        notify();
      }
    }
    async function pull(memberId) {
      if (!client) return null;
      if (!status.online) return null;
      try {
        const { data, error } = await client
          .from(CLOUD_TABLE)
          .select('data, updated_at')
          .eq('member_id', memberId)
          .maybeSingle();
        if (error) throw error;
        return data; // null if no row yet
      } catch (err) {
        status.lastError = (err && err.message) || String(err);
        notify();
        return null;
      }
    }
    async function pingTest() {
      if (!client) return false;
      if (!status.online) return false;
      try {
        const { error } = await client
          .from(CLOUD_TABLE)
          .select('member_id', { count: 'exact', head: true });
        if (error) throw error;
        status.lastError  = null;
        status.lastSyncAt = new Date().toISOString();
        notify();
        return true;
      } catch (err) {
        status.lastError = (err && err.message) || String(err);
        notify();
        return false;
      }
    }

    // Immediate, non-debounced push. Used for one-off saves like display
    // names / avatars / family photos where we want the write to land in
    // the cloud right away (in case the user closes the tab seconds later).
    // When offline, falls through to the same pending queue as schedulePush.
    async function pushNow(memberId, state) {
      if (!client) return;
      clearTimeout(timers[memberId]);
      if (!status.online) {
        pending[memberId] = state;
        status.pending = true;
        notify();
        return;
      }
      delete pending[memberId];
      status.pending = true; notify();
      try {
        const { error } = await client
          .from(CLOUD_TABLE)
          .upsert({ member_id: memberId, data: state }, { onConflict: 'member_id' });
        if (error) throw error;
        status.lastError  = null;
        status.lastSyncAt = new Date().toISOString();
      } catch (err) {
        if (!pending[memberId]) pending[memberId] = state;
        status.lastError = (err && err.message) || String(err);
        console.warn('cloud pushNow failed', err);
      } finally {
        status.pending = Object.keys(pending).length > 0;
        notify();
      }
    }

    // Track connectivity. When the device comes back online, drain anything
    // we couldn't push while offline. This is what lets the kid in the UK
    // dorm keep studying after Wi-Fi cuts out at 22:30 — the answers stack
    // up in `pending` overnight and flush on reconnect the next morning.
    function setOnline(isOnline) {
      const was = status.online;
      status.online = !!isOnline;
      // Coming back online: drop any 'lastError' that was just network noise
      // and flush every pending member.
      if (!was && status.online) {
        status.lastError = null;
        notify();
        Object.keys(pending).forEach(id => { flushPush(id); });
      } else {
        notify();
      }
    }
    if (typeof window !== 'undefined') {
      window.addEventListener('online',  () => setOnline(true));
      window.addEventListener('offline', () => setOnline(false));
    }

    return {
      status,
      subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
      schedulePush, pushNow, pull, pingTest,
      // Number of members with un-synced edits in the local queue.
      pendingCount() { return Object.keys(pending).length; },
    };
  })();

  // Wrap db.save so every local write triggers a debounced cloud push.
  // We keep db.save synchronous for the UI; the network happens in the
  // background and never blocks the user.
  (function wrapDbSave() {
    const originalSave = db.save.bind(db);
    db.save = function (memberId, state) {
      // Stamp the local state with a version so we can compare against cloud.
      try { state._localUpdatedAt = new Date().toISOString(); } catch {}
      originalSave(memberId, state);
      cloud.schedulePush(memberId, state);
    };
  })();

  // Pull cloud state into local on first use of a profile. If the cloud copy
  // is newer than local (or local is empty), replace local. Returns a Promise
  // that resolves once local has been hydrated.
  // Returns true when localStorage has been touched (it has a timestamp /
  // some keys) but contains none of the actual learning data — vocab
  // progress, daily counters, turns, events, or mistakes. This is the
  // signature of a fresh install where the user briefly poked the app
  // before the cloud hydrate finished. In that case we WANT cloud to win
  // even though local has a stamp, otherwise we lock the kid out of all
  // their previous progress just because they tapped something during the
  // ~1s the cloud round-trip was running.
  function isMemberStateEmptyish(state) {
    if (!state || typeof state !== 'object') return true;
    const events  = Array.isArray(state.events) ? state.events.length : 0;
    const vocab   = state.vocab    ? Object.keys(state.vocab).length    : 0;
    const turns   = state.turns    ? Object.keys(state.turns).length    : 0;
    const daily   = state.daily    ? Object.keys(state.daily).length    : 0;
    const mistakes = Array.isArray(state.mistakes) ? state.mistakes.length : 0;
    const sentences = state.sentences ? Object.keys(state.sentences).length : 0;
    const phrases   = state.phrases   ? Object.keys(state.phrases).length   : 0;
    return events === 0 && vocab === 0 && turns === 0 && daily === 0
        && mistakes === 0 && sentences === 0 && phrases === 0;
  }
  async function hydrateFromCloud(memberId) {
    if (!cloud.status.enabled) return false;
    const remote = await cloud.pull(memberId);
    if (!remote) return false;
    const localRaw = localStorage.getItem(STORAGE_KEY(memberId));
    let local = null;
    try { local = localRaw ? JSON.parse(localRaw) : null; } catch {}
    const localTs  = (local && local._localUpdatedAt) || '';
    const remoteTs = remote.updated_at || '';
    const localEmptyish = isMemberStateEmptyish(local);
    // Take cloud when (a) we have nothing locally, (b) local is just a
    // stamp with no real learning data (fresh-install poke), or (c) cloud
    // is strictly newer than what we've got.
    if (!local || localEmptyish || (remoteTs && remoteTs > localTs)) {
      try {
        localStorage.setItem(STORAGE_KEY(memberId), JSON.stringify(remote.data || {}));
        return true;
      } catch { return false; }
    } else if (local && (!remoteTs || localTs > remoteTs)) {
      // Local is newer — push it up so cloud catches up.
      cloud.schedulePush(memberId, local);
    }
    return false;
  }

  // Pull EVERY family member's progress row so the ProfileSelect screen
  // shows up-to-date '覚えた / 連続日数 / 累計正解' for everyone, even
  // when that member's data was last written from a different device
  // (e.g. Yoshinari studying overnight in his UK dorm and the parents
  // checking from Tokyo the next morning).
  async function hydrateAllProfilesFromCloud() {
    if (!cloud.status.enabled || !cloud.status.online) return;
    let anyChanged = false;
    // Sequential rather than parallel to keep the request burst small —
    // 5 members × 1 round-trip is fast enough either way.
    for (const p of PROFILES) {
      try {
        const changed = await hydrateFromCloud(p.id);
        if (changed) anyChanged = true;
      } catch {}
    }
    if (anyChanged) {
      // Same event the family-shared hydrate uses — App bumps a render
      // tick and ProfileCard re-reads localStorage with the new data.
      try { window.dispatchEvent(new CustomEvent('hfe:family-hydrated')); } catch {}
    }
  }

  // ---------- Streak + weekly helpers ----------
  function dateKey(d) {
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }
  // Member-aware date-key. Yoshinari (son2) is in a UK boarding-school
  // dorm so his day rolls over on London time; everyone else uses the
  // device's local date.
  const MEMBER_TIMEZONE = {
    son2: 'Europe/London',
  };
  function dateKeyForMember(memberId, d) {
    const tz = MEMBER_TIMEZONE[memberId];
    const date = d || new Date();
    if (!tz) return dateKey(date);
    try {
      // 'en-CA' formats numeric dates as YYYY-MM-DD.
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
      }).format(date);
    } catch {
      return dateKey(date);
    }
  }
  // Counts the number of consecutive days (ending today or yesterday) on which
  // the member had any attempts. Today with no activity does not break the
  // streak — it just means the streak was set yesterday.
  function computeStreak(daily) {
    let streak = 0;
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    const today = dateKey(d);
    if (!daily[today] || (daily[today].attempts || 0) === 0) {
      d.setDate(d.getDate() - 1);
    }
    while (true) {
      const k = dateKey(d);
      if (daily[k] && (daily[k].attempts || 0) > 0) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    return streak;
  }
  // Sum of correct answers over the trailing 7 days (today inclusive).
  function computeWeeklyCorrect(daily) {
    let total = 0;
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    for (let i = 0; i < 7; i++) {
      const k = dateKey(d);
      if (daily[k]) total += daily[k].correct || 0;
      d.setDate(d.getDate() - 1);
    }
    return total;
  }

  // ---------- SRS engine (Anki-like, simplified) ----------
  const srs = {
    initial() {
      return {
        status: 'new',           // 'new' | 'learning' | 'review' | 'mastered'
        consecutiveCorrect: 0,
        totalAttempts: 0,
        totalCorrect: 0,
        lastAt: null,
        nextAt: null,
        intervalDays: 0,
        ease: 2.5,
        // Per-direction success — once the learner has marked '覚えた' in
        // both directions the word is considered mastered.
        knownJa2En: false,
        knownEn2Ja: false,
      };
    },
    apply(state, isCorrect, direction) {
      const s = state ? Object.assign({}, state) : this.initial();
      s.totalAttempts++;
      s.lastAt = new Date().toISOString();
      if (isCorrect) {
        s.totalCorrect++;
        s.consecutiveCorrect++;
        if (s.intervalDays === 0)         { s.intervalDays = 1; }
        else if (s.intervalDays < 4)      { s.intervalDays = Math.round(s.intervalDays * 2); }
        else                              { s.intervalDays = Math.round(s.intervalDays * s.ease); }
        // Stamp the direction the learner just nailed. Default to 'ja2en'
        // for legacy callers that don't pass direction.
        const dir = direction === 'en2ja' ? 'en2ja' : 'ja2en';
        if (dir === 'ja2en') s.knownJa2En = true;
        else                 s.knownEn2Ja = true;
        // Mastered when both directions have been marked correct at least
        // once. Otherwise it's still learning (consecutiveCorrect tracks
        // momentum but no longer promotes to mastered on its own).
        if (s.knownJa2En && s.knownEn2Ja)        s.status = 'mastered';
        else if (s.consecutiveCorrect >= 2)      s.status = 'review';
        else                                      s.status = 'learning';
      } else {
        s.consecutiveCorrect = 0;
        s.intervalDays = 0;
        // A wrong answer steps the word back down to 'learning' but does
        // NOT clear a direction flag the learner had previously earned —
        // mastery is sticky once both sides are confirmed.
        if (s.status !== 'mastered') s.status = 'learning';
        s.ease = Math.max(1.3, s.ease - 0.2);
      }
      s.nextAt = new Date(Date.now() + s.intervalDays * 86400000).toISOString();
      return s;
    },

    // Pick a queue for "today's 20":
    //   1) All due items, oldest nextAt first
    //   2) Filled with new items, preferring those near memberLevel
    //   Returns up to `count` vocab objects (in display order).
    pickTodaysList(memberId, count, memberLevel) {
      const now = new Date().toISOString();
      const state = db.load(memberId);
      const progress = state.vocab || {};

      const due = [];
      const fresh = [];
      for (const v of VOCAB) {
        const p = progress[v.id];
        if (!p || p.status === 'new') fresh.push(v);
        else if (!p.nextAt || p.nextAt <= now) due.push({ v, p });
      }
      due.sort((a, b) => (a.p.nextAt || '').localeCompare(b.p.nextAt || ''));

      if (memberLevel) {
        fresh.sort((a, b) => {
          const da = Math.abs(a.level - memberLevel);
          const dbb = Math.abs(b.level - memberLevel);
          return da !== dbb ? da - dbb : a.level - b.level;
        });
      }

      const out = due.map(d => d.v);
      while (out.length < count && fresh.length > 0) out.push(fresh.shift());
      return {
        items: out.slice(0, count),
        dueCount: Math.min(due.length, count),
        freshCount: Math.max(0, Math.min(count, out.length) - Math.min(due.length, count)),
      };
    },

    // Pick a mixed daily queue of vocab + sentences with a deliberate slice
    // of already-mastered material so old learning isn't forgotten.
    //
    // Roughly:
    //   - 1/3 review (mastered vocab + mastered sentences, mixed)
    //   - 2/3 fresh / due (mix of vocab and sentences within the cap)
    // memberLevel filters fresh items toward levels at-or-below the learner.
    pickDaily20(memberId, count, memberLevel, maxLevel) {
      const state = db.load(memberId);
      const vp = state.vocab || {};
      const sp = state.composition || {};
      const cap = maxLevel || 5;

      function shuffle(a) {
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }

      const reviewTarget = Math.max(1, Math.round(count / 3));

      // ---------- Mastered (review) pool ----------
      const masteredV = VOCAB
        .filter(v => v.level <= cap && vp[v.id] && vp[v.id].status === 'mastered')
        .map(v => ({ kind: 'vocab', id: v.id, item: v }));
      const masteredS = SENTENCES
        .filter(s => s.level <= cap && isSentenceMastered(sp[s.id]))
        .map(s => ({ kind: 'sentence', id: s.id, item: s }));
      const review = shuffle(masteredV.concat(masteredS)).slice(0, reviewTarget);

      // ---------- Fresh / due pool ----------
      const now = new Date().toISOString();
      const freshOrDueV = VOCAB
        .filter(v => v.level <= cap)
        .filter(v => {
          const p = vp[v.id];
          if (!p || p.status === 'new') return true;
          if (p.status === 'mastered') return false;
          return !p.nextAt || p.nextAt <= now;
        })
        .map(v => ({ kind: 'vocab', id: v.id, item: v, level: v.level }));
      const freshOrDueS = SENTENCES
        .filter(s => s.level <= cap)
        .filter(s => !isSentenceMastered(sp[s.id]))
        .map(s => ({ kind: 'sentence', id: s.id, item: s, level: s.level }));

      // Sort by closeness to memberLevel
      function byLevel(a, b) {
        const da = Math.abs((a.level || 1) - (memberLevel || 1));
        const dbb = Math.abs((b.level || 1) - (memberLevel || 1));
        return da - dbb;
      }
      shuffle(freshOrDueV).sort(byLevel);
      shuffle(freshOrDueS).sort(byLevel);

      // Interleave fresh vocab + sentence so the queue feels mixed.
      const fresh = [];
      const remaining = count - review.length;
      let vi = 0, si = 0;
      // Roughly half-half but stop at the remaining cap.
      while (fresh.length < remaining && (vi < freshOrDueV.length || si < freshOrDueS.length)) {
        // Alternate, slight bias toward whichever pool is larger.
        if (vi < freshOrDueV.length && (fresh.length % 2 === 0 || si >= freshOrDueS.length)) {
          fresh.push(freshOrDueV[vi++]);
        } else if (si < freshOrDueS.length) {
          fresh.push(freshOrDueS[si++]);
        }
      }

      // Final queue: shuffle review-into-fresh so they don't sit in two blocks.
      const queue = shuffle(review.concat(fresh)).slice(0, count);

      return {
        items: queue,
        reviewCount: queue.filter(q => {
          const p = q.kind === 'vocab' ? vp[q.id] : sp[q.id];
          return q.kind === 'vocab'
            ? (p && p.status === 'mastered')
            : isSentenceMastered(p);
        }).length,
        vocabCount:    queue.filter(q => q.kind === 'vocab').length,
        sentenceCount: queue.filter(q => q.kind === 'sentence').length,
      };
    },
  };

  // ---------- Hard reload (cache-busting) ----------
  // Some PWAs / browsers serve a stale copy from cache when reload() is called.
  // Append a fresh ?_=timestamp so the navigation goes to the network.
  function hardReload() {
    try {
      const url = new URL(window.location.href);
      url.searchParams.set('_', Date.now().toString());
      window.location.replace(url.toString());
    } catch {
      try { window.location.reload(); } catch {}
    }
  }

  // ---------- Reload button (elegant SVG circular arrow + spin feedback) ----------
  // Replaces the 🔄 emoji with a properly drawn icon. While the page is
  // navigating away (after the click), the icon spins so the user knows the
  // press registered.
  // Tiny global flag set when the SW reports a new version is waiting.
  // ReloadBtn reads this to draw a small pulsing dot so the kid notices.
  let _hfeUpdateAvailable = false;
  if (typeof window !== 'undefined') {
    window.addEventListener('hfe:update-available', () => {
      _hfeUpdateAvailable = true;
      // Let any mounted ReloadBtn know via a custom event tick.
      window.dispatchEvent(new CustomEvent('hfe:update-flag'));
    });
  }
  function ReloadBtn() {
    const [spinning, setSpinning] = useState(false);
    const [, setTick] = useState(0);
    useEffect(() => {
      const fn = () => setTick(t => t + 1);
      window.addEventListener('hfe:update-flag', fn);
      window.addEventListener('hfe:update-available', fn);
      return () => {
        window.removeEventListener('hfe:update-flag', fn);
        window.removeEventListener('hfe:update-available', fn);
      };
    }, []);
    function go() {
      if (spinning) return;
      setSpinning(true);
      setTimeout(() => { hardReload(); }, 120);
    }
    const showDot = _hfeUpdateAvailable;
    return e('button', {
      onClick: go,
      title: showDot ? '新しいバージョンがあります — タップで更新' : 'アプリを再読み込み',
      'aria-label': '再読み込み',
      style: {
        width: 36, height: 36, borderRadius: 999,
        background: C.softer, border: '1px solid ' + (showDot ? C.brand : C.line),
        color: C.sub,

        cursor: spinning ? 'wait' : 'pointer',
        padding: 0, position: 'relative',
      },
    },
      e('svg', {
        className: 'hfe-reload-icon' + (spinning ? ' is-spinning' : ''),
        xmlns: 'http://www.w3.org/2000/svg',
        width: 16, height: 16, viewBox: '0 0 24 24',
        fill: 'none', stroke: 'currentColor',
        'stroke-width': 1.8, 'stroke-linecap': 'round', 'stroke-linejoin': 'round',
        'aria-hidden': 'true',
      },
        e('path', { d: 'M3 12a9 9 0 0 1 15.5-6.3' }),
        e('polyline', { points: '19 2 19 6 15 6' }),
        e('path', { d: 'M21 12a9 9 0 0 1-15.5 6.3' }),
        e('polyline', { points: '5 22 5 18 9 18' }),
      ),
      // Pulsing brand-color dot when an update is waiting.
      showDot && e('span', {
        className: 'hfe-update-dot',
        style: {
          position: 'absolute', top: -2, right: -2,

  // ---------- Offline badge (small pill that appears when navigator is offline) ----------
  // Subscribes to the cloud module's status so it re-renders on online /
  // offline / pending changes. Stays out of the way when the device is
  // online and there's nothing queued.
  function OfflineBadge() {
    const [, setTick] = useState(0);
    useEffect(() => cloud.subscribe(() => setTick(t => t + 1)), []);
    const s = cloud.status;
    if (s.online) return null;
    return e('div', {
      title: 'Wi-Fi がない間も学習データはこの端末に保存され、復帰時に自動で同期されます。',
      style: {
        padding: '4px 10px', borderRadius: 999,
        background: C.ocean + '14', color: C.ocean,
        border: '1px solid ' + C.ocean + '33',
        fontSize: 10, fontWeight: 700, fontFamily: SANS_UI,
        letterSpacing: '0.06em', whiteSpace: 'nowrap',
      },
    }, 'オフライン');
  }

  // ---------- Update banner (rate-limited to once per 12h) ----------
  // The Service Worker fires 'hfe:update-available' the moment a fresh sw.js
  // / HTML lands. To avoid pestering the kid every hour while Dad is
  // pushing updates rapidly, we only surface the banner if at least
  // UPDATE_COOLDOWN_MS has passed since the last time we showed (or
  // 'あとで'-snoozed) it on this device.
  const UPDATE_LAST_SHOWN_KEY = 'hfe_update_last_shown_at_v1';
  const UPDATE_COOLDOWN_MS    = 12 * 60 * 60 * 1000;   // 12 hours
  function UpdateBanner() {
    const [show, setShow] = useState(false);
    function withinCooldown() {
      try {
        const t = parseInt(localStorage.getItem(UPDATE_LAST_SHOWN_KEY) || '0', 10);
        return t && (Date.now() - t < UPDATE_COOLDOWN_MS);
      } catch { return false; }
    }
    function markShown() {
      try { localStorage.setItem(UPDATE_LAST_SHOWN_KEY, String(Date.now())); } catch {}
    }
    useEffect(() => {
      function onAvailable() {
        if (withinCooldown()) return;
        setShow(true);
        markShown();    // Stamp on show so we don't pop again within 12h.
      }
      window.addEventListener('hfe:update-available', onAvailable);
      // If the SW already raised the flag before this component mounted,
      // honour it now.
      if (_hfeUpdateAvailable && !withinCooldown()) {
        setShow(true);
        markShown();
      }
      return () => window.removeEventListener('hfe:update-available', onAvailable);
    }, []);
    function applyUpdate() {
      setShow(false);
      // Tell the waiting SW to skip waiting; controllerchange handler
      // (in the SW registration block) will reload the page.
      try {
        navigator.serviceWorker.getRegistration().then((reg) => {
          if (reg && reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          } else {
            // If for some reason there's no waiting worker, force reload.
            hardReload();
          }
        });
      } catch { hardReload(); }
    }
    if (!show) return null;
    // Single-action banner: tapping anywhere on it (or the 更新 button)
    // applies the update. Reload only takes a second or two so there's
    // no value in offering a snooze.
    return e('button', {
      onClick: applyUpdate,
      style: {
        position: 'fixed',
        left: 12, right: 12,
        bottom: 'calc(env(safe-area-inset-bottom, 0px) + 12px)',
        zIndex: 1000,
        background: C.card, border: '1px solid ' + C.brand,
        borderRadius: 14,
        padding: '14px 16px',
        boxShadow: '0 10px 30px rgba(42,37,32,0.18)',
        display: 'flex', alignItems: 'center', gap: 12,
        maxWidth: 460, margin: '0 auto',
        textAlign: 'left', cursor: 'pointer',
      }
    },
      e('div', { style: { fontSize: 22, lineHeight: 1, flexShrink: 0 } }, '✨'),
      e('div', { style: { flex: 1, minWidth: 0 } },
        e('div', {
          style: { fontSize: 14, fontWeight: 700, color: C.text, lineHeight: 1.3 }
        }, '新しいバージョンがあります'),
        e('div', {
          style: { fontSize: 11, color: C.sub, marginTop: 2, lineHeight: 1.5 }
        }, 'タップで更新（数秒で再読み込みされます）'),
      ),
      e('span', {
        style: {
          padding: '10px 16px', borderRadius: 999,
          background: C.brand, color: '#fff',
          fontSize: 13, fontWeight: 700, fontFamily: SANS_UI,
          flexShrink: 0,
        }
      }, '更新'),
    );
  }

  // ---------- Speech (TTS) — temporary stand-in until native MP3 audio is added ----------
  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.9;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    } catch (err) { /* ignore */ }
  }

  // ---------- Dummy stats (used until Supabase is connected) ----------
  // Realistic-looking placeholder numbers per member, deterministic across reloads.
  // Replace with live data from `daily_stats` once Supabase is wired up.
  // Dummy stats cleared per user request — everyone starts from zero.
  // Real numbers will accrue from each member's actual answers (and once
  // Supabase is wired up, sync across devices in real time).
  // ---------- Streak visual tiers ----------
  function streakVisuals(days) {
    if (days >= 30) return { icon: '👑', color: '#D4AF37' };
    if (days >= 7)  return { icon: '🔥', color: '#B85420' };
    if (days >= 3)  return { icon: '🔥', color: '#C97D3B' };
    return { icon: '🔥', color: '#C97D3B' };
  }

  // Aggregate the current user's real stats from localStorage.
  function computeStats(memberId) {
    const state = db.load(memberId);
    const vocab = state.vocab || {};
    const composition = state.composition || {};
    const daily = state.daily || {};
    let totalAttempts = 0, totalCorrect = 0, learnedCount = 0, masteredCount = 0;
    for (const vid in vocab) {
      const p = vocab[vid];
      totalAttempts += p.totalAttempts || 0;
      totalCorrect  += p.totalCorrect  || 0;
      if ((p.totalAttempts || 0) > 0) learnedCount++;
      if (p.status === 'mastered') masteredCount++;
    }
    // Sentences contribute to total time too — count their attempts on top.
    let sentenceAttempts = 0;
    for (const sid in composition) sentenceAttempts += composition[sid].attempts || 0;
    // Rough study-time estimate: ~10s per vocab attempt, ~15s per sentence
    // attempt. Honest enough for a profile-card summary; we'll switch to
    // measured time if we ever start tracking elapsedMs per question.
    const totalMinutes = Math.round(
      ((totalAttempts * 10) + (sentenceAttempts * 15)) / 60
    );
    const accuracy = totalAttempts > 0 ? Math.round(totalCorrect * 100 / totalAttempts) : 0;
    return {
      totalAttempts, totalCorrect, accuracy, learnedCount, masteredCount,
      sentenceAttempts, totalMinutes,
      weeklyCorrect: computeWeeklyCorrect(daily),
      streakDays:    computeStreak(daily),
    };
  }

  // Format minutes as a compact, friendly string for profile cards:
  //   < 1m   → "—"
  //   < 60m  → "12分"
  //   ≥ 60m  → "2時間"  or "2.5時間"
  function formatStudyTime(minutes) {
    if (!minutes || minutes < 1) return '—';
    if (minutes < 60) return minutes + '分';
    const hours = minutes / 60;
    if (hours < 10) return hours.toFixed(1).replace(/\.0$/, '') + '時間';
    return Math.round(hours) + '時間';
  }

  // Friendly Japanese relative-time string used on profile cards: "3時間前",
  // "12分前", "5日前", etc. Falls back to "つい先ほど" for events younger
  // than ~30 seconds so the line never reads "0分前".
  function humanRelativeJa(thenMs, nowMs) {
    if (!thenMs || isNaN(thenMs)) return '';
    const dt = (nowMs || Date.now()) - thenMs;
    if (dt < 30_000)            return 'つい先ほど';
    if (dt < 60_000)            return '少し前';
    const m = Math.floor(dt / 60_000);
    if (m < 60)                 return m + '分前';
    const h = Math.floor(m / 60);
    if (h < 24)                 return h + '時間前';
    const d = Math.floor(h / 24);
    if (d < 14)                 return d + '日前';
    const w = Math.floor(d / 7);
    if (w < 8)                  return w + '週間前';
    return Math.floor(d / 30) + 'ヶ月前';
  }

  // Approximate the duration of a session event when no measured value
  // is attached. We started capturing real durationMs only on newer
  // sessions, so older events fall back to "total questions × seconds-
  // per-question". The per-kind rate is rough but better than blank.
  const KIND_SECS_PER_Q = {
    vocab: 12, composition: 14, random_test: 10, mctest: 10,
    overcome: 14, lesson: 25, flip: 4, shadowing: 18,
  };
  function eventDurationMinutes(ev) {
    if (!ev) return 0;
    if (typeof ev.durationMs === 'number' && ev.durationMs > 0) {
      return Math.max(1, Math.round(ev.durationMs / 60_000));
    }
    const total = typeof ev.total === 'number' ? ev.total : 0;
    if (!total) return 0;
    const perQ = KIND_SECS_PER_Q[ev.kind] || 12;
    return Math.max(1, Math.round((total * perQ) / 60));
  }

  // 'M/D' for today, used as the date prefix on tile subtitles.
  function formatTodayShort() {
    const d = new Date();
    return (d.getMonth() + 1) + '/' + d.getDate();
  }

  // Sum of all-time '克服' counts (correct answers in 間違い復習).
  function computeTotalOvercome(memberId) {
    const turns = db.getTurns(memberId);
    let total = 0;
    for (const day in turns) total += turns[day].overcome || 0;
    return total;
  }

  // ---------- Mastery helpers ----------
  // A vocab item is "mastered" once the SRS engine sets status = 'mastered'
  // (interval grows past ~30 days of correct answers).
  function getMasteredVocab(memberId) {
    const vocab = (db.load(memberId).vocab) || {};
    return VOCAB.filter(v => vocab[v.id] && vocab[v.id].status === 'mastered');
  }

  // A sentence is "mastered" once the learner has answered it correctly
  // 3 times in a row. Mirrors the vocab rule so 'covered it' feels the
  // same in either drill. Older state without consecutiveCorrect falls
  // back to the original threshold (3 correct + 70% accuracy).
  function isSentenceMastered(p) {
    if (!p || !p.attempts) return false;
    if ((p.consecutiveCorrect || 0) >= 3) return true;
    return p.correct >= 3 && (p.correct / p.attempts) >= 0.7;
  }
  function getMasteredSentences(memberId) {
    const composition = (db.load(memberId).composition) || {};
    return SENTENCES.filter(s => isSentenceMastered(composition[s.id]));
  }

  // ---------- Sound effects (Web Audio synthesis, no files) ----------
  // Tiny synthesised tones with envelope so we don't ship audio files.
  // First call requires a user gesture to unlock the AudioContext (we wire
  // session record() into the user's tap, so that's already satisfied).
  let _audioCtx = null;
  function getAudioCtx() {
    if (_audioCtx) return _audioCtx;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    try { _audioCtx = new AC(); } catch { _audioCtx = null; }
    return _audioCtx;
  }
  function playTone(freq, durationMs, vol, type) {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (vol == null) vol = 0.12;
    if (!type) type = 'sine';
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + durationMs / 1000);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + durationMs / 1000 + 0.05);
  }
  function soundCorrect() {
    playTone(880, 90);                                 // A5
    setTimeout(() => playTone(1318.5, 130), 70);       // E6
  }
  function soundWrong() {
    playTone(196, 220, 0.08);                          // G3, soft
  }
  function soundComplete() {
    const notes = [523.25, 659.25, 783.99, 1046.5];    // C E G C
    notes.forEach((f, i) => setTimeout(() => playTone(f, 200, 0.13), i * 90));
  }

  // ---------- Haptic (iOS / Android navigator.vibrate) ----------
  function hapticTap()  { if (navigator.vibrate) navigator.vibrate(12); }
  function hapticBuzz() { if (navigator.vibrate) navigator.vibrate([25, 50, 25]); }
  function hapticWin()  { if (navigator.vibrate) navigator.vibrate([15, 50, 15, 50, 80]); }

  // ---------- Image compression (for photo attachments) ----------
  // Uses a canvas to downscale and re-encode as JPEG so photos don't blow up
  // localStorage. ~50-150KB per photo at maxDim 800.
  function compressImageToDataUrl(file, maxDim, quality) {
    if (!maxDim) maxDim = 800;
    if (quality == null) quality = 0.75;
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        try {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch (err) { URL.revokeObjectURL(url); reject(err); }
      };
      img.onerror = (err) => { URL.revokeObjectURL(url); reject(err); };
      img.src = url;
    });
  }

    if (!iso) return '';
    const ms = Date.now() - new Date(iso).getTime();
    if (ms < 60_000) return 'たった今';
    const min = Math.floor(ms / 60_000);
    if (min < 60)    return min + '分前';
    const hr  = Math.floor(min / 60);
    if (hr < 24)     return hr + '時間前';
    const d   = Math.floor(hr / 24);
    if (d < 30)      return d + '日前';
    return Math.floor(d / 30) + 'ヶ月前';
  }

  const FAMILY_PHOTOS_KEY  = 'hfe_family_photos_v1';
  // The cloud-side row id we use to store family-wide data inside member_state.
  // (member_state is a generic key/value blob keyed by member_id; we just
  // borrow a synthetic id 'family' for shared rows.)
  const FAMILY_SHARED_ID   = 'family';
  // ISO timestamp of the most recent local edit to family-shared data.
  // Used by hydrateFamilySharedFromCloud to decide whether the cloud copy
  // is actually newer than what's already on this device. Without this
  // check the hydrate would happily overwrite a name the user just typed
  // with an older empty cloud row.
  const FAMILY_SHARED_TS_KEY = 'hfe_family_shared_ts_v1';
  function loadFamilySharedLocalTs() {
    try { return localStorage.getItem(FAMILY_SHARED_TS_KEY) || ''; } catch { return ''; }
  }
  function stampFamilySharedLocal(iso) {
    const v = iso || new Date().toISOString();

  // Picks a family photo at random while avoiding the most recently shown
  // ones. Without this, two sessions in a row would often show the same
  // photo, which kills the surprise. We keep a tail of recent picks (length
  // = floor(N/2), capped at 5) and exclude them from the candidate pool.
  let _recentPhotoUrls = [];
  function pickRandomFamilyPhoto() {
    const arr = loadFamilyPhotos();
    if (arr.length === 0) return null;
    if (arr.length === 1) return arr[0].url;
    const blockSize = Math.min(5, Math.max(1, Math.floor(arr.length / 2)));
    const recent = new Set(_recentPhotoUrls.slice(-blockSize));
    const fresh = arr.filter(p => !recent.has(p.url));
    const pool = fresh.length > 0 ? fresh : arr;
    const picked = pool[Math.floor(Math.random() * pool.length)].url;
    _recentPhotoUrls.push(picked);
    if (_recentPhotoUrls.length > blockSize) _recentPhotoUrls.shift();
    return picked;
  }

  // ---------- Family-shared cloud row ----------
  // The 'family' member_state row holds three things together so each save
  // ships ALL of them up; otherwise pushing only photos would wipe names,
  // and vice versa. localStorage is the fast read path; cloud is the
  // durable backup that survives storage clearing / reinstalls / new devices.
  function buildFamilySharedState() {
    const out = {
      photos:  loadFamilyPhotos(),
      names:   loadDisplayNames(),
      avatars: loadAvatars(),
      _localUpdatedAt: new Date().toISOString(),
    };
    // Mirror the Anthropic API key through this same shared row (gated to
    // the family by Supabase RLS), but only when this device actually has
    // a key set locally. Pushing `apiKey: ''` on a fresh install would
    // clobber the working key that's already in cloud, locking everyone
    // out of AI features. To EXPLICITLY clear the key everywhere, the
    // user does a save with an empty key — saveApiKey() detects that
    // case and pushes an explicit empty string then.
    const k = loadApiKey();
    if (k) out.apiKey = k;
    return out;
  }
  function pushFamilySharedState() {
    try {
      if (cloud && cloud.status && cloud.status.enabled) {
        // Immediate (non-debounced) — names / avatars / photos are one-off
        // edits and we don't want to lose them if the user closes the tab.
        cloud.pushNow(FAMILY_SHARED_ID, buildFamilySharedState());
      }
    } catch {}
  }
  // Pull the family-shared cloud row on app boot. If cloud has data, take
  // it (overwriting local) — cloud is authoritative for shared family data
  // because that's how the kids' devices stay in sync with the parents'.
  // If cloud is empty, push local up so we never lose what's on disk.
  // Returns true if any localStorage value changed (so the UI can re-render).
  // True when the family-shared local store has nothing real in it —
  // names + avatars + photos all empty AND no API key. After a fresh
  // PWA install, the user might tap something (e.g., open settings)
  // before the cloud hydrate completes; that single tap stamps a
  // localTs but leaves the actual data empty. Without this guard, the
  // newer-but-empty local would beat cloud's real data and we'd lose
  // the family's names / avatars / photos / API key on the new device.
  function isFamilySharedLocalEmptyish() {
    try {
      const names   = loadDisplayNames();
      const avatars = loadAvatars();
      const photos  = loadFamilyPhotos();
      const key     = loadApiKey();
      return Object.keys(names || {}).length   === 0
          && Object.keys(avatars || {}).length === 0
          && (photos || []).length             === 0
          && !key;
    } catch { return true; }
  }
  async function hydrateFamilySharedFromCloud() {
    if (!cloud.status.enabled) return false;
    let remote = null;
    try { remote = await cloud.pull(FAMILY_SHARED_ID); } catch {}
    if (!remote || !remote.data) {
      // Nothing in cloud yet — make sure cloud has whatever we have locally.
      pushFamilySharedState();
      return false;
    }
    const d = remote.data;
    // Decide which side is newer. Prefer the data._localUpdatedAt that the
    // writing device stamped into the row; fall back to the row's
    // updated_at if missing. We only let cloud overwrite local when cloud
    // is STRICTLY newer than the last local edit on this device.
    const cloudTs = String(d._localUpdatedAt || remote.updated_at || '');
    const localTs = loadFamilySharedLocalTs();
    const localEmpty = isFamilySharedLocalEmptyish();
    if (!localEmpty && localTs && (!cloudTs || localTs >= cloudTs)) {
      // Local has real data AND a fresh-or-equal stamp → it wins; bring
      // cloud up to date so other devices catch up to whatever was
      // changed on this one.
      pushFamilySharedState();
      return false;
    }
    let changed = false;
    function applyKey(key, value) {
      const cur = localStorage.getItem(key);
      const next = JSON.stringify(value);
      if (cur !== next) {
        try { localStorage.setItem(key, next); changed = true; } catch {}
      }
    }
    if (Array.isArray(d.photos))                            applyKey(FAMILY_PHOTOS_KEY, d.photos);
    if (d.names   && typeof d.names   === 'object')         applyKey(NAMES_KEY,         d.names);
    if (d.avatars && typeof d.avatars === 'object')         applyKey(AVATARS_KEY,       d.avatars);
    // apiKey is a plain string (not JSON-encoded) so it can't go through
    // applyKey() above. Set it directly; an empty string means the key
    // was explicitly cleared elsewhere and should be removed here too.
    if (typeof d.apiKey === 'string') {
      const cur = localStorage.getItem(AI_KEY_STORAGE) || '';
      if (cur !== d.apiKey) {
        try {
          if (d.apiKey) localStorage.setItem(AI_KEY_STORAGE, d.apiKey);
          else          localStorage.removeItem(AI_KEY_STORAGE);
          changed = true;
        } catch {}
      }
    }
    if (changed) {
      // Mark our local timestamp to mirror what we just pulled, so we
      // don't immediately re-push the same data on the next event.
      if (cloudTs) stampFamilySharedLocal(cloudTs);
      try { window.dispatchEvent(new CustomEvent('hfe:family-hydrated')); } catch {}
    }
    return changed;
  }

  function saveApiKey(k) {

  function aiSystemPrompt(profile) {
    const name = getDisplayName(profile);

  async function askClaude(profile, userMessage, history) {
    const apiKey = loadApiKey();
    if (!apiKey) throw new Error('API キーが設定されていません');
    const trimmed = (history || []).slice(-32).map(m => ({ role: m.role, content: m.content }));
    const messages = trimmed.concat([{ role: 'user', content: userMessage }]);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: aiSystemPrompt(profile),
        messages,
      }),
    });
    if (!res.ok) {
      let detail = '';
      try { const j = await res.json(); detail = (j.error && j.error.message) || ''; } catch {}
      throw new Error('API エラー (' + res.status + ')' + (detail ? ': ' + detail : ''));
    }
    const data = await res.json();
    const text = (data.content || [])
      .filter(b => b.type === 'text').map(b => b.text).join('').trim();
    return text || '(空の応答)';
  }

  function isStandalonePWA() {

      if (window.navigator && window.navigator.standalone === true) return true; // iOS Safari

    return false;

  // ---------- App ----------
  function App() {
    const [route, setRoute] = useState({ name: 'profiles' });
    const [activeId, setActiveId] = useState(null);
    const [showInstall, setShowInstall] = useState(false);
    // Bumped whenever family-shared data (names, avatars, photos) gets
    // hydrated from the cloud, so descendant components that read
    // localStorage on every render (ProfileCard, SettingsScreen) re-render
    // with the freshly-pulled values.
    const [, setHydrationTick] = useState(0);
    useEffect(() => {
      function onHydrated() { setHydrationTick(t => t + 1); }
      window.addEventListener('hfe:family-hydrated', onHydrated);
      return () => window.removeEventListener('hfe:family-hydrated', onHydrated);
    }, []);
    const profile = PROFILES.find(p => p.id === activeId) || null;

    // Check install prompt eligibility once on mount, with a small delay so
    // it doesn't flash before the rest of the UI settles.
    useEffect(() => {
      if (isStandalonePWA() || isInstallDismissed()) return;
      const t = setTimeout(() => setShowInstall(true), 1800);
      return () => clearTimeout(t);
    }, []);

    const installEl = showInstall && e(InstallPrompt, { onClose: () => setShowInstall(false) });
    const updateEl  = e(UpdateBanner);

    // Helper: every route renders alongside the install prompt overlay
    // AND the update-available banner (when one is queued).
    const wrap = (el) => e(React.Fragment, null, el, installEl, updateEl);

    if (route.name === 'profiles') {
      return wrap(e(ProfileSelect, {
        onPick: (id) => {
          // Pull cloud state in the background — local UI shows immediately,
          // and the next render after hydration will pick up the freshest data.
          hydrateFromCloud(id).catch(() => {});
          setActiveId(id);
          setRoute({ name: 'home' });
        },
        onOpenSettings: () => setRoute({ name: 'settings' }),
      }));
    }
    if (route.name === 'settings') {
      return wrap(e(SettingsScreen, {
        onBack: () => setRoute({ name: 'profiles' }),
      }));
    }
    if (!profile) return null;

    if (route.name === 'home') {
      return wrap(e(EnglishHome, {
        profile,
        onBackToProfiles: () => setRoute({ name: 'profiles' }),
        onPickFeature:    (id) => setRoute({ name: 'feature', feature: id }),
      }));
    }
    if (route.name === 'feature') {
      const feat = FEATURE_BY_ID[route.feature];
      const back = () => setRoute({ name: 'home' });
      let body;
      if      (route.feature === 'phrases')           body = e(DailyPhrases,      { profile, onBack: back });
      else if (route.feature === 'random_test')       body = e(RandomTest,        { profile, onBack: back });
      else if (route.feature === 'vocab_ja2en')       body = e(VocabBrowse,       { profile, onBack: back, forcedDirection: 'ja2en' });
      else if (route.feature === 'vocab_en2ja')       body = e(VocabBrowse,       { profile, onBack: back, forcedDirection: 'en2ja' });
      else if (route.feature === 'composition_ja2en') body = e(SprintComposition, { profile, onBack: back, forcedDirection: 'ja2en' });
      else if (route.feature === 'composition_en2ja') body = e(SprintComposition, { profile, onBack: back, forcedDirection: 'en2ja' });
      else if (route.feature === 'mistakes')          body = e(MistakeReview,     { profile, onBack: back });
      else if (route.feature === 'mastered')          body = e(CombinedMastered,  { profile, onBack: back });
      else if (route.feature === 'ai_translate')      body = e(AITranslate,       { profile, onBack: back });
      else if (route.feature === 'ai_chat')           body = e(AITranslate,       { profile, onBack: back });

  // ---------- English Learning Home ----------
  function EnglishHome({ profile, onBackToProfiles, onPickFeature }) {
    const isViewer = profile.role === 'viewer';
    const visibleFeatures = FEATURES.filter(f => isViewer ? f.forViewer : f.forLearner);

    // Today's guided path. Generated once per day, persisted, and
    // reconciled on every render so empty mistake-review slots auto-
    // skip themselves the moment there's nothing to review.
    const path = !isViewer ? getOrCreateTodaysPath(profile) : null;
    if (path) reconcilePath(path, profile);
    const currentIdx = currentPathStep(path);
    const totalSteps = path ? path.steps.length : 0;
    const doneSteps  = path ? path.steps.filter(s => s.doneAt).length : 0;
    const allDone    = path && totalSteps > 0 && currentIdx === -1;
    const currentStepId = currentIdx >= 0 ? path.steps[currentIdx].id : null;
    // Map a tile feature id to its status on today's path.
    //   isCurrent: highlight + pulse (next thing to do)
    //   isDone   : faded + ✓
    //   stepNum  : badge number (1-indexed) for an upcoming step
    function pathStatusFor(featureId) {
      if (!path) return null;
      // Direction-aware match: a tile for 'vocab_en2ja' lights up when
      // the path's next step is 'vocab_ja2en' too, so the user can
      // satisfy a 単語学習 step from either direction.
      const matchesGeneric = (tileId, stepId) => {
        if (tileId === stepId) return true;
        if ((tileId === 'vocab_ja2en' || tileId === 'vocab_en2ja') &&
            (stepId === 'vocab_ja2en' || stepId === 'vocab_en2ja')) return true;
        if ((tileId === 'composition_ja2en' || tileId === 'composition_en2ja') &&
            (stepId === 'composition_ja2en' || stepId === 'composition_en2ja')) return true;
        return false;
      };
      // Scan the path for a step that matches this feature.
      for (let i = 0; i < path.steps.length; i++) {
        const s = path.steps[i];
        if (!matchesGeneric(featureId, s.id)) continue;
        if (s.doneAt) {
          // Only mark a tile "done" if every matching step in the path
          // is done (so a tile that appears twice doesn't go ✓ early).
          const remaining = path.steps.find(x => matchesGeneric(featureId, x.id) && !x.doneAt);
          if (!remaining) return { isDone: true };
          continue;
        }
        if (i === currentIdx) return { isCurrent: true, stepNum: i + 1 };
        return { isUpcoming: true, stepNum: i + 1 };
      }
      return null; // not part of today's plan
    }

    // Pick one phrase per day so the same phrase appears all day for one
    // member. Mix profile.id into the seed so different members can see
    // different phrases on the same day.
    const todayPhrase = useMemo(() => {
      if (!DAILY_PHRASES.length) return null;
      const day = new Date();
      const seedStr = day.getFullYear() + '-' + day.getMonth() + '-' + day.getDate() + '-' + profile.id;
      let h = 0;
      for (let i = 0; i < seedStr.length; i++) h = (h * 31 + seedStr.charCodeAt(i)) | 0;
      return DAILY_PHRASES[Math.abs(h) % DAILY_PHRASES.length];
    }, [profile.id]);

    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '44px 22px 96px',
      }
    },
      // Top bar
      e('div', {
        style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 }
      },
        e('button', {
          onClick: onBackToProfiles,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } },
          'プロファイルを切り替える'),
        e(OfflineBadge),
        e(ReloadBtn),
      ),

      // Daily encouragement (text-only, bilingual). EN is the focus → larger.
      e('div', {
        style: { padding: '4px 0 18px' }
      },
        e('div', {
          style: { fontSize: 14, color: C.sub, lineHeight: 1.5, fontFamily: SANS_UI }
        }, '今日もちょっとずつ、続けることがいちばん。'),
        e('div', {
          style: { fontFamily: SERIF, fontSize: 22, fontWeight: 700, color: C.text, marginTop: 6, lineHeight: 1.4 }
        }, 'A little every day is what matters most.'),
      ),

      // Today's phrase — EN larger (focus), JA smaller subline.
      todayPhrase && e('div', {
        style: {
          background: C.card, border: '1px solid ' + C.line,
          padding: '14px 16px', borderRadius: 14, marginBottom: 18,
        }
      },
        e('div', {
          style: { fontFamily: SERIF, fontSize: 22, fontWeight: 700, color: C.text, lineHeight: 1.4,
                   display: 'flex', alignItems: 'center', gap: 10 }
        },
          e('span', { style: { flex: 1 } }, todayPhrase.en),
          e(SpeakerBtn, { onClick: () => speak(todayPhrase.en), color: profile.color, size: 32 }),
        ),
        e('div', {
          style: { fontSize: 12, color: C.sub, marginTop: 6, lineHeight: 1.5 }
        }, todayPhrase.ja),
      ),

      // Progress chips (learners only)
      !isViewer && e(ProgressChips, { profile, includeTotal: true, style: { marginBottom: 18 } }),

      // Today's guided path — a small banner above the feature tiles
      // showing how far the learner has progressed and what's up next.
      // Hidden for viewer-only profiles since they don't get the path.
      path && e('div', {
        style: {
          background: allDone ? (C.success + '14') : C.card,
          border: '1px solid ' + (allDone ? C.success : C.line),
          borderRadius: 14, padding: '12px 14px', marginBottom: 16,
        }
      },
        allDone
          ? e('div', null,
              e('div', {
                style: {
                  fontFamily: SANS_UI, fontSize: 11, fontWeight: 800,
                  letterSpacing: '0.12em', color: C.success, marginBottom: 4,
                }
              }, '🎉  今日の学習 完了！'),
              e('div', {
                style: { fontSize: 13, color: C.text, lineHeight: 1.6 }
