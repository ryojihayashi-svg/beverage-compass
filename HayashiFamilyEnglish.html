<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *,*:before,*:after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: #FBF8F3; color: #2A2520; font-family: 'Noto Sans JP', system-ui, -apple-system, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  #root { min-height: 100vh; min-height: 100dvh; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  /* Flashcard 3D flip */
  .flip-wrap   { perspective: 1200px; }
  .flip-inner  { position: relative; width: 100%; transition: transform .55s cubic-bezier(.2,.8,.2,1); transform-style: preserve-3d; }
  .flip-inner.is-flipped { transform: rotateY(180deg); }
  .flip-face   { position: absolute; inset: 0; -webkit-backface-visibility: hidden; backface-visibility: hidden; }
  .flip-face.back { transform: rotateY(180deg); }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(function () {
  const e = React.createElement;
  const { useState, useEffect, useMemo, useRef } = React;

  // ---------- Design tokens ----------
  const C = {

    accent:  '#C97D3B',

    danger:  '#C2604E',
    success: '#7DA66E',

  // ---------- Family profiles ----------
  // level: 1=英検5/4級, 2=4/3級, 3=3/準2級, 4=2級, 5=準1級

    { id: 'son3',   name: '三男', subtitle: '小6・はじめての英語',   emoji: '🌟', color: C.sun,    role: 'learner', level: 1 },

  // forViewer=true:  shown to mother (viewer-only)

    { id: 'vocab',    label: '単語学習',       emoji: '🔤', desc: 'カードでじっくり',                     forLearner: true,  forViewer: false },
    { id: 'mistakes', label: '間違い復習',     emoji: '🔁', desc: '直近のまちがいだけ',                  forLearner: true,  forViewer: false },
    { id: 'ranking',  label: '家族ランキング', emoji: '🏆', desc: '今週のがんばり',                       forLearner: true,  forViewer: true  },
    { id: 'support',  label: '応援メッセージ', emoji: '💌', desc: 'みんなへの一言',                       forLearner: true,  forViewer: true  },

  // ---------- Vocabulary master (mirrors team-compass-prep/supabase/03_seed_vocabulary.sql) ----------

    { id:'food',        en:'food',        ja:'食べ物',                   pos:'noun', level:1, cat:'daily',   exEn:'I like Japanese food.',                     exJa:'私は日本食が好きです。' },
    { id:'friend',      en:'friend',      ja:'友達',                     pos:'noun', level:1, cat:'daily',   exEn:'She is my best friend.',                    exJa:'彼女は私の親友です。' },
    { id:'school',      en:'school',      ja:'学校',                     pos:'noun', level:1, cat:'school',  exEn:'I go to school by bus.',                    exJa:'私はバスで学校へ行きます。' },
    { id:'happy',       en:'happy',       ja:'幸せな',                   pos:'adj',  level:1, cat:'daily',   exEn:'I am happy today.',                         exJa:'私は今日幸せです。' },
    { id:'run',         en:'run',         ja:'走る',                     pos:'verb', level:1, cat:'daily',   exEn:'I run every morning.',                      exJa:'私は毎朝走ります。' },
    { id:'ball',        en:'ball',        ja:'ボール',                   pos:'noun', level:1, cat:'soccer',  exEn:'Pass the ball, please!',                    exJa:'ボールをパスして！' },
    // L2 — middle school basic
    { id:'play',        en:'play',        ja:'(スポーツを)する・遊ぶ',   pos:'verb', level:2, cat:'soccer',  exEn:'I play soccer with my friends.',            exJa:'私は友達とサッカーをします。' },
    { id:'enjoy',       en:'enjoy',       ja:'楽しむ',                   pos:'verb', level:2, cat:'daily',   exEn:'I enjoy reading books.',                    exJa:'私は読書を楽しみます。' },
    { id:'practice',    en:'practice',    ja:'練習する',                 pos:'verb', level:2, cat:'soccer',  exEn:'We practice every day after school.',       exJa:'私たちは放課後毎日練習します。' },
    { id:'become',      en:'become',      ja:'〜になる',                  pos:'verb', level:2, cat:'general', exEn:'I want to become a teacher.',               exJa:'私は先生になりたいです。' },
    { id:'important',   en:'important',   ja:'重要な',                   pos:'adj',  level:2, cat:'general', exEn:'It is important to study every day.',       exJa:'毎日勉強することは大切です。' },
    { id:'usually',     en:'usually',     ja:'たいてい',                 pos:'adv',  level:2, cat:'general', exEn:'I usually wake up at seven.',               exJa:'私はたいてい7時に起きます。' },
    { id:'different',   en:'different',   ja:'違った',                   pos:'adj',  level:2, cat:'general', exEn:'We have different opinions.',               exJa:'私たちは違う意見を持っています。' },
    { id:'enough',      en:'enough',      ja:'十分な',                   pos:'adj',  level:2, cat:'general', exEn:'I have enough money for lunch.',            exJa:'お昼ご飯のための十分なお金があります。' },
    // L3 — middle school complete
    { id:'between',     en:'between',     ja:'〜の間に',                  pos:'prep', level:3, cat:'general', exEn:'Choose between tea and coffee.',            exJa:'お茶かコーヒーかの間で選んでください。' },
    { id:'decide',      en:'decide',      ja:'決める',                   pos:'verb', level:3, cat:'general', exEn:'I decided to study harder.',                exJa:'私はもっと勉強することに決めました。' },
    { id:'experience',  en:'experience',  ja:'経験',                     pos:'noun', level:3, cat:'general', exEn:'It was a great experience.',                exJa:'それは素晴らしい経験でした。' },
    { id:'instead',     en:'instead',     ja:'代わりに',                 pos:'adv',  level:3, cat:'general', exEn:"Let's go to the park instead.",             exJa:'代わりに公園に行きましょう。' },
    { id:'recently',    en:'recently',    ja:'最近',                     pos:'adv',  level:3, cat:'general', exEn:'I have been busy recently.',                exJa:'最近忙しいです。' },
    { id:'opportunity', en:'opportunity', ja:'機会',                     pos:'noun', level:3, cat:'general', exEn:'This is a great opportunity.',              exJa:'これは素晴らしい機会です。' },
    { id:'improve',     en:'improve',     ja:'改善する',                 pos:'verb', level:3, cat:'general', exEn:'I want to improve my English.',             exJa:'私は英語を上達させたいです。' },
    // L4 — high school standard
    { id:'although',    en:'although',    ja:'〜だけれども',              pos:'conj', level:4, cat:'general', exEn:'Although it rained, we went out.',          exJa:'雨が降ったけれども、私たちは出かけました。' },
    { id:'acquire',     en:'acquire',     ja:'習得する・取得する',         pos:'verb', level:4, cat:'general', exEn:'She acquired new skills quickly.',          exJa:'彼女は新しい技能を素早く習得しました。' },
    { id:'sufficient',  en:'sufficient',  ja:'十分な',                   pos:'adj',  level:4, cat:'general', exEn:'We have sufficient time to prepare.',       exJa:'準備するための十分な時間があります。' },
    { id:'contribute',  en:'contribute',  ja:'貢献する',                 pos:'verb', level:4, cat:'general', exEn:"He contributed to the team's win.",         exJa:'彼はチームの勝利に貢献しました。' },
    { id:'ensure',      en:'ensure',      ja:'確実にする',               pos:'verb', level:4, cat:'general', exEn:'Please ensure the door is locked.',         exJa:'ドアが施錠されていることを確認してください。' },
    // L5 — advanced
    { id:'perspective', en:'perspective', ja:'視点',                     pos:'noun', level:5, cat:'general', exEn:'Try looking from a new perspective.',       exJa:'新しい視点で見てみてください。' },
    { id:'substantial', en:'substantial', ja:'相当な',                   pos:'adj',  level:5, cat:'general', exEn:'There was a substantial improvement.',      exJa:'相当な改善がありました。' },
    { id:'deteriorate', en:'deteriorate', ja:'悪化する',                 pos:'verb', level:5, cat:'general', exEn:'His health began to deteriorate.',          exJa:'彼の健康は悪化し始めました。' },
  ];

  // ---------- Data layer (localStorage today, swappable to Supabase later) ----------
  // Storage shape per member:
  //   { vocab: { [vocabId]: SrsState }, mistakes: [{ vocabId, at }] }
  const STORAGE_KEY = (memberId) => 'hfe_v1_' + memberId;

  const db = {
    load(memberId) {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY(memberId)) || '{}'); }
      catch { return {}; }
    },
    save(memberId, state) {
      try { localStorage.setItem(STORAGE_KEY(memberId), JSON.stringify(state)); }
      catch (err) { console.warn('localStorage write failed', err); }
    },
    getVocabProgress(memberId, vocabId) {
      const s = this.load(memberId);
      return (s.vocab && s.vocab[vocabId]) || null;
    },
    setVocabProgress(memberId, vocabId, progress) {
      const s = this.load(memberId);
      if (!s.vocab) s.vocab = {};
      s.vocab[vocabId] = progress;
      this.save(memberId, s);
    },
    pushMistake(memberId, vocabId) {
      const s = this.load(memberId);
      if (!s.mistakes) s.mistakes = [];
      // Dedup recent same vocabId, then unshift
      s.mistakes = s.mistakes.filter(m => m.vocabId !== vocabId);
      s.mistakes.unshift({ vocabId, at: new Date().toISOString() });
      s.mistakes = s.mistakes.slice(0, 50);
      this.save(memberId, s);
    },
  };

  // ---------- SRS engine (Anki-like, simplified) ----------
  const srs = {
    initial() {
      return {
        status: 'new',           // 'new' | 'learning' | 'review' | 'mastered'
        consecutiveCorrect: 0,
        totalAttempts: 0,
        totalCorrect: 0,
        lastAt: null,
        nextAt: null,
        intervalDays: 0,
        ease: 2.5,
      };
    },
    apply(state, isCorrect) {
      const s = state ? Object.assign({}, state) : this.initial();
      s.totalAttempts++;
      s.lastAt = new Date().toISOString();
      if (isCorrect) {
        s.totalCorrect++;
        s.consecutiveCorrect++;
        if (s.intervalDays === 0)         { s.intervalDays = 1;  s.status = 'learning'; }
        else if (s.intervalDays < 4)      { s.intervalDays = Math.round(s.intervalDays * 2); s.status = 'learning'; }
        else if (s.intervalDays < 30)     { s.intervalDays = Math.round(s.intervalDays * s.ease); s.status = 'review'; }
        else                              { s.intervalDays = Math.round(s.intervalDays * s.ease); s.status = 'mastered'; }
      } else {
        s.consecutiveCorrect = 0;
        s.intervalDays = 0;
        s.status = 'learning';
        s.ease = Math.max(1.3, s.ease - 0.2);
      }
      s.nextAt = new Date(Date.now() + s.intervalDays * 86400000).toISOString();
      return s;
    },
  };

  // ---------- Speech (TTS) — temporary stand-in until native MP3 audio is added ----------
  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.9;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    } catch (err) { /* ignore */ }
  }

  // ---------- App ----------
  function App() {
    const [route, setRoute] = useState({ name: 'profiles' });
    const [activeId, setActiveId] = useState(null);
    const profile = PROFILES.find(p => p.id === activeId) || null;

    if (route.name === 'profiles') {
      return e(ProfileSelect, {
        onPick: (id) => { setActiveId(id); setRoute({ name: 'home' }); },
      });
    }
    if (!profile) return null;

    if (route.name === 'home') {
      return e(EnglishHome, {
        profile,
        onBackToProfiles: () => setRoute({ name: 'profiles' }),
        onPickFeature:    (id) => setRoute({ name: 'feature', feature: id }),
      });
    }
    if (route.name === 'feature') {
      const feat = FEATURE_BY_ID[route.feature];
      const back = () => setRoute({ name: 'home' });
      if (route.feature === 'vocab') {
        return e(VocabBrowse, { profile, onBack: back });
      }
      return e(ComingSoon, { profile, feature: feat, onBack: back });
    }
    return null;
  }

  // ---------- Profile selection ----------
  function ProfileSelect({ onPick }) {
    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '48px 22px 96px',
        animation: 'fadeIn .45s ease',
      }
    },
      // Header
      e('div', { style: { textAlign: 'center', marginBottom: 40 } },
        e('div', {
          style: {
            fontFamily: SERIF, fontSize: 44, fontWeight: 800,
            letterSpacing: '-0.025em', color: C.text, lineHeight: 1,
          }
        }, 'Hayashi'),
        e('div', {
          style: {
            fontFamily: SERIF, fontSize: 38, fontWeight: 600,
            letterSpacing: '-0.02em', color: C.accent,
            fontStyle: 'italic', marginTop: 2, lineHeight: 1.05,
          }
        }, 'Family English'),
        e('div', {
          style: {
            marginTop: 16, fontSize: 12, color: C.sub,
            letterSpacing: '0.18em', fontWeight: 500,
          }
        }, '林ファミリーイングリッシュ'),
      ),

      e('div', {
        style: {
          fontSize: 13, color: C.sub, textAlign: 'center',
          marginBottom: 18, letterSpacing: '0.06em',
        }
      }, 'だれが学びますか？'),

      // Cards
      e('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
        PROFILES.map(p => e(ProfileCard, { key: p.id, profile: p, onClick: () => onPick(p.id) })),
      ),

      // Footer note
      e('div', {
        style: {
          marginTop: 32, textAlign: 'center', fontSize: 11,
          color: C.sub, letterSpacing: '0.08em', opacity: 0.7,
        }
      }, 'v0.1 — プロトタイプ'),
    );
  }

  function ProfileCard({ profile, onClick }) {
    const [pressed, setPressed] = useState(false);
    const isViewer = profile.role === 'viewer';
    return e('button', {
      onClick,
      onPointerDown: () => setPressed(true),
      onPointerUp:   () => setPressed(false),
      onPointerLeave:() => setPressed(false),
      style: {
        display: 'flex', alignItems: 'center', gap: 16,
        background: C.card, padding: '16px 18px',
        borderRadius: 20, textAlign: 'left', width: '100%',
        border: '1px solid ' + C.line,
        boxShadow: pressed
          ? '0 1px 2px rgba(42,37,32,0.05)'
          : '0 6px 18px rgba(42,37,32,0.05), 0 1px 2px rgba(42,37,32,0.04)',
        transform: pressed ? 'scale(0.985)' : 'scale(1)',
        transition: 'transform .15s ease, box-shadow .25s ease',
      }
    },
      // Avatar
      e('div', {
        style: {
          width: 56, height: 56, borderRadius: 18,
          background: profile.color + '1F',
          color: profile.color,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 28, flexShrink: 0,
          border: '1px solid ' + profile.color + '33',
        }
      }, profile.emoji),

      // Name + subtitle
      e('div', { style: { flex: 1, minWidth: 0 } },
        e('div', {
          style: {
            fontSize: 17, fontWeight: 700, color: C.text,
            display: 'flex', alignItems: 'center', gap: 8,
          }
        },
          profile.name,
          isViewer && e('span', {
            style: {
              fontSize: 10, fontWeight: 600,
              padding: '2px 8px', borderRadius: 999,
              background: profile.color + '1F', color: profile.color,
              letterSpacing: '0.08em',
            }
          }, '観覧'),
        ),
        e('div', { style: { fontSize: 12, color: C.sub, marginTop: 3 } }, profile.subtitle),
      ),

      e('div', {
        style: {
          color: profile.color, fontSize: 22, fontWeight: 300,
          opacity: 0.8, paddingRight: 4,
        }
      }, '›'),
    );
  }

  // ---------- English Learning Home ----------
  function EnglishHome({ profile, onBackToProfiles, onPickFeature }) {
    const isViewer = profile.role === 'viewer';
    const visibleFeatures = FEATURES.filter(f => isViewer ? f.forViewer : f.forLearner);

    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '20px 22px 96px',
        animation: 'fadeIn .35s ease',
      }
    },
      // Top bar
      e('div', {
        style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 22 }
      },
        e('button', {
          onClick: onBackToProfiles,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em' } },
          'プロファイルを切り替える'),
      ),

      // Hero card
      e('div', {
        style: {
          background: 'linear-gradient(135deg, ' + profile.color + ' 0%, ' + profile.color + 'D9 100%)',

          boxShadow: '0 10px 28px ' + profile.color + '33',

        e('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
          e('div', {
            style: {
              fontSize: 30, width: 48, height: 48, borderRadius: 14,
              background: 'rgba(255,255,255,0.18)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',

          e('div', null,
            e('div', { style: { fontSize: 11, opacity: 0.85, letterSpacing: '0.14em', fontWeight: 600 } },

            e('div', { style: { fontFamily: SERIF, fontSize: 22, fontWeight: 700, marginTop: 2 } },

        e('div', { style: { fontSize: 13, opacity: 0.92, marginTop: 14, lineHeight: 1.5 } },

      // Section label

        visibleFeatures.map(f => e(FeatureTile, {
          key: f.id, feature: f, accent: profile.color,
          onClick: () => onPickFeature(f.id),
          fullWidth: f.primary,
        })),
      ),
    );
  }

  function FeatureTile({ feature, accent, onClick, fullWidth }) {
    const [pressed, setPressed] = useState(false);
    const isPrimary = !!feature.primary;
    return e('button', {
      onClick,
      onPointerDown: () => setPressed(true),
      onPointerUp:   () => setPressed(false),
      onPointerLeave:() => setPressed(false),
      style: {
        gridColumn: fullWidth ? '1 / -1' : 'auto',
        background: isPrimary ? accent : C.card,
        color: isPrimary ? '#fff' : C.text,
        border: '1px solid ' + (isPrimary ? accent : C.line),
        borderRadius: 18, padding: '18px 16px',
        textAlign: 'left', minHeight: 96,
        display: 'flex', flexDirection: 'column', justifyContent: 'space-between', gap: 12,
        boxShadow: pressed
          ? '0 1px 2px rgba(42,37,32,0.06)'
          : (isPrimary
              ? '0 8px 22px ' + accent + '40'
              : '0 4px 14px rgba(42,37,32,0.05), 0 1px 2px rgba(42,37,32,0.04)'),
        transform: pressed ? 'scale(0.985)' : 'scale(1)',
        transition: 'transform .15s ease, box-shadow .25s ease',
      }
    },
      e('div', { style: { fontSize: 26, lineHeight: 1 } }, feature.emoji),
      e('div', null,
        e('div', { style: { fontSize: 15, fontWeight: 700, lineHeight: 1.2 } }, feature.label),
        e('div', {
          style: {
            fontSize: 11, marginTop: 4, lineHeight: 1.4,
            color: isPrimary ? 'rgba(255,255,255,0.85)' : C.sub,
          }
        }, feature.desc),
      ),
    );
  }

  // ---------- Vocab Browse (single flashcard, manual navigation) ----------
  function VocabBrowse({ profile, onBack }) {
    const [filter, setFilter] = useState('all');                 // 'all' | '1'..'5'
    const [index, setIndex]   = useState(0);
    const [flipped, setFlipped] = useState(false);
    const [tick, setTick]     = useState(0);                     // bump after marking, to re-read progress

    const filtered = useMemo(() => {
      if (filter === 'all') return VOCAB;
      const lv = parseInt(filter, 10);
      return VOCAB.filter(v => v.level === lv);
    }, [filter]);

    // Reset card state if filter changes or index out of range
    useEffect(() => { setIndex(0); setFlipped(false); }, [filter]);

    const total   = filtered.length;
    const current = filtered[Math.min(index, total - 1)] || null;
    const progress = current ? db.getVocabProgress(profile.id, current.id) : null;

    function go(delta) {
      setFlipped(false);
      setIndex(i => {
        const next = i + delta;
        if (next < 0) return total - 1;
        if (next >= total) return 0;
        return next;
      });
    }

    function mark(isKnown) {
      if (!current) return;
      const next = srs.apply(progress, isKnown);
      db.setVocabProgress(profile.id, current.id, next);
      if (!isKnown) db.pushMistake(profile.id, current.id);
      setTick(t => t + 1);
      // Auto-advance after a short beat so the user can see the new badge
      setTimeout(() => go(1), 200);
    }

    const levelChips = ['all','1','2','3','4','5'];
    const levelLabel = { all: 'All', '1':'L1', '2':'L2', '3':'L3', '4':'L4', '5':'L5' };

    const statusInfo = {
      new:      { label: '未学習', color: C.sub      },
      learning: { label: '学習中', color: C.accent   },
      review:   { label: '復習中', color: C.ocean    },
      mastered: { label: '習得',   color: C.success  },
    };
    const stInfo = statusInfo[(progress && progress.status) || 'new'];

    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '20px 22px 96px',
        animation: 'fadeIn .3s ease',
      }
    },
      // Top bar
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 18 } },
        e('button', { onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em', flex: 1 } }, '単語学習'),
        e('div', {
          style: { fontSize: 12, color: C.sub, fontVariantNumeric: 'tabular-nums' }
        }, total > 0 ? (Math.min(index, total - 1) + 1) + ' / ' + total : '0 / 0'),
      ),

      // Filter chips
      e('div', {
        style: {
          display: 'flex', gap: 8, marginBottom: 22,
          overflowX: 'auto', paddingBottom: 4, WebkitOverflowScrolling: 'touch',
        }
      },
        levelChips.map(lv => {
          const isActive = lv === filter;
          return e('button', {
            key: lv, onClick: () => setFilter(lv),
            style: {
              padding: '8px 14px', borderRadius: 999, fontSize: 13, fontWeight: 600,
              flexShrink: 0, border: '1px solid ' + (isActive ? profile.color : C.line),
              background: isActive ? profile.color : C.card,
              color: isActive ? '#fff' : C.sub,
              transition: 'all .2s ease',
            }
          }, levelLabel[lv]);
        })
      ),

      // Empty state
      !current && e('div', {
        style: {
          background: C.softer, border: '1px dashed ' + C.line,
          borderRadius: 18, padding: '40px 20px', textAlign: 'center', color: C.sub,
        }
      }, 'この階層の単語はまだありません'),

      // Flashcard (3D flip)
      current && e('div', { className: 'flip-wrap', style: { marginBottom: 18 } },
        e('div', {
          className: 'flip-inner' + (flipped ? ' is-flipped' : ''),
          style: { height: 320, cursor: 'pointer' },
          onClick: () => setFlipped(f => !f),
        },
          // FRONT
          e('div', { className: 'flip-face',
            style: {
              background: C.card, border: '1px solid ' + C.line,
              borderRadius: 24, padding: '24px 22px',
              display: 'flex', flexDirection: 'column',
              boxShadow: '0 10px 26px rgba(42,37,32,0.06)',
            }
          },
            // Header row
            e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
              e('div', { style: { display: 'flex', gap: 8 } },
                e('span', {
                  style: {
                    fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
                    background: profile.color + '1A', color: profile.color, letterSpacing: '0.06em',
                  }
                }, 'L' + current.level),
                e('span', {
                  style: {
                    fontSize: 11, fontWeight: 600, padding: '3px 10px', borderRadius: 999,
                    background: C.softer, color: C.sub,
                  }
                }, current.pos),
              ),
              e('span', {
                style: {
                  fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
                  background: stInfo.color + '1A', color: stInfo.color,
                }
              }, stInfo.label),
            ),
            // Word
            e('div', { style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 } },
              e('div', {
                style: {
                  fontFamily: SERIF, fontSize: 44, fontWeight: 700,
                  letterSpacing: '-0.02em', color: C.text, textAlign: 'center',
                }
              }, current.en),
              e('button', {
                onClick: (ev) => { ev.stopPropagation(); speak(current.en); },
                style: {
                  width: 40, height: 40, borderRadius: 999, fontSize: 18,
                  background: C.softer, color: profile.color, lineHeight: 1,
                }
              }, '🔊'),
            ),
            // Footer hint
            e('div', { style: { textAlign: 'center', fontSize: 12, color: C.sub } },
              'タップで意味を見る'),
          ),
          // BACK
          e('div', { className: 'flip-face back',
            style: {
              background: profile.color + '0E', border: '1px solid ' + profile.color + '33',
              borderRadius: 24, padding: '22px 20px',
              display: 'flex', flexDirection: 'column', gap: 14,
              boxShadow: '0 10px 26px rgba(42,37,32,0.06)',
            }
          },
            e('div', { style: { fontSize: 11, color: profile.color, fontWeight: 700, letterSpacing: '0.08em' } },
              'MEANING'),
            e('div', {
              style: { fontSize: 26, fontWeight: 700, color: C.text, lineHeight: 1.3 }
            }, current.ja),
            e('div', { style: { fontSize: 11, color: C.sub, fontWeight: 600, letterSpacing: '0.08em', marginTop: 4 } },
              'EXAMPLE'),
            e('div', { style: { fontSize: 15, color: C.text, lineHeight: 1.5, fontFamily: SERIF, fontStyle: 'italic' } },
              current.exEn),
            e('div', { style: { fontSize: 13, color: C.sub, lineHeight: 1.6 } },
              current.exJa),
          ),
        ),
      ),

      // Action buttons (only meaningful while we have a card)
      current && e('div', { style: { display: 'flex', gap: 10, marginBottom: 14 } },
        e('button', {
          onClick: () => mark(false),
          style: {
            flex: 1, padding: '14px 0', borderRadius: 14,
            background: C.danger + '14', color: C.danger,
            fontWeight: 700, fontSize: 14, border: '1px solid ' + C.danger + '33',
          }
        }, 'わからない'),
        e('button', {
          onClick: () => mark(true),
          style: {
            flex: 1, padding: '14px 0', borderRadius: 14,
            background: C.success, color: '#fff',
            fontWeight: 700, fontSize: 14, border: '1px solid ' + C.success,
            boxShadow: '0 6px 14px ' + C.success + '40',
          }
        }, '知ってた'),
      ),

      // Prev / next
      current && e('div', { style: { display: 'flex', gap: 10 } },
        e('button', {
          onClick: () => go(-1),
          style: {
            flex: 1, padding: '12px 0', borderRadius: 12,
            background: C.card, color: C.sub, border: '1px solid ' + C.line, fontSize: 13,
          }
        }, '← 前'),
        e('button', {
          onClick: () => go(1),
          style: {
            flex: 1, padding: '12px 0', borderRadius: 12,
            background: C.card, color: C.sub, border: '1px solid ' + C.line, fontSize: 13,
          }
        }, '次 →'),
      ),
    );
  }

  // ---------- Coming Soon (placeholder for each feature, until implemented) ----------
  function ComingSoon({ profile, feature, onBack }) {
    if (!feature) return null;
    return e('div', {
      style: {
        maxWidth: 480, margin: '0 auto', padding: '20px 22px 96px',
        animation: 'fadeIn .3s ease',
      }
    },
      // Top bar
      e('div', {
        style: { display: 'flex', alignItems: 'center', gap: 4, marginBottom: 22 }
      },
        e('button', {
          onClick: onBack,
          style: { fontSize: 22, color: C.sub, padding: '8px 10px 8px 0', lineHeight: 1 }
        }, '‹'),
        e('div', { style: { fontSize: 13, color: C.sub, letterSpacing: '0.06em' } },
          'ホームに戻る'),
      ),

      // Header
      e('div', { style: { marginBottom: 28, paddingLeft: 4 } },
        e('div', { style: { fontSize: 36, marginBottom: 8 } }, feature.emoji),
        e('div', {
          style: { fontFamily: SERIF, fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1.2 }
        }, feature.label),
        e('div', { style: { fontSize: 13, color: C.sub, marginTop: 6 } }, feature.desc),
      ),

      // Coming soon panel
      e('div', {
        style: {
          background: C.softer, border: '1px dashed ' + C.line,
          borderRadius: 20, padding: '36px 24px', textAlign: 'center', color: C.sub,
        }
      },
        e('div', { style: { fontSize: 32, marginBottom: 10 } }, '🛠️'),
        e('div', {
          style: { fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 6 }
        }, '次のステップで実装します'),
        e('div', { style: { fontSize: 12, lineHeight: 1.7 } },
          'この機能は順番に作っていきます。'),
      ),
    );
  }

  // ---------- Mount ----------
  ReactDOM.createRoot(document.getElementById('root')).render(e(App));
})();
</script>
</body>
